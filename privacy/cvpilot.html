<script>
  const policyData = {"en":[{"type":"h1","text":"Privacy Policy - CVPilot"},{"type":"meta","html":"<strong>Last updated:</strong> June 2026<br><strong>App:</strong> CVPilot<br><strong>Developer / Publisher:</strong> CAREO LIMITED<br><strong>Contact:</strong> careolimited@gmail.com"},{"type":"p","text":"CVPilot respects your privacy. This Policy explains what information may be processed, how it is used, and your rights when you use the mobile application on iOS and Android."},{"type":"h2","text":"1. Data Processing Overview"},{"type":"p","text":"CVPilot is designed to keep core app data on your device where possible. We do not sell personal data and we only use third-party services where they are needed for the features described below."},{"type":"h2","text":"2. Locally Stored Data"},{"type":"p","text":"The app may store resume content, job description text, analysis and match results, history, usage limits, app preferences, profile details, CV builder drafts, export counters, review prompt state, and premium status locally on your device. This data is used to provide app features, remember preferences, support offline use where available, and keep the app experience consistent."},{"type":"h2","text":"3. Files, Photos, Camera, Clipboard, and URL Imports"},{"type":"ul","items":["If you import a resume from Files, Photos, or Camera, the selected file or image is processed to extract resume text for app features.","Photo library and camera access are requested only when you choose to import or capture a resume image.","Clipboard access is used only when you choose to paste or copy CV, job description, or support contact text.","If you import a job description from a URL, the app connects to that website to retrieve readable text. The website you open may receive ordinary technical request information under its own privacy policy.","When you export a CV as a PDF, the app may create a temporary file and use the device sharing or printing tools you select."]},{"type":"h2","text":"4. Processing Purposes"},{"type":"ul","items":["Provide resume analysis, job matching, CV builder, export, history, and settings features","Remember user preferences and saved drafts","Apply free usage limits and premium access rules","Process purchases or premium access where applicable","Improve stability, prevent abuse, and keep the app functioning reliably"]},{"type":"h2","text":"5. Third-Party and Platform Services"},{"type":"p","text":"The app may use platform or third-party services including Apple App Store, Google Play, Apple or Google in-app review services, device file/photo/camera/sharing/printing tools, and Google Fonts for PDF export styling. These services operate under their own privacy policies."},{"type":"h2","text":"6. Advertising and Tracking"},{"type":"p","text":"CVPilot does not display third-party ads and does not use third-party advertising tracking SDKs. Resume analysis and job matching are designed to run locally on your device in the current version."},{"type":"h2","text":"7. Purchases and Premium Features"},{"type":"p","text":"Optional purchases, subscriptions, or premium access may be processed by Apple App Store or Google Play. We do not receive or store credit card details. Purchase status may be stored locally or verified through the relevant store."},{"type":"h2","text":"8. Data Sharing"},{"type":"p","text":"We do not sell personal data. Locally stored app content is not shared with CAREO LIMITED servers. Limited data may be processed by platform or third-party providers only as described in this Policy or when you choose to use device sharing, printing, store, review, or URL import features."},{"type":"h2","text":"9. Data Retention and Deletion"},{"type":"p","text":"Local data remains on your device until you delete saved entries where available, reset relevant app data where available, or uninstall the app. Temporary export files may be stored in the device cache. Store payment records and platform review or purchase records are retained by Apple or Google according to their own policies."},{"type":"h2","text":"10. User Rights"},{"type":"p","text":"Depending on your region, you may have rights to access, correct, delete, restrict, or object to processing. Because most app data is stored locally, you can usually manage or remove it directly through the app or your device settings. You may also contact us for privacy questions."},{"type":"h2","text":"11. Data Security"},{"type":"p","text":"We use HTTPS for external communications where applicable and design our apps to minimize data collection. No software or device environment can guarantee absolute security."},{"type":"h2","text":"12. Children’s Privacy"},{"type":"p","text":"The app is not directed to children under 13. We do not knowingly collect personal data from children under 13. If you believe a child has provided personal data, contact us and we will take appropriate action."},{"type":"h2","text":"13. International Data Transfers"},{"type":"p","text":"Platform and third-party providers may process limited data in countries outside your own. Appropriate safeguards apply where required by law."},{"type":"h2","text":"14. Contact"},{"type":"p","html":"<strong>CAREO LIMITED</strong><br>careolimited@gmail.com<br>CVPilot - Privacy Inquiry"},{"type":"h2","text":"15. Policy Updates"},{"type":"p","text":"We may update this Policy if app features, third-party services, or legal requirements change. Updates will be reflected with a new Last updated date. Continued use of the app after an update means you accept the updated Policy."}],"fr":[{"type":"h1","text":"Politique de confidentialité - CVPilot"},{"type":"meta","html":"<strong>Dernière mise à jour :</strong> juin 2026<br><strong>App :</strong> CVPilot<br><strong>Développeur / Éditeur :</strong> CAREO LIMITED<br><strong>Contact :</strong> careolimited@gmail.com"},{"type":"p","text":"CVPilot respecte votre vie privée. Cette Politique explique quelles informations peuvent être traitées, comment elles sont utilisées et quels sont vos droits lorsque vous utilisez l’application mobile sur iOS et Android."},{"type":"h2","text":"1. Aperçu du traitement des données"},{"type":"p","text":"CVPilot est conçue pour conserver les données principales sur votre appareil lorsque cela est possible. Nous ne vendons pas de données personnelles et nous utilisons des services tiers uniquement lorsqu’ils sont nécessaires aux fonctions décrites ci-dessous."},{"type":"h2","text":"2. Données stockées localement"},{"type":"p","text":"L’application peut stocker localement sur votre appareil le contenu de CV, le texte d’offres d’emploi, les résultats d’analyse et de correspondance, l’historique, les limites d’utilisation, les préférences, les informations de profil, les brouillons du créateur de CV, les compteurs d’export, l’état des demandes d’avis et le statut Premium. Ces données servent à fournir les fonctions de l’app, mémoriser les préférences, prendre en charge l’utilisation hors ligne lorsque disponible et garder une expérience cohérente."},{"type":"h2","text":"3. Fichiers, photos, caméra, presse-papiers et imports par URL"},{"type":"ul","items":["Si vous importez un CV depuis Fichiers, Photos ou Caméra, le fichier ou l’image choisi est traité pour extraire le texte du CV.","L’accès à la photothèque et à la caméra est demandé uniquement lorsque vous choisissez d’importer ou de capturer une image de CV.","L’accès au presse-papiers est utilisé uniquement lorsque vous choisissez de coller ou copier du texte de CV, d’offre d’emploi ou de contact support.","Si vous importez une offre d’emploi depuis une URL, l’app se connecte à ce site pour récupérer le texte lisible. Ce site peut recevoir des informations techniques ordinaires selon sa propre politique de confidentialité.","Lorsque vous exportez un CV en PDF, l’app peut créer un fichier temporaire et utiliser les outils de partage ou d’impression de l’appareil que vous choisissez."]},{"type":"h2","text":"4. Finalités du traitement"},{"type":"ul","items":["Fournir l’analyse de CV, la correspondance avec une offre, le créateur de CV, l’export, l’historique et les réglages","Mémoriser les préférences et brouillons enregistrés","Appliquer les limites gratuites et les règles d’accès Premium","Traiter les achats ou l’accès Premium si applicable","Améliorer la stabilité, prévenir les abus et assurer le bon fonctionnement de l’app"]},{"type":"h2","text":"5. Services tiers et de plateforme"},{"type":"p","text":"L’app peut utiliser des services de plateforme ou tiers, notamment Apple App Store, Google Play, les services d’avis intégrés d’Apple ou Google, les outils de fichiers/photos/caméra/partage/impression de l’appareil et Google Fonts pour la mise en forme des exports PDF. Ces services fonctionnent selon leurs propres politiques de confidentialité."},{"type":"h2","text":"6. Publicité et suivi"},{"type":"p","text":"CVPilot n’affiche pas de publicités tierces et n’utilise pas de SDK de suivi publicitaire tiers. Dans la version actuelle, l’analyse de CV et la correspondance avec les offres sont conçues pour fonctionner localement sur votre appareil."},{"type":"h2","text":"7. Achats et fonctions Premium"},{"type":"p","text":"Les achats, abonnements ou accès Premium optionnels peuvent être traités par Apple App Store ou Google Play. Nous ne recevons ni ne stockons les informations de carte bancaire. L’état d’achat peut être stocké localement ou vérifié via la boutique concernée."},{"type":"h2","text":"8. Partage des données"},{"type":"p","text":"Nous ne vendons pas de données personnelles. Le contenu stocké localement n’est pas partagé avec les serveurs de CAREO LIMITED. Des données limitées peuvent être traitées par des plateformes ou fournisseurs tiers uniquement comme décrit dans cette Politique ou lorsque vous choisissez d’utiliser le partage, l’impression, la boutique, les avis ou l’import par URL."},{"type":"h2","text":"9. Conservation et suppression"},{"type":"p","text":"Les données locales restent sur votre appareil jusqu’à ce que vous supprimiez les entrées enregistrées lorsque disponible, réinitialisiez les données pertinentes lorsque disponible ou désinstalliez l’app. Les fichiers d’export temporaires peuvent être stockés dans le cache. Les enregistrements de paiement et d’avis ou d’achat de plateforme sont conservés par Apple ou Google selon leurs propres politiques."},{"type":"h2","text":"10. Droits des utilisateurs"},{"type":"p","text":"Selon votre région, vous pouvez disposer de droits d’accès, de rectification, de suppression, de limitation ou d’opposition. Comme la plupart des données sont stockées localement, vous pouvez généralement les gérer ou les supprimer via l’app ou les réglages de votre appareil. Vous pouvez aussi nous contacter pour toute question de confidentialité."},{"type":"h2","text":"11. Sécurité des données"},{"type":"p","text":"Nous utilisons HTTPS pour les communications externes lorsque cela s’applique et concevons nos apps pour réduire la collecte de données. Aucun logiciel ni appareil ne peut garantir une sécurité absolue."},{"type":"h2","text":"12. Confidentialité des enfants"},{"type":"p","text":"L’application ne s’adresse pas aux enfants de moins de 13 ans. Nous ne collectons pas sciemment de données personnelles d’enfants de moins de 13 ans. Si vous pensez qu’un enfant a fourni des données personnelles, contactez-nous et nous prendrons les mesures appropriées."},{"type":"h2","text":"13. Transferts internationaux"},{"type":"p","text":"Les plateformes et fournisseurs tiers peuvent traiter des données limitées dans des pays autres que le vôtre. Des garanties appropriées s’appliquent lorsque la loi l’exige."},{"type":"h2","text":"14. Contact"},{"type":"p","html":"<strong>CAREO LIMITED</strong><br>careolimited@gmail.com<br>CVPilot - Privacy Inquiry"},{"type":"h2","text":"15. Mises à jour de la Politique"},{"type":"p","text":"Nous pouvons mettre à jour cette Politique si les fonctions de l’app, les services tiers ou les exigences légales changent. Les mises à jour seront indiquées par une nouvelle date. L’utilisation continue de l’app après une mise à jour signifie que vous acceptez la Politique mise à jour."}],"de":[{"type":"h1","text":"Datenschutzerklärung - CVPilot"},{"type":"meta","html":"<strong>Letzte Aktualisierung:</strong> Juni 2026<br><strong>App:</strong> CVPilot<br><strong>Entwickler / Herausgeber:</strong> CAREO LIMITED<br><strong>Kontakt:</strong> careolimited@gmail.com"},{"type":"p","text":"CVPilot respektiert Ihre Privatsphäre. Diese Richtlinie erklärt, welche Informationen verarbeitet werden können, wie sie verwendet werden und welche Rechte Sie bei der Nutzung der mobilen App auf iOS und Android haben."},{"type":"h2","text":"1. Überblick zur Datenverarbeitung"},{"type":"p","text":"CVPilot ist so gestaltet, dass Kerndaten nach Möglichkeit auf Ihrem Gerät bleiben. Wir verkaufen keine personenbezogenen Daten und verwenden Drittanbieter nur, wenn sie für die unten beschriebenen Funktionen erforderlich sind."},{"type":"h2","text":"2. Lokal gespeicherte Daten"},{"type":"p","text":"Die App kann Lebenslaufdaten, Stellenbeschreibungstexte, Analyse- und Matching-Ergebnisse, Verlauf, Nutzungslimits, App-Einstellungen, Profildaten, CV-Builder-Entwürfe, Exportzähler, Status von Bewertungsaufforderungen und Premium-Status lokal auf Ihrem Gerät speichern. Diese Daten werden genutzt, um App-Funktionen bereitzustellen, Einstellungen zu merken, Offline-Nutzung zu unterstützen und ein konsistentes App-Erlebnis zu ermöglichen."},{"type":"h2","text":"3. Dateien, Fotos, Kamera, Zwischenablage und URL-Importe"},{"type":"ul","items":["Wenn Sie einen Lebenslauf aus Dateien, Fotos oder Kamera importieren, wird die ausgewählte Datei oder das Bild verarbeitet, um Lebenslauftext zu extrahieren.","Der Zugriff auf Fotobibliothek und Kamera wird nur angefordert, wenn Sie ein Lebenslaufbild importieren oder aufnehmen möchten.","Der Zugriff auf die Zwischenablage wird nur verwendet, wenn Sie CV-, Stellenbeschreibungs- oder Support-Kontakttext einfügen oder kopieren.","Wenn Sie eine Stellenbeschreibung von einer URL importieren, verbindet sich die App mit dieser Website, um lesbaren Text abzurufen. Die Website kann gewöhnliche technische Anfrageinformationen gemäß ihrer eigenen Datenschutzerklärung erhalten.","Beim Export eines CV als PDF kann die App eine temporäre Datei erstellen und die von Ihnen ausgewählten Teilen- oder Druckfunktionen des Geräts verwenden."]},{"type":"h2","text":"4. Zwecke der Verarbeitung"},{"type":"ul","items":["Bereitstellung von Lebenslaufanalyse, Job-Matching, CV-Builder, Export, Verlauf und Einstellungen","Speichern von Nutzereinstellungen und Entwürfen","Anwendung kostenloser Nutzungslimits und Premium-Zugriffsregeln","Verarbeitung von Käufen oder Premium-Zugriff, sofern zutreffend","Verbesserung der Stabilität, Verhinderung von Missbrauch und zuverlässiger Betrieb der App"]},{"type":"h2","text":"5. Drittanbieter- und Plattformdienste"},{"type":"p","text":"Die App kann Plattform- oder Drittanbieterdienste verwenden, darunter Apple App Store, Google Play, In-App-Bewertungsdienste von Apple oder Google, Datei-/Foto-/Kamera-/Teilen-/Druckfunktionen des Geräts sowie Google Fonts für die Gestaltung von PDF-Exporten. Diese Dienste unterliegen ihren eigenen Datenschutzrichtlinien."},{"type":"h2","text":"6. Werbung und Tracking"},{"type":"p","text":"CVPilot zeigt keine Werbung von Drittanbietern an und verwendet keine Drittanbieter-SDKs für Werbetracking. In der aktuellen Version sind Lebenslaufanalyse und Job-Matching für die lokale Ausführung auf Ihrem Gerät ausgelegt."},{"type":"h2","text":"7. Käufe und Premium-Funktionen"},{"type":"p","text":"Optionale Käufe, Abonnements oder Premium-Zugriffe können über Apple App Store oder Google Play verarbeitet werden. Wir erhalten oder speichern keine Kreditkartendaten. Der Kaufstatus kann lokal gespeichert oder über den jeweiligen Store geprüft werden."},{"type":"h2","text":"8. Datenweitergabe"},{"type":"p","text":"Wir verkaufen keine personenbezogenen Daten. Lokal gespeicherte App-Inhalte werden nicht mit CAREO LIMITED-Servern geteilt. Begrenzte Daten können nur wie in dieser Richtlinie beschrieben von Plattformen oder Drittanbietern verarbeitet werden oder wenn Sie Teilen-, Druck-, Store-, Bewertungs- oder URL-Importfunktionen nutzen."},{"type":"h2","text":"9. Aufbewahrung und Löschung"},{"type":"p","text":"Lokale Daten bleiben auf Ihrem Gerät, bis Sie gespeicherte Einträge löschen, relevante App-Daten zurücksetzen oder die App deinstallieren. Temporäre Exportdateien können im Gerätecache gespeichert werden. Zahlungsaufzeichnungen sowie Plattformdaten zu Bewertungen oder Käufen werden von Apple oder Google gemäß deren Richtlinien gespeichert."},{"type":"h2","text":"10. Nutzerrechte"},{"type":"p","text":"Je nach Region können Sie Rechte auf Auskunft, Berichtigung, Löschung, Einschränkung oder Widerspruch haben. Da die meisten App-Daten lokal gespeichert werden, können Sie sie meist direkt in der App oder den Geräteeinstellungen verwalten oder entfernen. Sie können uns auch bei Datenschutzfragen kontaktieren."},{"type":"h2","text":"11. Datensicherheit"},{"type":"p","text":"Wir verwenden HTTPS für externe Kommunikation, sofern zutreffend, und gestalten unsere Apps so, dass die Datenerhebung minimiert wird. Keine Software- oder Geräteumgebung kann absolute Sicherheit garantieren."},{"type":"h2","text":"12. Datenschutz von Kindern"},{"type":"p","text":"Die App richtet sich nicht an Kinder unter 13 Jahren. Wir sammeln wissentlich keine personenbezogenen Daten von Kindern unter 13 Jahren. Wenn Sie glauben, dass ein Kind personenbezogene Daten bereitgestellt hat, kontaktieren Sie uns, und wir werden geeignete Maßnahmen ergreifen."},{"type":"h2","text":"13. Internationale Datenübertragungen"},{"type":"p","text":"Plattformen und Drittanbieter können begrenzte Daten in Ländern außerhalb Ihres Landes verarbeiten. Gesetzlich erforderliche Schutzmaßnahmen werden angewendet."},{"type":"h2","text":"14. Kontakt"},{"type":"p","html":"<strong>CAREO LIMITED</strong><br>careolimited@gmail.com<br>CVPilot - Privacy Inquiry"},{"type":"h2","text":"15. Aktualisierungen"},{"type":"p","text":"Wir können diese Richtlinie aktualisieren, wenn sich App-Funktionen, Drittanbieter-Dienste oder gesetzliche Anforderungen ändern. Aktualisierungen werden mit einem neuen Datum angezeigt. Die weitere Nutzung der App nach einer Aktualisierung bedeutet, dass Sie die aktualisierte Richtlinie akzeptieren."}],"it":[{"type":"h1","text":"Informativa sulla privacy - CVPilot"},{"type":"meta","html":"<strong>Ultimo aggiornamento:</strong> giugno 2026<br><strong>App:</strong> CVPilot<br><strong>Sviluppatore / Editore:</strong> CAREO LIMITED<br><strong>Contatto:</strong> careolimited@gmail.com"},{"type":"p","text":"CVPilot rispetta la tua privacy. Questa Informativa spiega quali informazioni possono essere trattate, come vengono utilizzate e quali diritti hai quando usi l’app mobile su iOS e Android."},{"type":"h2","text":"1. Panoramica del trattamento dei dati"},{"type":"p","text":"CVPilot è progettata per mantenere i dati principali sul dispositivo quando possibile. Non vendiamo dati personali e usiamo servizi di terze parti solo quando necessari per le funzioni descritte di seguito."},{"type":"h2","text":"2. Dati archiviati localmente"},{"type":"p","text":"L’app può archiviare localmente sul dispositivo contenuti del CV, testi di offerte di lavoro, risultati di analisi e matching, cronologia, limiti di utilizzo, preferenze, dettagli del profilo, bozze del CV builder, contatori di esportazione, stato delle richieste di recensione e stato Premium. Questi dati servono a fornire le funzioni dell’app, ricordare le preferenze, supportare l’uso offline dove disponibile e mantenere un’esperienza coerente."},{"type":"h2","text":"3. File, foto, fotocamera, appunti e importazione da URL"},{"type":"ul","items":["Se importi un CV da File, Foto o Fotocamera, il file o l’immagine selezionati vengono elaborati per estrarre il testo del CV.","L’accesso alla libreria foto e alla fotocamera viene richiesto solo quando scegli di importare o acquisire un’immagine del CV.","L’accesso agli appunti viene usato solo quando scegli di incollare o copiare testo del CV, della descrizione lavoro o del contatto supporto.","Se importi una descrizione lavoro da un URL, l’app si collega a quel sito per recuperare testo leggibile. Il sito può ricevere normali informazioni tecniche della richiesta secondo la propria informativa.","Quando esporti un CV in PDF, l’app può creare un file temporaneo e usare gli strumenti di condivisione o stampa del dispositivo che scegli."]},{"type":"h2","text":"4. Finalità del trattamento"},{"type":"ul","items":["Fornire analisi del CV, matching lavoro, CV builder, esportazione, cronologia e impostazioni","Ricordare preferenze e bozze salvate","Applicare limiti gratuiti e regole di accesso Premium","Gestire acquisti o accesso Premium se applicabile","Migliorare stabilità, prevenire abusi e mantenere l’app affidabile"]},{"type":"h2","text":"5. Servizi di piattaforma e terze parti"},{"type":"p","text":"L’app può usare servizi di piattaforma o terze parti, inclusi Apple App Store, Google Play, servizi di recensione in-app di Apple o Google, strumenti del dispositivo per file/foto/fotocamera/condivisione/stampa e Google Fonts per lo stile degli export PDF. Questi servizi operano secondo le proprie informative sulla privacy."},{"type":"h2","text":"6. Pubblicità e tracciamento"},{"type":"p","text":"CVPilot non mostra pubblicità di terze parti e non usa SDK di tracciamento pubblicitario di terze parti. Nella versione attuale, l’analisi del CV e il matching lavoro sono progettati per funzionare localmente sul dispositivo."},{"type":"h2","text":"7. Acquisti e funzioni Premium"},{"type":"p","text":"Acquisti, abbonamenti o accessi Premium facoltativi possono essere elaborati da Apple App Store o Google Play. Non riceviamo né memorizziamo dati della carta di credito. Lo stato di acquisto può essere salvato localmente o verificato tramite lo store pertinente."},{"type":"h2","text":"8. Condivisione dei dati"},{"type":"p","text":"Non vendiamo dati personali. I contenuti dell’app archiviati localmente non vengono condivisi con server CAREO LIMITED. Dati limitati possono essere trattati da piattaforme o fornitori terzi solo come descritto in questa Informativa o quando scegli di usare funzioni di condivisione, stampa, store, recensione o importazione da URL."},{"type":"h2","text":"9. Conservazione e cancellazione"},{"type":"p","text":"I dati locali restano sul dispositivo finché non elimini le voci salvate dove disponibile, reimposti i dati pertinenti dell’app dove disponibile o disinstalli l’app. I file temporanei di esportazione possono essere archiviati nella cache del dispositivo. Record di pagamento e record di recensione o acquisto della piattaforma sono conservati da Apple o Google secondo le loro politiche."},{"type":"h2","text":"10. Diritti degli utenti"},{"type":"p","text":"A seconda della tua regione, potresti avere diritti di accesso, rettifica, cancellazione, limitazione o opposizione. Poiché la maggior parte dei dati è archiviata localmente, di solito puoi gestirli o rimuoverli tramite l’app o le impostazioni del dispositivo. Puoi anche contattarci per domande sulla privacy."},{"type":"h2","text":"11. Sicurezza dei dati"},{"type":"p","text":"Usiamo HTTPS per comunicazioni esterne quando applicabile e progettiamo le nostre app per ridurre la raccolta di dati. Nessun software o dispositivo può garantire sicurezza assoluta."},{"type":"h2","text":"12. Privacy dei minori"},{"type":"p","text":"L’app non è rivolta a minori di 13 anni. Non raccogliamo consapevolmente dati personali da minori di 13 anni. Se ritieni che un minore abbia fornito dati personali, contattaci e prenderemo misure appropriate."},{"type":"h2","text":"13. Trasferimenti internazionali"},{"type":"p","text":"Piattaforme e fornitori terzi possono trattare dati limitati in paesi diversi dal tuo. Si applicano garanzie adeguate quando richiesto dalla legge."},{"type":"h2","text":"14. Contatto"},{"type":"p","html":"<strong>CAREO LIMITED</strong><br>careolimited@gmail.com<br>CVPilot - Privacy Inquiry"},{"type":"h2","text":"15. Aggiornamenti dell’Informativa"},{"type":"p","text":"Possiamo aggiornare questa Informativa se cambiano le funzioni dell’app, i servizi di terze parti o i requisiti legali. Gli aggiornamenti saranno indicati con una nuova data. L’uso continuato dell’app dopo un aggiornamento significa che accetti l’Informativa aggiornata."}],"ja":[{"type":"h1","text":"プライバシーポリシー - CVPilot"},{"type":"meta","html":"<strong>最終更新:</strong> 2026年6月<br><strong>アプリ:</strong> CVPilot<br><strong>開発者 / 発行者:</strong> CAREO LIMITED<br><strong>連絡先:</strong> careolimited@gmail.com"},{"type":"p","text":"CVPilotはお客様のプライバシーを尊重します。本ポリシーは、iOSおよびAndroidのモバイルアプリを利用する際に処理される可能性のある情報、その利用方法、お客様の権利について説明します。"},{"type":"h2","text":"1. データ処理の概要"},{"type":"p","text":"CVPilotは、可能な限り主要なアプリデータをお客様の端末上に保持するよう設計されています。当社は個人データを販売せず、以下に記載する機能に必要な場合にのみ第三者サービスを使用します。"},{"type":"h2","text":"2. ローカルに保存されるデータ"},{"type":"p","text":"アプリは、履歴書内容、求人説明文、分析およびマッチ結果、履歴、利用制限、アプリ設定、プロフィール情報、CVビルダーの下書き、エクスポート回数、レビュー依頼の状態、Premiumステータスを端末上にローカル保存する場合があります。これらのデータは、アプリ機能の提供、設定の記憶、利用可能な場合のオフライン利用、および一貫したアプリ体験のために使用されます。"},{"type":"h2","text":"3. ファイル、写真、カメラ、クリップボード、URLインポート"},{"type":"ul","items":["ファイル、写真、またはカメラから履歴書をインポートする場合、選択されたファイルまたは画像は履歴書テキストを抽出するために処理されます。","写真ライブラリおよびカメラへのアクセスは、履歴書画像をインポートまたは撮影することを選択した場合にのみ要求されます。","クリップボードへのアクセスは、CV、求人説明、またはサポート連絡先のテキストを貼り付けまたはコピーすることを選択した場合にのみ使用されます。","URLから求人説明をインポートする場合、アプリはそのウェブサイトに接続して読み取り可能なテキストを取得します。そのウェブサイトは、独自のプライバシーポリシーに従って通常の技術的なリクエスト情報を受け取る場合があります。","CVをPDFとしてエクスポートする場合、アプリは一時ファイルを作成し、お客様が選択した端末の共有または印刷ツールを使用する場合があります。"]},{"type":"h2","text":"4. 処理目的"},{"type":"ul","items":["履歴書分析、求人マッチング、CVビルダー、エクスポート、履歴、設定機能の提供","ユーザー設定および保存済み下書きの記憶","無料利用制限およびPremiumアクセスルールの適用","該当する場合の購入またはPremiumアクセスの処理","安定性の向上、不正利用の防止、アプリの信頼性維持"]},{"type":"h2","text":"5. 第三者およびプラットフォームサービス"},{"type":"p","text":"アプリは、Apple App Store、Google Play、AppleまたはGoogleのアプリ内レビューサービス、端末のファイル/写真/カメラ/共有/印刷ツール、PDFエクスポートのスタイル設定のためのGoogle Fontsなど、プラットフォームまたは第三者サービスを使用する場合があります。これらのサービスはそれぞれのプライバシーポリシーに従って運営されます。"},{"type":"h2","text":"6. 広告およびトラッキング"},{"type":"p","text":"CVPilotは第三者広告を表示せず、第三者広告トラッキングSDKを使用しません。現在のバージョンでは、履歴書分析と求人マッチングは端末上でローカルに実行されるよう設計されています。"},{"type":"h2","text":"7. 購入およびPremium機能"},{"type":"p","text":"任意の購入、サブスクリプション、またはPremiumアクセスはApple App StoreまたはGoogle Playによって処理される場合があります。当社はクレジットカード情報を受け取ったり保存したりしません。購入ステータスはローカルに保存されるか、該当するストアを通じて確認される場合があります。"},{"type":"h2","text":"8. データ共有"},{"type":"p","text":"当社は個人データを販売しません。ローカルに保存されたアプリ内容はCAREO LIMITEDのサーバーと共有されません。限定的なデータは、本ポリシーに記載されている場合、またはお客様が共有、印刷、ストア、レビュー、URLインポート機能を使用することを選択した場合にのみ、プラットフォームまたは第三者プロバイダーによって処理される場合があります。"},{"type":"h2","text":"9. データの保持と削除"},{"type":"p","text":"ローカルデータは、利用可能な保存済み項目を削除する、関連するアプリデータをリセットする、またはアプリをアンインストールするまで端末に残ります。一時的なエクスポートファイルは端末のキャッシュに保存される場合があります。支払い記録およびプラットフォームのレビューまたは購入記録は、AppleまたはGoogleの各ポリシーに従って保持されます。"},{"type":"h2","text":"10. ユーザーの権利"},{"type":"p","text":"地域によっては、アクセス、訂正、削除、制限、または異議申し立ての権利を有する場合があります。ほとんどのアプリデータはローカルに保存されるため、通常はアプリまたは端末設定から管理または削除できます。プライバシーに関する質問について当社に連絡することもできます。"},{"type":"h2","text":"11. データセキュリティ"},{"type":"p","text":"該当する場合、外部通信にはHTTPSを使用し、データ収集を最小限に抑えるようアプリを設計しています。いかなるソフトウェアまたは端末環境も絶対的な安全性を保証することはできません。"},{"type":"h2","text":"12. 子どものプライバシー"},{"type":"p","text":"本アプリは13歳未満の子どもを対象としていません。当社は13歳未満の子どもから故意に個人データを収集しません。子どもが個人データを提供したと思われる場合は当社までご連絡ください。適切に対応します。"},{"type":"h2","text":"13. 国際データ移転"},{"type":"p","text":"プラットフォームおよび第三者プロバイダーは、お客様の国以外の国で限定的なデータを処理する場合があります。法律で求められる場合、適切な保護措置が適用されます。"},{"type":"h2","text":"14. 連絡先"},{"type":"p","html":"<strong>CAREO LIMITED</strong><br>careolimited@gmail.com<br>CVPilot - Privacy Inquiry"},{"type":"h2","text":"15. ポリシーの更新"},{"type":"p","text":"アプリ機能、第三者サービス、または法的要件が変更された場合、本ポリシーを更新することがあります。更新は新しい最終更新日で示されます。更新後もアプリを継続して使用する場合、更新後のポリシーに同意したものとみなされます。"}],"ko":[{"type":"h1","text":"개인정보 처리방침 - CVPilot"},{"type":"meta","html":"<strong>마지막 업데이트:</strong> 2026년 6월<br><strong>앱:</strong> CVPilot<br><strong>개발자 / 게시자:</strong> CAREO LIMITED<br><strong>문의:</strong> careolimited@gmail.com"},{"type":"p","text":"CVPilot은 사용자의 개인정보를 존중합니다. 본 방침은 iOS 및 Android 모바일 앱 사용 시 처리될 수 있는 정보, 그 사용 방법 및 사용자의 권리를 설명합니다."},{"type":"h2","text":"1. 데이터 처리 개요"},{"type":"p","text":"CVPilot은 가능한 경우 핵심 앱 데이터를 사용자의 기기에 보관하도록 설계되었습니다. 당사는 개인정보를 판매하지 않으며, 아래에 설명된 기능에 필요한 경우에만 제3자 서비스를 사용합니다."},{"type":"h2","text":"2. 로컬 저장 데이터"},{"type":"p","text":"앱은 이력서 내용, 채용공고 텍스트, 분석 및 매칭 결과, 기록, 사용 제한, 앱 환경설정, 프로필 정보, CV 빌더 초안, 내보내기 카운터, 리뷰 요청 상태 및 Premium 상태를 사용자의 기기에 로컬로 저장할 수 있습니다. 이 데이터는 앱 기능 제공, 환경설정 저장, 가능한 경우 오프라인 사용 지원 및 일관된 앱 경험 유지를 위해 사용됩니다."},{"type":"h2","text":"3. 파일, 사진, 카메라, 클립보드 및 URL 가져오기"},{"type":"ul","items":["파일, 사진 또는 카메라에서 이력서를 가져오는 경우 선택한 파일 또는 이미지는 이력서 텍스트 추출을 위해 처리됩니다.","사진 라이브러리 및 카메라 접근은 이력서 이미지를 가져오거나 촬영하기로 선택한 경우에만 요청됩니다.","클립보드 접근은 CV, 채용공고 또는 지원 연락처 텍스트를 붙여넣거나 복사하기로 선택한 경우에만 사용됩니다.","URL에서 채용공고를 가져오는 경우 앱은 해당 웹사이트에 연결하여 읽을 수 있는 텍스트를 가져옵니다. 해당 웹사이트는 자체 개인정보 처리방침에 따라 일반적인 기술 요청 정보를 받을 수 있습니다.","CV를 PDF로 내보낼 때 앱은 임시 파일을 만들고 사용자가 선택한 기기의 공유 또는 인쇄 도구를 사용할 수 있습니다."]},{"type":"h2","text":"4. 처리 목적"},{"type":"ul","items":["이력서 분석, 채용 매칭, CV 빌더, 내보내기, 기록 및 설정 기능 제공","사용자 환경설정 및 저장된 초안 기억","무료 사용 제한 및 Premium 접근 규칙 적용","해당되는 경우 구매 또는 Premium 접근 처리","안정성 개선, 남용 방지 및 앱의 안정적 작동 유지"]},{"type":"h2","text":"5. 제3자 및 플랫폼 서비스"},{"type":"p","text":"앱은 Apple App Store, Google Play, Apple 또는 Google의 인앱 리뷰 서비스, 기기의 파일/사진/카메라/공유/인쇄 도구, PDF 내보내기 스타일링을 위한 Google Fonts 등 플랫폼 또는 제3자 서비스를 사용할 수 있습니다. 이러한 서비스는 자체 개인정보 처리방침에 따라 운영됩니다."},{"type":"h2","text":"6. 광고 및 추적"},{"type":"p","text":"CVPilot은 제3자 광고를 표시하지 않으며 제3자 광고 추적 SDK를 사용하지 않습니다. 현재 버전에서 이력서 분석과 채용 매칭은 사용자의 기기에서 로컬로 실행되도록 설계되었습니다."},{"type":"h2","text":"7. 구매 및 Premium 기능"},{"type":"p","text":"선택적 구매, 구독 또는 Premium 접근은 Apple App Store 또는 Google Play에서 처리될 수 있습니다. 당사는 신용카드 정보를 받거나 저장하지 않습니다. 구매 상태는 로컬에 저장되거나 관련 스토어를 통해 확인될 수 있습니다."},{"type":"h2","text":"8. 데이터 공유"},{"type":"p","text":"당사는 개인정보를 판매하지 않습니다. 로컬에 저장된 앱 콘텐츠는 CAREO LIMITED 서버와 공유되지 않습니다. 제한적인 데이터는 본 방침에 설명된 경우 또는 사용자가 공유, 인쇄, 스토어, 리뷰 또는 URL 가져오기 기능을 사용하기로 선택한 경우에만 플랫폼 또는 제3자 제공업체에 의해 처리될 수 있습니다."},{"type":"h2","text":"9. 데이터 보관 및 삭제"},{"type":"p","text":"로컬 데이터는 사용자가 가능한 저장 항목을 삭제하거나, 관련 앱 데이터를 재설정하거나, 앱을 제거할 때까지 기기에 남아 있습니다. 임시 내보내기 파일은 기기 캐시에 저장될 수 있습니다. 결제 기록 및 플랫폼 리뷰 또는 구매 기록은 Apple 또는 Google의 자체 정책에 따라 보관됩니다."},{"type":"h2","text":"10. 사용자 권리"},{"type":"p","text":"지역에 따라 접근, 정정, 삭제, 제한 또는 처리 반대 권리가 있을 수 있습니다. 대부분의 앱 데이터는 로컬에 저장되므로 일반적으로 앱 또는 기기 설정을 통해 관리하거나 제거할 수 있습니다. 개인정보 관련 문의는 당사에 연락할 수도 있습니다."},{"type":"h2","text":"11. 데이터 보안"},{"type":"p","text":"해당되는 경우 외부 통신에는 HTTPS를 사용하며 데이터 수집을 최소화하도록 앱을 설계합니다. 어떤 소프트웨어나 기기 환경도 절대적인 보안을 보장할 수 없습니다."},{"type":"h2","text":"12. 아동 개인정보"},{"type":"p","text":"본 앱은 13세 미만 아동을 대상으로 하지 않습니다. 당사는 13세 미만 아동의 개인정보를 고의로 수집하지 않습니다. 아동이 개인정보를 제공했다고 생각되는 경우 당사에 연락해 주시면 적절한 조치를 취하겠습니다."},{"type":"h2","text":"13. 국제 데이터 이전"},{"type":"p","text":"플랫폼 및 제3자 제공업체는 사용자의 국가 외부에서 제한적인 데이터를 처리할 수 있습니다. 법률상 요구되는 경우 적절한 보호 조치가 적용됩니다."},{"type":"h2","text":"14. 문의"},{"type":"p","html":"<strong>CAREO LIMITED</strong><br>careolimited@gmail.com<br>CVPilot - Privacy Inquiry"},{"type":"h2","text":"15. 방침 업데이트"},{"type":"p","text":"앱 기능, 제3자 서비스 또는 법적 요구사항이 변경되는 경우 본 방침을 업데이트할 수 있습니다. 업데이트는 새로운 마지막 업데이트 날짜로 표시됩니다. 업데이트 후 앱을 계속 사용하면 업데이트된 방침에 동의하는 것으로 간주됩니다."}],"pt":[{"type":"h1","text":"Política de Privacidade - CVPilot"},{"type":"meta","html":"<strong>Última atualização:</strong> junho de 2026<br><strong>App:</strong> CVPilot<br><strong>Programador / Editor:</strong> CAREO LIMITED<br><strong>Contacto:</strong> careolimited@gmail.com"},{"type":"p","text":"A CVPilot respeita a sua privacidade. Esta Política explica que informações podem ser tratadas, como são usadas e quais são os seus direitos ao usar a aplicação móvel em iOS e Android."},{"type":"h2","text":"1. Visão geral do tratamento de dados"},{"type":"p","text":"A CVPilot foi concebida para manter os dados principais no seu dispositivo sempre que possível. Não vendemos dados pessoais e usamos serviços de terceiros apenas quando necessários para as funcionalidades descritas abaixo."},{"type":"h2","text":"2. Dados armazenados localmente"},{"type":"p","text":"A app pode armazenar localmente no seu dispositivo conteúdo de CV, texto de descrições de emprego, resultados de análise e correspondência, histórico, limites de utilização, preferências, detalhes de perfil, rascunhos do criador de CV, contadores de exportação, estado de pedidos de avaliação e estado Premium. Estes dados são usados para fornecer funcionalidades, guardar preferências, suportar utilização offline quando disponível e manter uma experiência consistente."},{"type":"h2","text":"3. Ficheiros, fotos, câmara, área de transferência e importações por URL"},{"type":"ul","items":["Se importar um CV a partir de Ficheiros, Fotos ou Câmara, o ficheiro ou imagem selecionado é tratado para extrair texto do CV.","O acesso à biblioteca de fotos e à câmara é pedido apenas quando escolhe importar ou capturar uma imagem de CV.","O acesso à área de transferência é usado apenas quando escolhe colar ou copiar texto de CV, descrição de emprego ou contacto de suporte.","Se importar uma descrição de emprego a partir de um URL, a app liga-se a esse website para obter texto legível. Esse website pode receber informações técnicas normais do pedido ao abrigo da sua própria política de privacidade.","Ao exportar um CV como PDF, a app pode criar um ficheiro temporário e usar as ferramentas de partilha ou impressão do dispositivo que escolher."]},{"type":"h2","text":"4. Finalidades do tratamento"},{"type":"ul","items":["Fornecer análise de CV, correspondência com empregos, criador de CV, exportação, histórico e definições","Guardar preferências e rascunhos","Aplicar limites gratuitos e regras de acesso Premium","Tratar compras ou acesso Premium quando aplicável","Melhorar estabilidade, prevenir abuso e manter a app fiável"]},{"type":"h2","text":"5. Serviços de terceiros e de plataforma"},{"type":"p","text":"A app pode usar serviços de plataforma ou de terceiros, incluindo Apple App Store, Google Play, serviços de avaliação na app da Apple ou Google, ferramentas do dispositivo para ficheiros/fotos/câmara/partilha/impressão e Google Fonts para o estilo das exportações PDF. Estes serviços funcionam segundo as suas próprias políticas de privacidade."},{"type":"h2","text":"6. Publicidade e rastreio"},{"type":"p","text":"A CVPilot não apresenta anúncios de terceiros e não usa SDKs de rastreio publicitário de terceiros. Na versão atual, a análise de CV e a correspondência com empregos foram concebidas para correr localmente no seu dispositivo."},{"type":"h2","text":"7. Compras e funcionalidades Premium"},{"type":"p","text":"Compras, subscrições ou acesso Premium opcionais podem ser tratados pela Apple App Store ou Google Play. Não recebemos nem armazenamos dados de cartões de crédito. O estado da compra pode ser guardado localmente ou verificado através da loja relevante."},{"type":"h2","text":"8. Partilha de dados"},{"type":"p","text":"Não vendemos dados pessoais. O conteúdo armazenado localmente não é partilhado com servidores da CAREO LIMITED. Dados limitados podem ser tratados por plataformas ou fornecedores terceiros apenas como descrito nesta Política ou quando escolhe usar funcionalidades de partilha, impressão, loja, avaliação ou importação por URL."},{"type":"h2","text":"9. Retenção e eliminação de dados"},{"type":"p","text":"Os dados locais permanecem no seu dispositivo até eliminar entradas guardadas quando disponível, repor dados relevantes da app quando disponível ou desinstalar a app. Ficheiros temporários de exportação podem ser armazenados na cache do dispositivo. Registos de pagamento e registos de avaliação ou compra da plataforma são retidos pela Apple ou Google segundo as suas próprias políticas."},{"type":"h2","text":"10. Direitos do utilizador"},{"type":"p","text":"Dependendo da sua região, pode ter direitos de acesso, correção, eliminação, restrição ou oposição ao tratamento. Como a maioria dos dados é armazenada localmente, normalmente pode geri-los ou removê-los pela app ou definições do dispositivo. Também pode contactar-nos para questões de privacidade."},{"type":"h2","text":"11. Segurança dos dados"},{"type":"p","text":"Usamos HTTPS para comunicações externas quando aplicável e concebemos as nossas apps para minimizar a recolha de dados. Nenhum software ou ambiente de dispositivo pode garantir segurança absoluta."},{"type":"h2","text":"12. Privacidade das crianças"},{"type":"p","text":"A app não é dirigida a crianças com menos de 13 anos. Não recolhemos intencionalmente dados pessoais de crianças com menos de 13 anos. Se acreditar que uma criança forneceu dados pessoais, contacte-nos e tomaremos medidas adequadas."},{"type":"h2","text":"13. Transferências internacionais"},{"type":"p","text":"Plataformas e fornecedores terceiros podem tratar dados limitados em países fora do seu. Aplicam-se salvaguardas adequadas quando exigido por lei."},{"type":"h2","text":"14. Contacto"},{"type":"p","html":"<strong>CAREO LIMITED</strong><br>careolimited@gmail.com<br>CVPilot - Privacy Inquiry"},{"type":"h2","text":"15. Atualizações da Política"},{"type":"p","text":"Podemos atualizar esta Política se as funcionalidades da app, serviços de terceiros ou requisitos legais mudarem. As atualizações serão refletidas com uma nova data. A utilização continuada da app após uma atualização significa que aceita a Política atualizada."}],"ru":[{"type":"h1","text":"Политика конфиденциальности - CVPilot"},{"type":"meta","html":"<strong>Последнее обновление:</strong> июнь 2026 г.<br><strong>Приложение:</strong> CVPilot<br><strong>Разработчик / Издатель:</strong> CAREO LIMITED<br><strong>Контакт:</strong> careolimited@gmail.com"},{"type":"p","text":"CVPilot уважает вашу конфиденциальность. Эта Политика объясняет, какие сведения могут обрабатываться, как они используются и какие права у вас есть при использовании мобильного приложения на iOS и Android."},{"type":"h2","text":"1. Обзор обработки данных"},{"type":"p","text":"CVPilot разработано так, чтобы по возможности хранить основные данные приложения на вашем устройстве. Мы не продаем персональные данные и используем сторонние сервисы только там, где это необходимо для функций, описанных ниже."},{"type":"h2","text":"2. Локально хранимые данные"},{"type":"p","text":"Приложение может локально хранить на вашем устройстве содержимое резюме, текст вакансии, результаты анализа и сопоставления, историю, лимиты использования, настройки, данные профиля, черновики конструктора CV, счетчики экспорта, состояние запросов оценки и статус Premium. Эти данные используются для работы функций приложения, сохранения настроек, поддержки офлайн-использования при наличии и поддержания стабильного опыта."},{"type":"h2","text":"3. Файлы, фото, камера, буфер обмена и импорт по URL"},{"type":"ul","items":["Если вы импортируете резюме из Файлов, Фото или Камеры, выбранный файл или изображение обрабатывается для извлечения текста резюме.","Доступ к фотобиблиотеке и камере запрашивается только когда вы выбираете импорт или съемку изображения резюме.","Доступ к буферу обмена используется только когда вы выбираете вставить или скопировать текст CV, вакансии или контакта поддержки.","Если вы импортируете описание вакансии по URL, приложение подключается к этому сайту для получения читаемого текста. Этот сайт может получить обычную техническую информацию запроса согласно своей политике конфиденциальности.","При экспорте CV в PDF приложение может создать временный файл и использовать выбранные вами инструменты общего доступа или печати устройства."]},{"type":"h2","text":"4. Цели обработки"},{"type":"ul","items":["Предоставление анализа CV, сопоставления с вакансией, конструктора CV, экспорта, истории и настроек","Сохранение пользовательских настроек и черновиков","Применение бесплатных лимитов и правил Premium-доступа","Обработка покупок или Premium-доступа, если применимо","Повышение стабильности, предотвращение злоупотреблений и надежная работа приложения"]},{"type":"h2","text":"5. Сторонние и платформенные сервисы"},{"type":"p","text":"Приложение может использовать платформенные или сторонние сервисы, включая Apple App Store, Google Play, встроенные сервисы оценки Apple или Google, инструменты устройства для файлов/фото/камеры/общего доступа/печати и Google Fonts для оформления PDF-экспорта. Эти сервисы работают по собственным политикам конфиденциальности."},{"type":"h2","text":"6. Реклама и отслеживание"},{"type":"p","text":"CVPilot не показывает стороннюю рекламу и не использует сторонние SDK для рекламного отслеживания. В текущей версии анализ CV и сопоставление с вакансиями разработаны для локального выполнения на вашем устройстве."},{"type":"h2","text":"7. Покупки и функции Premium"},{"type":"p","text":"Необязательные покупки, подписки или доступ Premium могут обрабатываться Apple App Store или Google Play. Мы не получаем и не храним данные кредитных карт. Статус покупки может храниться локально или проверяться через соответствующий магазин."},{"type":"h2","text":"8. Передача данных"},{"type":"p","text":"Мы не продаем персональные данные. Локально сохраненное содержимое приложения не передается на серверы CAREO LIMITED. Ограниченные данные могут обрабатываться платформами или сторонними поставщиками только как описано в этой Политике либо когда вы выбираете функции общего доступа, печати, магазина, оценки или импорта по URL."},{"type":"h2","text":"9. Хранение и удаление данных"},{"type":"p","text":"Локальные данные остаются на вашем устройстве, пока вы не удалите сохраненные записи, если это доступно, не сбросите соответствующие данные приложения, если это доступно, или не удалите приложение. Временные файлы экспорта могут храниться в кэше устройства. Платежные записи и платформенные записи оценок или покупок хранятся Apple или Google согласно их политикам."},{"type":"h2","text":"10. Права пользователя"},{"type":"p","text":"В зависимости от вашего региона у вас могут быть права на доступ, исправление, удаление, ограничение или возражение против обработки. Поскольку большинство данных хранится локально, обычно ими можно управлять или удалить их через приложение или настройки устройства. Вы также можете связаться с нами по вопросам конфиденциальности."},{"type":"h2","text":"11. Безопасность данных"},{"type":"p","text":"Мы используем HTTPS для внешних соединений, где это применимо, и проектируем приложения так, чтобы минимизировать сбор данных. Ни одна программная или аппаратная среда не может гарантировать абсолютную безопасность."},{"type":"h2","text":"12. Конфиденциальность детей"},{"type":"p","text":"Приложение не предназначено для детей младше 13 лет. Мы сознательно не собираем персональные данные детей младше 13 лет. Если вы считаете, что ребенок предоставил персональные данные, свяжитесь с нами, и мы примем соответствующие меры."},{"type":"h2","text":"13. Международная передача данных"},{"type":"p","text":"Платформы и сторонние поставщики могут обрабатывать ограниченные данные в странах за пределами вашей страны. При необходимости применяются соответствующие гарантии."},{"type":"h2","text":"14. Контакты"},{"type":"p","html":"<strong>CAREO LIMITED</strong><br>careolimited@gmail.com<br>CVPilot - Privacy Inquiry"},{"type":"h2","text":"15. Обновления Политики"},{"type":"p","text":"Мы можем обновлять эту Политику при изменении функций приложения, сторонних сервисов или требований закона. Обновления будут отражены новой датой. Продолжение использования приложения после обновления означает принятие обновленной Политики."}],"es":[{"type":"h1","text":"Política de privacidad - CVPilot"},{"type":"meta","html":"<strong>Última actualización:</strong> junio de 2026<br><strong>App:</strong> CVPilot<br><strong>Desarrollador / Editor:</strong> CAREO LIMITED<br><strong>Contacto:</strong> careolimited@gmail.com"},{"type":"p","text":"CVPilot respeta tu privacidad. Esta Política explica qué información puede procesarse, cómo se utiliza y cuáles son tus derechos al usar la aplicación móvil en iOS y Android."},{"type":"h2","text":"1. Resumen del procesamiento de datos"},{"type":"p","text":"CVPilot está diseñada para mantener los datos principales en tu dispositivo cuando sea posible. No vendemos datos personales y usamos servicios de terceros solo cuando son necesarios para las funciones descritas abajo."},{"type":"h2","text":"2. Datos almacenados localmente"},{"type":"p","text":"La app puede almacenar localmente en tu dispositivo contenido del CV, texto de descripciones de puesto, resultados de análisis y coincidencia, historial, límites de uso, preferencias, datos de perfil, borradores del creador de CV, contadores de exportación, estado de solicitudes de reseña y estado Premium. Estos datos se usan para ofrecer funciones, recordar preferencias, permitir uso sin conexión cuando esté disponible y mantener una experiencia consistente."},{"type":"h2","text":"3. Archivos, fotos, cámara, portapapeles e importaciones por URL"},{"type":"ul","items":["Si importas un CV desde Archivos, Fotos o Cámara, el archivo o imagen seleccionado se procesa para extraer texto del CV.","El acceso a la biblioteca de fotos y a la cámara se solicita solo cuando eliges importar o capturar una imagen de CV.","El acceso al portapapeles se usa solo cuando eliges pegar o copiar texto de CV, descripción de puesto o contacto de soporte.","Si importas una descripción de puesto desde una URL, la app se conecta a ese sitio web para recuperar texto legible. Ese sitio puede recibir información técnica ordinaria de la solicitud según su propia política de privacidad.","Al exportar un CV como PDF, la app puede crear un archivo temporal y usar las herramientas de compartir o imprimir del dispositivo que elijas."]},{"type":"h2","text":"4. Finalidades del procesamiento"},{"type":"ul","items":["Proporcionar análisis de CV, coincidencia con puestos, creador de CV, exportación, historial y ajustes","Recordar preferencias y borradores guardados","Aplicar límites gratuitos y reglas de acceso Premium","Procesar compras o acceso Premium cuando corresponda","Mejorar estabilidad, prevenir abusos y mantener la app fiable"]},{"type":"h2","text":"5. Servicios de terceros y de plataforma"},{"type":"p","text":"La app puede usar servicios de plataforma o terceros, incluidos Apple App Store, Google Play, servicios de reseñas dentro de la app de Apple o Google, herramientas del dispositivo para archivos/fotos/cámara/compartir/imprimir y Google Fonts para el estilo de exportaciones PDF. Estos servicios operan bajo sus propias políticas de privacidad."},{"type":"h2","text":"6. Publicidad y seguimiento"},{"type":"p","text":"CVPilot no muestra anuncios de terceros y no usa SDKs de seguimiento publicitario de terceros. En la versión actual, el análisis de CV y la coincidencia con puestos están diseñados para ejecutarse localmente en tu dispositivo."},{"type":"h2","text":"7. Compras y funciones Premium"},{"type":"p","text":"Las compras, suscripciones o accesos Premium opcionales pueden ser procesados por Apple App Store o Google Play. No recibimos ni almacenamos datos de tarjetas de crédito. El estado de compra puede guardarse localmente o verificarse mediante la tienda correspondiente."},{"type":"h2","text":"8. Compartición de datos"},{"type":"p","text":"No vendemos datos personales. El contenido almacenado localmente no se comparte con servidores de CAREO LIMITED. Datos limitados pueden ser procesados por plataformas o proveedores terceros solo como se describe en esta Política o cuando eliges usar funciones de compartir, imprimir, tienda, reseña o importación por URL."},{"type":"h2","text":"9. Conservación y eliminación de datos"},{"type":"p","text":"Los datos locales permanecen en tu dispositivo hasta que elimines entradas guardadas cuando esté disponible, restablezcas datos relevantes de la app cuando esté disponible o desinstales la app. Los archivos temporales de exportación pueden almacenarse en la caché del dispositivo. Los registros de pago y los registros de reseña o compra de plataforma son conservados por Apple o Google según sus propias políticas."},{"type":"h2","text":"10. Derechos del usuario"},{"type":"p","text":"Según tu región, puedes tener derechos de acceso, corrección, eliminación, limitación u oposición. Como la mayoría de los datos se almacenan localmente, normalmente puedes gestionarlos o eliminarlos desde la app o los ajustes del dispositivo. También puedes contactarnos por preguntas de privacidad."},{"type":"h2","text":"11. Seguridad de datos"},{"type":"p","text":"Usamos HTTPS para comunicaciones externas cuando corresponde y diseñamos nuestras apps para minimizar la recopilación de datos. Ningún software o dispositivo puede garantizar seguridad absoluta."},{"type":"h2","text":"12. Privacidad de menores"},{"type":"p","text":"La app no está dirigida a menores de 13 años. No recopilamos conscientemente datos personales de menores de 13 años. Si crees que un menor proporcionó datos personales, contáctanos y tomaremos medidas apropiadas."},{"type":"h2","text":"13. Transferencias internacionales"},{"type":"p","text":"Las plataformas y proveedores terceros pueden procesar datos limitados en países fuera del tuyo. Se aplican salvaguardias adecuadas cuando lo exige la ley."},{"type":"h2","text":"14. Contacto"},{"type":"p","html":"<strong>CAREO LIMITED</strong><br>careolimited@gmail.com<br>CVPilot - Privacy Inquiry"},{"type":"h2","text":"15. Actualizaciones de la Política"},{"type":"p","text":"Podemos actualizar esta Política si cambian las funciones de la app, servicios terceros o requisitos legales. Las actualizaciones se reflejarán con una nueva fecha. El uso continuado de la app después de una actualización significa que aceptas la Política actualizada."}],"tr":[{"type":"h1","text":"Gizlilik Politikası - CVPilot"},{"type":"meta","html":"<strong>Son güncelleme:</strong> Haziran 2026<br><strong>Uygulama:</strong> CVPilot<br><strong>Geliştirici / Yayıncı:</strong> CAREO LIMITED<br><strong>İletişim:</strong> careolimited@gmail.com"},{"type":"p","text":"CVPilot gizliliğinize saygı duyar. Bu Politika, iOS ve Android mobil uygulamasını kullanırken hangi bilgilerin işlenebileceğini, nasıl kullanıldığını ve haklarınızı açıklar."},{"type":"h2","text":"1. Veri İşleme Özeti"},{"type":"p","text":"CVPilot, temel uygulama verilerini mümkün olduğunda cihazınızda tutacak şekilde tasarlanmıştır. Kişisel verileri satmayız ve üçüncü taraf hizmetleri yalnızca aşağıda açıklanan özellikler için gerekli olduğunda kullanırız."},{"type":"h2","text":"2. Yerel Olarak Saklanan Veriler"},{"type":"p","text":"Uygulama, CV içeriği, iş ilanı metni, analiz ve eşleşme sonuçları, geçmiş, kullanım limitleri, uygulama tercihleri, profil bilgileri, CV builder taslakları, export sayaçları, değerlendirme isteği durumu ve Premium durumu ile ilgili verileri cihazınızda yerel olarak saklayabilir. Bu veriler uygulama özelliklerini sunmak, tercihleri hatırlamak, varsa çevrimdışı kullanımı desteklemek ve uygulama deneyimini tutarlı tutmak için kullanılır."},{"type":"h2","text":"3. Dosyalar, Fotoğraflar, Kamera, Pano ve URL İçe Aktarma"},{"type":"ul","items":["Files, Photos veya Camera üzerinden CV içe aktarırsanız, seçilen dosya veya görsel CV metnini çıkarmak için işlenir.","Fotoğraf arşivi ve kamera erişimi yalnızca CV görseli içe aktarmayı veya çekmeyi seçtiğinizde istenir.","Pano erişimi yalnızca CV, iş ilanı veya destek iletişim metnini yapıştırmayı ya da kopyalamayı seçtiğinizde kullanılır.","Bir iş ilanını URL’den içe aktarırsanız, uygulama okunabilir metni almak için ilgili web sitesine bağlanır. Açtığınız web sitesi, kendi gizlilik politikasına göre olağan teknik istek bilgilerini alabilir.","CV’yi PDF olarak dışa aktardığınızda, uygulama geçici bir dosya oluşturabilir ve seçtiğiniz cihaz paylaşım veya yazdırma araçlarını kullanabilir."]},{"type":"h2","text":"4. İşleme Amaçları"},{"type":"ul","items":["CV analizi, iş eşleştirme, CV builder, export, geçmiş ve ayarlar özelliklerini sunmak","Kullanıcı tercihlerini ve kayıtlı taslakları hatırlamak","Ücretsiz kullanım limitlerini ve Premium erişim kurallarını uygulamak","Uygunsa satın alma veya Premium erişimi işlemek","Kararlılığı artırmak, kötüye kullanımı önlemek ve uygulamanın güvenilir çalışmasını sağlamak"]},{"type":"h2","text":"5. Üçüncü Taraf ve Platform Hizmetleri"},{"type":"p","text":"Uygulama Apple App Store, Google Play, Apple veya Google uygulama içi değerlendirme hizmetleri, cihazın dosya/fotoğraf/kamera/paylaşım/yazdırma araçları ve PDF export biçimlendirmesi için Google Fonts dahil olmak üzere platform veya üçüncü taraf hizmetleri kullanabilir. Bu hizmetler kendi gizlilik politikalarına göre çalışır."},{"type":"h2","text":"6. Reklam ve Takip"},{"type":"p","text":"CVPilot üçüncü taraf reklam göstermez ve üçüncü taraf reklam takip SDK’ları kullanmaz. Mevcut sürümde CV analizi ve iş eşleştirme cihazınızda yerel olarak çalışacak şekilde tasarlanmıştır."},{"type":"h2","text":"7. Satın Almalar ve Premium Özellikler"},{"type":"p","text":"İsteğe bağlı satın almalar, abonelikler veya Premium erişim Apple App Store ya da Google Play tarafından işlenebilir. Kredi kartı bilgilerini almayız veya saklamayız. Satın alma durumu yerel olarak saklanabilir veya ilgili mağaza üzerinden doğrulanabilir."},{"type":"h2","text":"8. Veri Paylaşımı"},{"type":"p","text":"Kişisel verileri satmayız. Yerel olarak saklanan uygulama içeriği CAREO LIMITED sunucularıyla paylaşılmaz. Sınırlı veriler yalnızca bu Politikada açıklanan şekilde veya paylaşım, yazdırma, mağaza, değerlendirme ya da URL içe aktarma özelliklerini kullanmayı seçtiğinizde platformlar veya üçüncü taraf sağlayıcılar tarafından işlenebilir."},{"type":"h2","text":"9. Veri Saklama ve Silme"},{"type":"p","text":"Yerel veriler, mümkün olduğunda kayıtlı girişleri silene, ilgili uygulama verilerini sıfırlayana veya uygulamayı kaldırana kadar cihazınızda kalır. Geçici export dosyaları cihaz önbelleğinde saklanabilir. Mağaza ödeme kayıtları ve platform değerlendirme veya satın alma kayıtları Apple ya da Google tarafından kendi politikalarına göre saklanır."},{"type":"h2","text":"10. Kullanıcı Hakları"},{"type":"p","text":"Bölgenize bağlı olarak erişim, düzeltme, silme, sınırlandırma veya itiraz haklarınız olabilir. Verilerin çoğu yerel saklandığı için bunları genellikle uygulama veya cihaz ayarları üzerinden yönetebilir ya da silebilirsiniz. Gizlilik soruları için bizimle de iletişime geçebilirsiniz."},{"type":"h2","text":"11. Veri Güvenliği"},{"type":"p","text":"Uygun durumlarda harici iletişim için HTTPS kullanırız ve uygulamalarımızı veri toplamayı azaltacak şekilde tasarlarız. Hiçbir yazılım veya cihaz ortamı mutlak güvenlik garanti edemez."},{"type":"h2","text":"12. Çocukların Gizliliği"},{"type":"p","text":"Uygulama 13 yaş altındaki çocuklara yönelik değildir. 13 yaş altındaki çocuklardan bilerek kişisel veri toplamayız. Bir çocuğun kişisel veri sağladığını düşünüyorsanız bizimle iletişime geçin; uygun adımları atarız."},{"type":"h2","text":"13. Uluslararası Veri Aktarımları"},{"type":"p","text":"Platformlar ve üçüncü taraf sağlayıcılar sınırlı verileri ülkeniz dışındaki ülkelerde işleyebilir. Kanunen gerekli olduğunda uygun korumalar uygulanır."},{"type":"h2","text":"14. İletişim"},{"type":"p","html":"<strong>CAREO LIMITED</strong><br>careolimited@gmail.com<br>CVPilot - Privacy Inquiry"},{"type":"h2","text":"15. Politika Güncellemeleri"},{"type":"p","text":"Uygulama özellikleri, üçüncü taraf hizmetler veya yasal gereklilikler değişirse bu Politikayı güncelleyebiliriz. Güncellemeler yeni Son güncelleme tarihiyle gösterilir. Güncellemeden sonra uygulamayı kullanmaya devam etmeniz güncel Politikayı kabul ettiğiniz anlamına gelir."}]};

  const languageSelect = document.getElementById("languageSelect");
  const policyContent = document.getElementById("policyContent");
  const backLink = document.getElementById("backLink");
  const params = new URLSearchParams(window.location.search);
  const initialLanguage = params.get("lang") || localStorage.getItem("careo-language") || "en";
  function renderPolicy(language) {
    const selected = policyData[language] || policyData.en;
    const ui = uiText[language] || uiText.en;
    document.documentElement.lang = language;
    languageSelect.value = language;
    backLink.textContent = ui.back;
    backLink.href = `../index.html?lang=${encodeURIComponent(language)}`;
    policyContent.innerHTML = "";
    selected.forEach((block) => {
      if (block.type === "h1" || block.type === "h2") {
        const el = document.createElement(block.type); el.textContent = block.text; policyContent.appendChild(el);
      } else if (block.type === "p" || block.type === "meta") {
        const el = document.createElement("p"); if (block.type === "meta") el.className = "meta"; if (block.html) el.innerHTML = block.html; else el.textContent = block.text; policyContent.appendChild(el);
      } else if (block.type === "ul") {
        const ul = document.createElement("ul"); block.items.forEach((item) => { const li = document.createElement("li"); li.textContent = item; ul.appendChild(li); }); policyContent.appendChild(ul);
      }
    });
    document.title = `${selected[0].text} | CAREO LIMITED`;
    localStorage.setItem("careo-language", language);
    const url = new URL(window.location.href); url.searchParams.set("lang", language); window.history.replaceState(null, "", url.toString());
  }
  languageSelect.addEventListener("change", (event) => renderPolicy(event.target.value));
  renderPolicy(policyData[initialLanguage] ? initialLanguage : "en");
</script>
