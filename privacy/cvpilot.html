<script>
  const policyData = {"en": [{"type": "h1", "text": "Privacy Policy - CVPilot"}, {"type": "meta", "html": "<strong>Last updated:</strong> April 2026<br><strong>App:</strong> CVPilot<br><strong>Developer / Publisher:</strong> CAREO LIMITED<br><strong>Contact:</strong> careolimited@gmail.com"}, {"type": "p", "text": "CVPilot respects your privacy. This Policy explains what information may be processed, how it is used, and your rights when you use the mobile application on iOS and Android."}, {"type": "h2", "text": "1. Data Processing Overview"}, {"type": "p", "text": "CVPilot is designed to keep core app data on your device where possible. We do not sell personal data and we only use third-party services where they are needed for the features described below."}, {"type": "h2", "text": "2. Locally Stored Data"}, {"type": "p", "text": "The app may store data related to resume content, job description text, analysis results, history, usage limits, app preferences and premium status locally on your device. This data is used to provide app features, remember preferences and support offline usage where available."}, {"type": "h2", "text": "3. Processing Purposes"}, {"type": "ul", "items": ["Provide core app functionality", "Remember user preferences", "Support offline usage where available", "Process purchases or premium access where applicable", "Improve stability and prevent abuse"]}, {"type": "h2", "text": "4. Third-Party Services"}, {"type": "p", "text": "The app may use the following third-party services or providers: Apple App Store and Google Play. These services operate under their own privacy policies."}, {"type": "h2", "text": "5. Advertising and Tracking"}, {"type": "p", "text": "CVPilot does not display ads and is designed to process resume analysis locally on your device."}, {"type": "h2", "text": "6. Purchases and Premium Features"}, {"type": "p", "text": "Optional purchases, subscriptions or premium access may be processed by Apple App Store or Google Play. W on leurs propres politiques de confidentialité."}, {"type": "h2", "text": "5. Publicité et suivi"}, {"type": "p", "text": "CVPilot n’affiche pas de publicités et est conçue pour traiter l’analyse de CV localement sur votre appareil."}, {"type": "h2", "text": "6. Achats et fonctions Premium"}, {"type": "p", "text": "Les achats, abonnements ou accès Premium optionnels peuvent être traités par Apple App Store ou Google Play. Nous ne recevons ni ne stockons les informations de carte bancaire. L’état d’achat peut être stocké localement ou vérifié via la boutique concernée."}, {"type": "h2", "text": "7. Partage des données"}, {"type": "p", "text": "Nous ne vendons pas de données personnelles. Le contenu stocké localement n’est pas partagé avec les serveurs de CAREO LIMITED. Des données limitées peuvent être traitées par des fournisseurs tiers uniquement comme décrit dans cette Politique."}, {"type": "h2", "text": "8. Conservation et suppression"}, {"type": "p", "text": "Les données locales restent sur votre appareil jusqu’à ce que vous les supprimiez, réinitialisiez l’app ou désinstalliez l’app. Les enregistrements de paiement, données publicitaires et données d’analyse sont conservés par les fournisseurs concernés selon leurs propres politiques."}, {"type": "h2", "text": "9. Droits des utilisateurs"}, {"type": "p", "text": "Selon votre région, vous pouvez disposer de droits d’accès, de rectification, de suppression, de limitation ou d’opposition. Comme la plupart des données sont stockées localement, vous pouvez généralement les gérer ou les supprimer via l’app ou les réglages de votre appareil."}, {"type": "h2", "text": "10. Sécurité des données"}, {"type": "p", "text": "Nous utilisons HTTPS pour les communications externes lorsque cela s’applique et concevons nos apps pour réduire la collecte de données. Aucun logiciel ni appareil ne peut garantir une sécurité absolue."}, {"type": "h2", "text": "11. Confidentialité des enfants"}, {"type": "p", "text": "L’application ne imits, App-Einstellungen und Premium-Status lokal auf Ihrem Gerät speichern. Diese Daten werden genutzt, um App-Funktionen bereitzustellen, Einstellungen zu merken und Offline-Nutzung zu unterstützen, sofern verfügbar."}, {"type": "h2", "text": "3. Zwecke der Verarbeitung"}, {"type": "ul", "items": ["Bereitstellung der Kernfunktionen", "Speichern von Nutzereinstellungen", "Unterstützung der Offline-Nutzung, sofern verfügbar", "Verarbeitung von Käufen oder Premium-Zugriff, sofern zutreffend", "Verbesserung der Stabilität und Verhinderung von Missbrauch"]}, {"type": "h2", "text": "4. Drittanbieter-Dienste"}, {"type": "p", "text": "Die App kann folgende Drittanbieter-Dienste oder Anbieter verwenden: Apple App Store and Google Play. Diese Dienste unterliegen ihren eigenen Datenschutzrichtlinien."}, {"type": "h2", "text": "5. Werbung und Tracking"}, {"type": "p", "text": "CVPilot zeigt keine Werbung an und verarbeitet Lebenslaufanalysen lokal auf Ihrem Gerät."}, {"type": "h2", "text": "6. Käufe und Premium-Funktionen"}, {"type": "p", "text": "Optionale Käufe, Abonnements oder Premium-Zugriffe können über Apple App Store oder Google Play verarbeitet werden. Wir erhalten oder speichern keine Kreditkartendaten. Der Kaufstatus kann lokal gespeichert oder über den jeweiligen Store geprüft werden."}, {"type": "h2", "text": "7. Datenweitergabe"}, {"type": "p", "text": "Wir verkaufen keine personenbezogenen Daten. Lokal gespeicherte App-Inhalte werden nicht mit CAREO LIMITED-Servern geteilt. Begrenzte Daten können nur wie in dieser Richtlinie beschrieben durch Drittanbieter verarbeitet werden."}, {"type": "h2", "text": "8. Aufbewahrung und Löschung"}, {"type": "p", "text": "Lokale Daten bleiben auf Ihrem Gerät, bis Sie sie löschen, die App zurücksetzen oder deinstallieren. Zahlungs-, Werbe- und Analysedaten werden von den jeweiligen Anbietern gemäß deren Richtlinien gespeichert."}, {"type": "h2", "text": "9. Nutzerrechte"}, {"type": "p", "text": "Je nach Region können Sie Rechte ndo usi l’app mobile su iOS e Android."}, {"type": "h2", "text": "1. Panoramica del trattamento dei dati"}, {"type": "p", "text": "CVPilot è progettata per mantenere i dati principali sul dispositivo quando possibile. Non vendiamo dati personali e usiamo servizi di terze parti solo quando necessari per le funzioni descritte di seguito."}, {"type": "h2", "text": "2. Dati archiviati localmente"}, {"type": "p", "text": "L’app può archiviare localmente sul dispositivo dati relativi a contenuto del CV, descrizione del lavoro, risultati dell’analisi, cronologia, limiti di utilizzo, preferenze e stato Premium. Questi dati servono a fornire le funzioni dell’app, ricordare le preferenze e supportare l’uso offline dove disponibile."}, {"type": "h2", "text": "3. Finalità del trattamento"}, {"type": "ul", "items": ["Fornire le funzioni principali dell’app", "Ricordare le preferenze dell’utente", "Supportare l’uso offline dove disponibile", "Gestire acquisti o accesso Premium se applicabile", "Migliorare stabilità e prevenire abusi"]}, {"type": "h2", "text": "4. Servizi di terze parti"}, {"type": "p", "text": "L’app può usare i seguenti servizi o fornitori di terze parti: Apple App Store and Google Play. Questi servizi operano secondo le proprie informative sulla privacy."}, {"type": "h2", "text": "5. Pubblicità e tracciamento"}, {"type": "p", "text": "CVPilot non mostra annunci ed è progettata per elaborare l’analisi del CV localmente sul dispositivo."}, {"type": "h2", "text": "6. Acquisti e funzioni Premium"}, {"type": "p", "text": "Acquisti, abbonamenti o accessi Premium facoltativi possono essere elaborati da Apple App Store o Google Play. Non riceviamo né memorizziamo dati della carta di credito. Lo stato di acquisto può essere salvato localmente o verificato tramite lo store pertinente."}, {"type": "h2", "text": "7. Condivisione dei dati"}, {"type": "p", "text": "Non vendiamo dati personali. I contenuti dell’app archiviati localmente non vengono condivisi con server CAREO LIMITED. Dati limitati possono essere trattati da fornitori terzi solo come descritto in questa Informativa."}, {"type": "h2", "text": "8. Conservazione e cancellazione"}, {"type": "p", "text": "I dati locali restano sul dispositivo finché non li elimini, reimposti l’app o disinstalli l’app. Dati di pagamento, pubblicità e analisi sono conservati dai rispettivi fornitori secondo le loro politiche."}, {"type": "h2", "text": "9. Diritti degli utenti"}, {"type": "p", "text": "A seconda della tua regione, potresti avere diritti di accesso, rettifica, cancellazione, limitazione o opposizione. Poiché la maggior parte dei dati è archiviata localmente, di solito puoi gestirli o rimuoverli tramite l’app o le impostazioni del dispositivo."}, {"type": "h2", "text": "10. Sicurezza dei dati"}, {"type": "p", "text": "Usiamo HTTPS per le comunicazioni esterne quando applicabile e progettiamo le nostre app per ridurre la raccolta dati. Nessun software o dispositivo può garantire sicurezza assoluta."}, {"type": "h2", "text": "11. Privacy dei minori"}, {"type": "p", "text": "L’app non è rivolta a minori di 13 anni. Non raccogliamo consapevolmente dati personali da minori di 13 anni. Se ritieni che un minore abbia fornito dati personali, contattaci."}, {"type": "h2", "text": "12. Trasferimenti internazionali"}, {"type": "p", "text": "Fornitori terzi possono trattare dati limitati in paesi diversi dal tuo. Si applicano garanzie adeguate quando richiesto dalla legge."}, {"type": "h2", "text": "13. Contatto"}, {"type": "p", "html": "<strong>CAREO LIMITED</strong><br>careolimited@gmail.com<br>CVPilot - Privacy Inquiry"}, {"type": "h2", "text": "14. Aggiornamenti"}, {"type": "p", "text": "Possiamo aggiornare questa Informativa se cambiano funzioni dell’app, servizi terzi o requisiti legali. Gli aggiornamenti saranno indicati con una nuova data. L’uso continuato dell’app implica accettazione."}], "ja": [{"type": "h1", "text": "プライバシーポリシー - CVPilot"}, {"type": "meta", "html": "<strong>最終更新:</strong> April 2026<br><strong>アプリ:</strong> CVPilot<br><strong>開発者 / 発行者:</strong> CAREO LIMITED<br><strong>連絡先:</strong> careolimited@gmail.com"}, {"type": "p", "text": "CVPilotはプライバシーを尊重します。本ポリシーは、iOSおよびAndroidのモバイルアプリを利用する際に処理される可能性のある情報、その利用方法、ユーザーの権利について説明します。"}, {"type": "h2", "text": "1. データ処理の概要"}, {"type": "p", "text": "CVPilotは、可能な限り主要なアプリデータを端末内に保持するよう設計されています。個人データを販売することはなく、以下の機能に必要な場合のみ第三者サービスを使用します。"}, {"type": "h2", "text": "2. ローカル保存データ"}, {"type": "p", "text": "アプリは履歴書内容、求人説明文、分析結果、履歴、利用制限、アプリ設定、Premium状態に関連するデータを端末内に保存する場合があります。これらのデータは、機能提供、設定の保存、利用可能な場合のオフライン利用のために使用されます。"}, {"type": "h2", "text": "3. 処理目的"}, {"type": "ul", "items": ["アプリの主要機能を提供するため", "ユーザー設定を保存するため", "利用可能な場合にオフライン利用を支援するため", "該当する場合に購入またはPremiumアクセスを処理するため", "安定性を向上し、不正利用を防止するため"]}, {"type": "h2", "text": "4. 第三者サービス"}, {"type": "p", "text": "アプリは次の第三者サービスまたは提供元を使用する場合があります: Apple App Store and Google Play。これらのサービスにはそれぞれのプライバシーポリシーが適用されます。"}, {"type": "h2", "text": "5. 広告とトラッキング"}, {"type": "p", "text": "CVPilotは広告を表示せず、履歴書分析を端末上でローカルに処理するよう設計されています。"}, {"type": "h2", "text": "6. 購入とPremium機能"}, {"type": "p", "text": "任意の購入、サブスクリプション、PremiumアクセスはApple App StoreまたはGoogle Playによって処理される場合があります。当社はクレジットカード情報を受け取ったり保存したりしません。購入状態はローカルに保存されるか、該当ストアで確認される場合があります。"}, {"type": "h2", "text": "7. データ共有"}, {"type": "p", "text": "当社は個人データを販売しません。端末内に保存されたアプリ内容はCAREO LIMITEDのサーバーと共有されません。限定的なデータは本ポリシーに記載された場合のみ第三者提供元により処理されます。"}, {"type": "h2", "text": "8. 保持と削除"}, {"type": "p", "text": "ローカルデータは、ユーザーが削除、アプリをリセット、またはアンインストールするまで端末に残ります。支払い記録、広告データ、分析データは各提供元のポリシーに従って保持されます。"}, {"type": "h2", "text": "9. ユーザーの権利"}, {"type": "p", "text": "地域によって、アクセス、訂正、削除、制限、異議申し立ての権利がある場合があります。多くのデータはローカル保存のため、通常はアプリまたは端末設定から管理または削除できます。"}, {"type": "h2", "text": "10. データセキュリティ"}, {"type": "p", "text": "該当する場合、外部通信にはHTTPSを使用し、データ収集を最小限にするよう設計しています。ただし、ソフトウェアや端末環境が絶対的な安全性を保証することはできません。"}, {"type": "h2", "text": "11. 子どものプライバシー"}, {"type": "p", "text": "本アプリは13歳未満の子どもを対象としていません。13歳未満の子どもから意図的に個人データを収集することはありません。子どもが個人データを提供したと思われる場合はお問い合わせください。"}, {"type": "h2", "text": "12. 国際データ移転"}, {"type": "p", "text": "第三者提供元は、ユーザーの国以外で限定的なデータを処理する場合があります。法律で求められる場合は適切な保護措置が適用されます。"}, {"type": "h2", "text": "13. お問い合わせ"}, {"type": "p", "html": "<strong>CAREO LIMITED</strong><br>careolimited@gmail.com<br>CVPilot - Privacy Inquiry"}, {"type": "h2", "text": "14. ポリシー更新"}, {"type": "p", "text": "アプリ機能、第三者サービス、法的要件が変更された場合、本ポリシーを更新することがあります。更新は新しい最終更新日で表示されます。アプリの継続利用は更新後のポリシーへの同意を意味します。"}], "ko": [{"type": "h1", "text": "개인정보 처리방침 - CVPilot"}, {"type": "meta", "html": "<strong>마지막 업데이트:</strong> April 2026<br><strong>앱:</strong> CVPilot<br><strong>개발자 / 게시자:</strong> CAREO LIMITED<br><strong>문의:</strong> careolimited@gmail.com"}, {"type": "p", "text": "CVPilot은 개인정보를 존중합니다. 본 정책은 iOS 및 Android 모바일 앱을 사용할 때 어떤 정보가 처리될 수 있는지, 어떻게 사용되는지, 사용자의 권리가 무엇인지 설명합니다."}, {"type": "h2", "text": "1. 데이터 처리 개요"}, {"type": "p", "text": "CVPilot은 가능한 경우 핵심 앱 데이터를 사용자의 기기에 보관하도록 설계되었습니다. 당사는 개인정보를 판매하지 않으며 아래 기능에 필요한 경우에만 제3자 서비스를 사용합니다."}, {"type": "h2", "text": "2. 로컬 저장 데이터"}, {"type": "p", "text": "앱은 이력서 내용, 채용 공고 텍스트, 분석 결과, 기록, 사용 제한, 앱 설정 및 Premium 상태와 관련된 데이터를 기기에 로컬로 저장할 수 있습니다. 이 데이터는 앱 기능 제공, 설정 기억, 가능한 경우 오프라인 사용 지원에 사용됩니다."}, {"type": "h2", "text": "3. 처리 목적"}, {"type": "ul", "items": ["핵심 앱 기능 제공", "사용자 설정 기억", "가능한 경우 오프라인 사용 지원", "해당되는 경우 구매 또는 Premium 접근 처리", "안정성 개선 및 남용 방지"]}, {"type": "h2", "text": "4. 제3자 서비스"}, {"type": "p", "text": "앱은 다음 제3자 서비스 또는 제공업체를 사용할 수 있습니다: Apple App Store and Google Play. 해당 서비스에는 각자의 개인정보 처리방침이 적용됩니다."}, {"type": "h2", "text": "5. 광고 및 추적"}, {"type": "p", "text": "CVPilot은 광고를 표시하지 않으며 이력서 분석을 기기에서 로컬로 처리하도록 설계되었습니다."}, {"type": "h2", "text": "6. 구매 및 Premium 기능"}, {"type": "p", "text": "선택적 구매, 구독 또는 Premium 접근은 Apple App Store 또는 Google Play에서 처리될 수 있습니다. 당사는 신용카드 정보를 받거나 저장하지 않습니다. 구매 상태는 로컬에 저장되거나 해당 스토어를 통해 확인될 수 있습니다."}, {"type": "h2", "text": "7. 데이터 공유"}, {"type": "p", "text": "당사는 개인정보를 판매하지 않습니다. 로컬에 저장된 앱 콘텐츠는 CAREO LIMITED 서버와 공유되지 않습니다. 제한된 데이터는 본 정책에 설명된 경우에만 제3자 제공업체에 의해 처리될 수 있습니다."}, {"type": "h2", "text": "8. 보관 및 삭제"}, {"type": "p", "text": "로컬 데이터는 사용자가 삭제하거나 앱을 초기화하거나 제거할 때까지 기기에 남습니다. 스토어 결제 기록, 광고 데이터 및 분석 데이터는 해당 제공업체 정책에 따라 보관됩니다."}, {"type": "h2", "text": "9. 사용자 권리"}, {"type": "p", "text": "지역에 따라 접근, 정정, 삭제, 제한 또는 반대 권리가 있을 수 있습니다. 대부분의 앱 데이터는 로컬에 저장되므로 일반적으로 앱 또는 기기 설정에서 직접 관리하거나 제거할 수 있습니다."}, {"type": "h2", "text": "10. 데이터 보안"}, {"type": "p", "text": "해당되는 경우 외부 통신에 HTTPS를 사용하며 데이터 수집을 최소화하도록 앱을 설계합니다. 어떤 소프트웨어나 기기 환경도 절대적인 보안을 보장할 수는 없습니다."}, {"type": "h2", "text": "11. 아동 개인정보"}, {"type": "p", "text": "앱은 13세 미만 아동을 대상으로 하지 않습니다. 당사는 13세 미만 아동의 개인정보를 고의로 수집하지 않습니다. 아동이 개인정보를 제공했다고 생각되면 문의해 주세요."}, {"type": "h2", "text": "12. 국제 데이터 이전"}, {"type": "p", "text": "제3자 제공업체는 사용자의 국가 외 지역에서 제한된 데이터를 처리할 수 있습니다. 법에서 요구하는 경우 적절한 보호조치가 적용됩니다."}, {"type": "h2", "text": "13. 문의"}, {"type": "p", "html": "<strong>CAREO LIMITED</strong><br>careolimited@gmail.com<br>CVPilot - Privacy Inquiry"}, {"type": "h2", "text": "14. 정책 업데이트"}, {"type": "p", "text": "앱 기능, 제3자 서비스 또는 법적 요구사항이 변경되면 본 정책을 업데이트할 수 있습니다. 업데이트는 새로운 마지막 업데이트 날짜로 표시됩니다. 앱을 계속 사용하면 업데이트된 정책에 동의한 것으로 간주됩니다."}], "pt": [{"type": "h1", "text": "Política de Privacidade - CVPilot"}, {"type": "meta", "html": "<strong>Última atualização:</strong> April 2026<br><strong>App:</strong> CVPilot<br><strong>Programador / Editor:</strong> CAREO LIMITED<br><strong>Contacto:</strong> careolimited@gmail.com"}, {"type": "p", "text": "CVPilot respeita a sua privacidade. Esta Política explica que informações podem ser tratadas, como são utilizadas e quais são os seus direitos ao usar a aplicação móvel em iOS e Android."}, {"type": "h2", "text": "1. Visão geral do tratamento de dados"}, {"type": "p", "text": "CVPilot foi concebida para manter os dados principais no seu dispositivo sempre que possível. Não vendemos dados pessoais e usamos serviços de terceiros apenas quando são necessários para as funcionalidades descritas abaixo."}, {"type": "h2", "text": "2. Dados armazenados localmente"}, {"type": "p", "text": "A aplicação pode armazenar localmente no seu dispositivo dados relacionados com conteúdo de CV, descrição de emprego, resultados de análise, histórico, limites de utilização, preferências e estado Premium. Estes dados são usados para fornecer funcionalidades, lembrar preferências e suportar utilização offline quando disponível."}, {"type": "h2", "text": "3. Finalidades do tratamento"}, {"type": "ul", "items": ["Fornecer as funcionalidades principais da aplicação", "Lembrar preferências do utilizador", "Suportar utilização offline quando disponível", "Processar compras ou acesso Premium quando aplicável", "Melhorar a estabilidade e prevenir abusos"]}, {"type": "h2", "text": "4. Serviços de terceiros"}, {"type": "p", "text": "A aplicação pode usar os seguintes serviços ou fornecedores de terceiros: Apple App Store and Google Play. Estes serviços operam segundo as suas próprias políticas de privacidade."}, {"type": "h2", "text": "5. Publicidade e rastreio"}, {"type": "p", "text": "O CVPilot não apresenta anúncios e foi concebido para processar a análise de CV localmente no seu dispositivo."}, {"type": "h2", "text": "6. Compras e funcionalidades Premium"}, {"type": "p", "text": "Compras, subscrições ou acesso Premium opcionais podem ser processados pela Apple App Store ou Google Play. Não recebemos nem armazenamos dados de cartão de crédito. O estado da compra pode ser guardado localmente ou verificado através da loja relevante."}, {"type": "h2", "text": "7. Partilha de dados"}, {"type": "p", "text": "Não vendemos dados pessoais. O conteúdo armazenado localmente na app não é partilhado com servidores da CAREO LIMITED. Dados limitados podem ser tratados por fornecedores terceiros apenas conforme descrito nesta Política."}, {"type": "h2", "text": "8. Retenção e eliminação"}, {"type": "p", "text": "Os dados locais permanecem no dispositivo até os apagar, reiniciar a app ou desinstalar a app. Registos de pagamento, dados de publicidade e dados analíticos são retidos pelos respetivos fornecedores segundo as suas políticas."}, {"type": "h2", "text": "9. Direitos dos utilizadores"}, {"type": "p", "text": "Dependendo da sua região, pode ter direitos de acesso, correção, eliminação, limitação ou oposição. Como a maioria dos dados da app é armazenada localmente, normalmente pode geri-los ou removê-los diretamente pela app ou definições do dispositivo."}, {"type": "h2", "text": "10. Segurança dos dados"}, {"type": "p", "text": "Usamos HTTPS para comunicações externas quando aplicável e concebemos as nossas apps para minimizar a recolha de dados. Nenhum software ou dispositivo pode garantir segurança absoluta."}, {"type": "h2", "text": "11. Privacidade das crianças"}, {"type": "p", "text": "A app não se destina a crianças menores de 13 anos. Não recolhemos conscientemente dados pessoais de crianças menores de 13 anos. Se acredita que uma criança forneceu dados pessoais, contacte-nos."}, {"type": "h2", "text": "12. Transferências internacionais"}, {"type": "p", "text": "Fornecedores terceiros podem tratar dados limitados em países fora do seu. São aplicadas salvaguardas adequadas quando exigido por lei."}, {"type": "h2", "text": "13. Contacto"}, {"type": "p", "html": "<strong>CAREO LIMITED</strong><br>careolimited@gmail.com<br>CVPilot - Privacy Inquiry"}, {"type": "h2", "text": "14. Atualizações da Política"}, {"type": "p", "text": "Podemos atualizar esta Política se as funcionalidades da app, serviços terceiros ou requisitos legais mudarem. As atualizações serão refletidas com uma nova data. A utilização continuada da app implica aceitação."}], "ru": [{"type": "h1", "text": "Политика конфиденциальности - CVPilot"}, {"type": "meta", "html": "<strong>Последнее обновление:</strong> April 2026<br><strong>Приложение:</strong> CVPilot<br><strong>Разработчик / Издатель:</strong> CAREO LIMITED<br><strong>Контакт:</strong> careolimited@gmail.com"}, {"type": "p", "text": "CVPilot уважает вашу конфиденциальность. Эта Политика объясняет, какие сведения могут обрабатываться, как они используются и какие права у вас есть при использовании мобильного приложения на iOS и Android."}, {"type": "h2", "text": "1. Обзор обработки данных"}, {"type": "p", "text": "CVPilot разработано так, чтобы по возможности хранить основные данные приложения на вашем устройстве. Мы не продаем персональные данные и используем сторонние сервисы только там, где это необходимо для функций, описанных ниже."}, {"type": "h2", "text": "2. Локально хранимые данные"}, {"type": "p", "text": "Приложение может локально хранить на вашем устройстве данные, связанные с содержимое резюме, текст вакансии, результаты анализа, историю, лимиты использования, настройки приложения и статус Premium. Эти данные используются для работы функций приложения, сохранения настроек и поддержки офлайн-использования, если оно доступно."}, {"type": "h2", "text": "3. Цели обработки"}, {"type": "ul", "items": ["Предоставление основных функций приложения", "Сохранение пользовательских настроек", "Поддержка офлайн-использования, если доступно", "Обработка покупок или доступа Premium, если применимо", "Повышение стабильности и предотвращение злоупотреблений"]}, {"type": "h2", "text": "4. Сторонние сервисы"}, {"type": "p", "text": "Приложение может использовать следующие сторонние сервисы или поставщиков: Apple App Store and Google Play. Эти сервисы работают по собственным политикам конфиденциальности."}, {"type": "h2", "text": "5. Реклама и отслеживание"}, {"type": "p", "text": "CVPilot не показывает рекламу и предназначен для локальной обработки анализа резюме на вашем устройстве."}, {"type": "h2", "text": "6. Покупки и функции Premium"}, {"type": "p", "text": "Необязательные покупки, подписки или доступ Premium могут обрабатываться Apple App Store или Google Play. Мы не получаем и не храним данные кредитных карт. Статус покупки может храниться локально или проверяться через соответствующий магазин."}, {"type": "h2", "text": "7. Передача данных"}, {"type": "p", "text": "Мы не продаем персональные данные. Локально сохраненное содержимое приложения не передается на серверы CAREO LIMITED. Ограниченные данные могут обрабатываться сторонними поставщиками только как описано в этой Политике."}, {"type": "h2", "text": "8. Хранение и удаление"}, {"type": "p", "text": "Локальные данные остаются на устройстве, пока вы не удалите их, не сбросите приложение или не удалите приложение. Платежные записи, рекламные и аналитические данные хранятся соответствующими поставщиками согласно их политикам."}, {"type": "h2", "text": "9. Права пользователя"}, {"type": "p", "text": "В зависимости от вашего региона у вас могут быть права на доступ, исправление, удаление, ограничение или возражение против обработки. Поскольку большинство данных хранится локально, обычно ими можно управлять или удалить их через приложение или настройки устройства."}, {"type": "h2", "text": "10. Безопасность данных"}, {"type": "p", "text": "Мы используем HTTPS для внешних соединений, где это применимо, и проектируем приложения так, чтобы минимизировать сбор данных. Ни одна программная или аппаратная среда не может гарантировать абсолютную безопасность."}, {"type": "h2", "text": "11. Конфиденциальность детей"}, {"type": "p", "text": "Приложение не предназначено для детей младше 13 лет. Мы сознательно не собираем персональные данные детей младше 13 лет. Если вы считаете, что ребенок предоставил персональные данные, свяжитесь с нами."}, {"type": "h2", "text": "12. Международная передача данных"}, {"type": "p", "text": "Сторонние поставщики могут обрабатывать ограниченные данные в странах за пределами вашей страны. При необходимости применяются соответствующие гарантии."}, {"type": "h2", "text": "13. Контакты"}, {"type": "p", "html": "<strong>CAREO LIMITED</strong><br>careolimited@gmail.com<br>CVPilot - Privacy Inquiry"}, {"type": "h2", "text": "14. Обновления Политики"}, {"type": "p", "text": "Мы можем обновлять эту Политику при изменении функций приложения, сторонних сервисов или требований закона. Обновления будут отражены новой датой. Продолжение использования приложения означает принятие обновленной Политики."}], "es": [{"type": "h1", "text": "Política de privacidad - CVPilot"}, {"type": "meta", "html": "<strong>Última actualización:</strong> April 2026<br><strong>App:</strong> CVPilot<br><strong>Desarrollador / Editor:</strong> CAREO LIMITED<br><strong>Contacto:</strong> careolimited@gmail.com"}, {"type": "p", "text": "CVPilot respeta tu privacidad. Esta Política explica qué información puede procesarse, cómo se utiliza y cuáles son tus derechos al usar la aplicación móvil en iOS y Android."}, {"type": "h2", "text": "1. Resumen del procesamiento de datos"}, {"type": "p", "text": "CVPilot está diseñada para mantener los datos principales en tu dispositivo cuando sea posible. No vendemos datos personales y usamos servicios de terceros solo cuando son necesarios para las funciones descritas abajo."}, {"type": "h2", "text": "2. Datos almacenados localmente"}, {"type": "p", "text": "La app puede almacenar localmente en tu dispositivo datos relacionados con contenido del CV, descripción del puesto, resultados de análisis, historial, límites de uso, preferencias y estado Premium. Estos datos se usan para ofrecer funciones, recordar preferencias y permitir el uso sin conexión cuando esté disponible."}, {"type": "h2", "text": "3. Finalidades del procesamiento"}, {"type": "ul", "items": ["Proporcionar las funciones principales de la app", "Recordar preferencias del usuario", "Permitir uso sin conexión cuando esté disponible", "Procesar compras o acceso Premium cuando corresponda", "Mejorar la estabilidad y prevenir abusos"]}, {"type": "h2", "text": "4. Servicios de terceros"}, {"type": "p", "text": "La app puede usar los siguientes servicios o proveedores de terceros: Apple App Store and Google Play. Estos servicios operan bajo sus propias políticas de privacidad."}, {"type": "h2", "text": "5. Publicidad y seguimiento"}, {"type": "p", "text": "CVPilot no muestra anuncios y está diseñado para procesar el análisis del CV localmente en tu dispositivo."}, {"type": "h2", "text": "6. Compras y funciones Premium"}, {"type": "p", "text": "Las compras, suscripciones o accesos Premium opcionales pueden ser procesados por Apple App Store o Google Play. No recibimos ni almacenamos datos de tarjetas de crédito. El estado de compra puede guardarse localmente o verificarse mediante la tienda correspondiente."}, {"type": "h2", "text": "7. Compartición de datos"}, {"type": "p", "text": "No vendemos datos personales. El contenido almacenado localmente no se comparte con servidores de CAREO LIMITED. Datos limitados pueden ser procesados por proveedores terceros solo como se describe en esta Política."}, {"type": "h2", "text": "8. Conservación y eliminación"}, {"type": "p", "text": "Los datos locales permanecen en tu dispositivo hasta que los elimines, reinicies la app o desinstales la app. Los registros de pago, datos publicitarios y analíticos se conservan según las políticas de los proveedores correspondientes."}, {"type": "h2", "text": "9. Derechos del usuario"}, {"type": "p", "text": "Según tu región, puedes tener derechos de acceso, corrección, eliminación, limitación u oposición. Como la mayoría de los datos se almacenan localmente, normalmente puedes gestionarlos o eliminarlos desde la app o los ajustes del dispositivo."}, {"type": "h2", "text": "10. Seguridad de datos"}, {"type": "p", "text": "Usamos HTTPS para comunicaciones externas cuando corresponde y diseñamos nuestras apps para minimizar la recopilación de datos. Ningún software o dispositivo puede garantizar seguridad absoluta."}, {"type": "h2", "text": "11. Privacidad de menores"}, {"type": "p", "text": "La app no está dirigida a menores de 13 años. No recopilamos conscientemente datos personales de menores de 13 años. Si crees que un menor proporcionó datos personales, contáctanos."}, {"type": "h2", "text": "12. Transferencias internacionales"}, {"type": "p", "text": "Los proveedores terceros pueden procesar datos limitados en países fuera del tuyo. Se aplican salvaguardias adecuadas cuando lo exige la ley."}, {"type": "h2", "text": "13. Contacto"}, {"type": "p", "html": "<strong>CAREO LIMITED</strong><br>careolimited@gmail.com<br>CVPilot - Privacy Inquiry"}, {"type": "h2", "text": "14. Actualizaciones de la Política"}, {"type": "p", "text": "Podemos actualizar esta Política si cambian las funciones de la app, servicios terceros o requisitos legales. Las actualizaciones se reflejarán con una nueva fecha. El uso continuado de la app implica aceptación."}], "tr": [{"type": "h1", "text": "Gizlilik Politikası - CVPilot"}, {"type": "meta", "html": "<strong>Son güncelleme:</strong> April 2026<br><strong>Uygulama:</strong> CVPilot<br><strong>Geliştirici / Yayıncı:</strong> CAREO LIMITED<br><strong>İletişim:</strong> careolimited@gmail.com"}, {"type": "p", "text": "CVPilot gizliliğinize saygı duyar. Bu Politika, iOS ve Android mobil uygulamasını kullanırken hangi bilgilerin işlenebileceğini, nasıl kullanıldığını ve haklarınızı açıklar."}, {"type": "h2", "text": "1. Veri İşleme Özeti"}, {"type": "p", "text": "CVPilot, temel uygulama verilerini mümkün olduğunda cihazınızda tutacak şekilde tasarlanmıştır. Kişisel verileri satmayız ve üçüncü taraf hizmetleri yalnızca aşağıda açıklanan özellikler için gerekli olduğunda kullanırız."}, {"type": "h2", "text": "2. Yerel Olarak Saklanan Veriler"}, {"type": "p", "text": "Uygulama, CV içeriği, iş ilanı metni, analiz sonuçları, geçmiş, kullanım limitleri, uygulama tercihleri ve Premium durumu ile ilgili verileri cihazınızda yerel olarak saklayabilir. Bu veriler uygulama özelliklerini sunmak, tercihleri hatırlamak ve varsa çevrimdışı kullanımı desteklemek için kullanılır."}, {"type": "h2", "text": "3. İşleme Amaçları"}, {"type": "ul", "items": ["Temel uygulama özelliklerini sunmak", "Kullanıcı tercihlerini hatırlamak", "Varsa çevrimdışı kullanımı desteklemek", "Uygunsa satın alma veya Premium erişimi işlemek", "Kararlılığı artırmak ve kötüye kullanımı önlemek"]}, {"type": "h2", "text": "4. Üçüncü Taraf Hizmetler"}, {"type": "p", "text": "Uygulama şu üçüncü taraf hizmetleri veya sağlayıcıları kullanabilir: Apple App Store and Google Play. Bu hizmetler kendi gizlilik politikalarına göre çalışır."}, {"type": "h2", "text": "5. Reklam ve Takip"}, {"type": "p", "text": "CVPilot reklam göstermez ve CV analizini cihazınızda yerel olarak işlemek üzere tasarlanmıştır."}, {"type": "h2", "text": "6. Satın Almalar ve Premium Özellikler"}, {"type": "p", "text": "İsteğe bağlı satın almalar, abonelikler veya Premium erişim Apple App Store ya da Google Play tarafından işlenebilir. Kredi kartı bilgilerini almayız veya saklamayız. Satın alma durumu yerel olarak saklanabilir veya ilgili mağaza üzerinden doğrulanabilir."}, {"type": "h2", "text": "7. Veri Paylaşımı"}, {"type": "p", "text": "Kişisel verileri satmayız. Yerel olarak saklanan uygulama içeriği CAREO LIMITED sunucularıyla paylaşılmaz. Sınırlı veriler yalnızca bu Politikada açıklandığı şekilde üçüncü taraf sağlayıcılar tarafından işlenebilir."}, {"type": "h2", "text": "8. Saklama ve Silme"}, {"type": "p", "text": "Yerel veriler siz silene, uygulamayı sıfırlayana veya kaldırana kadar cihazınızda kalır. Mağaza ödeme kayıtları, reklam verileri ve analiz verileri ilgili sağlayıcıların politikalarına göre saklanır."}, {"type": "h2", "text": "9. Kullanıcı Hakları"}, {"type": "p", "text": "Bölgenize bağlı olarak erişim, düzeltme, silme, sınırlandırma veya itiraz haklarınız olabilir. Verilerin çoğu yerel saklandığı için bunları genellikle uygulama veya cihaz ayarları üzerinden yönetebilir ya da silebilirsiniz."}, {"type": "h2", "text": "10. Veri Güvenliği"}, {"type": "p", "text": "Uygun durumlarda harici iletişim için HTTPS kullanırız ve uygulamalarımızı veri toplamayı azaltacak şekilde tasarlarız. Hiçbir yazılım veya cihaz ortamı mutlak güvenlik garanti edemez."}, {"type": "h2", "text": "11. Çocukların Gizliliği"}, {"type": "p", "text": "Uygulama 13 yaş altındaki çocuklara yönelik değildir. 13 yaş altındaki çocuklardan bilerek kişisel veri toplamayız. Bir çocuğun kişisel veri sağladığını düşünüyorsanız bizimle iletişime geçin."}, {"type": "h2", "text": "12. Uluslararası Veri Aktarımları"}, {"type": "p", "text": "Üçüncü taraf sağlayıcılar sınırlı verileri ülkeniz dışındaki ülkelerde işleyebilir. Kanunen gerekli olduğunda uygun korumalar uygulanır."}, {"type": "h2", "text": "13. İletişim"}, {"type": "p", "html": "<strong>CAREO LIMITED</strong><br>careolimited@gmail.com<br>CVPilot - Privacy Inquiry"}, {"type": "h2", "text": "14. Politika Güncellemeleri"}, {"type": "p", "text": "Uygulama özellikleri, üçüncü taraf hizmetler veya yasal gereklilikler değişirse bu Politikayı güncelleyebiliriz. Güncellemeler yeni Son güncelleme tarihiyle gösterilir. Uygulamayı kullanmaya devam etmeniz güncel Politikayı kabul ettiğiniz anlamına gelir."}]};
  const uiText = {"en": {"back": "← Back to CAREO LIMITED", "privacy": "Privacy Policy", "last": "Last updated", "app": "App", "dev": "Developer / Publisher", "contact": "Contact", "lang": "Language"}, "fr": {"back": "← Retour à CAREO LIMITED", "privacy": "Politique de confidentialité", "last": "Dernière mise à jour", "app": "App", "dev": "Développeur / Éditeur", "contact": "Contact", "lang": "Langue"}, "de": {"back": "← Zurück zu CAREO LIMITED", "privacy": "Datenschutzerklärung", "last": "Letzte Aktualisierung", "app": "App", "dev": "Entwickler / Herausgeber", "contact": "Kontakt", "lang": "Sprache"}, "it": {"back": "← Torna a CAREO LIMITED", "privacy": "Informativa sulla privacy", "last": "Ultimo aggiornamento", "app": "App", "dev": "Sviluppatore / Editore", "contact": "Contatto", "lang": "Lingua"}, "ja": {"back": "← CAREO LIMITEDに戻る", "privacy": "プライバシーポリシー", "last": "最終更新", "app": "アプリ", "dev": "開発者 / 発行者", "contact": "連絡先", "lang": "言語"}, "ko": {"back": "← CAREO LIMITED로 돌아가기", "privacy": "개인정보 처리방침", "last": "마지막 업데이트", "app": "앱", "dev": "개발자 / 게시자", "contact": "문의", "lang": "언어"}, "pt": {"back": "← Voltar para CAREO LIMITED", "privacy": "Política de Privacidade", "last": "Última atualização", "app": "App", "dev": "Programador / Editor", "contact": "Contacto", "lang": "Idioma"}, "ru": {"back": "← Назад к CAREO LIMITED", "privacy": "Политика конфиденциальности", "last": "Последнее обновление", "app": "Приложение", "dev": "Разработчик / Издатель", "contact": "Контакт", "lang": "Язык"}, "es": {"back": "← Volver a CAREO LIMITED", "privacy": "Política de privacidad", "last": "Última actualización", "app": "App", "dev": "Desarrollador / Editor", "contact": "Contacto", "lang": "Idioma"}, "tr": {"back": "← CAREO LIMITED’a dön", "privacy": "Gizlilik Politikası", "last": "Son güncelleme", "app": "Uygulama", "dev": "Geliştirici / Yayıncı", "contact": "İletişim", "lang": "Dil"}};
  const languageSelect = document.getElementById("languageSelect");
  const policyContent = document.getElementById("policyContent");
  const backLink = document.getElementById("backLink");
  const params = new URLSearchParams(window.location.search);
  const initialLanguage = params.get("lang") || localStorage.getItem("careo-language") || "en";
  function renderPolicy(language) {
    const selected = policyData[language] || policyData.en;
    const ui = uiText[language] || uiText.en;
    document.documentElement.lang = language;
    languageSelect.value = language;
    backLink.textContent = ui.back;
    backLink.href = `../index.html?lang=${encodeURIComponent(language)}`;
    policyContent.innerHTML = "";
    selected.forEach((block) => {
      if (block.type === "h1" || block.type === "h2") {
        const el = document.createElement(block.type); el.textContent = block.text; policyContent.appendChild(el);
      } else if (block.type === "p" || block.type === "meta") {
        const el = document.createElement("p"); if (block.type === "meta") el.className = "meta"; if (block.html) el.innerHTML = block.html; else el.textContent = block.text; policyContent.appendChild(el);
      } else if (block.type === "ul") {
        const ul = document.createElement("ul"); block.items.forEach((item) => { const li = document.createElement("li"); li.textContent = item; ul.appendChild(li); }); policyContent.appendChild(ul);
      }
    });
    document.title = `${selected[0].text} | CAREO LIMITED`;
    localStorage.setItem("careo-language", language);
    const url = new URL(window.location.href); url.searchParams.set("lang", language); window.history.replaceState(null, "", url.toString());
  }
  languageSelect.addEventListener("change", (event) => renderPolicy(event.target.value));
  renderPolicy(policyData[initialLanguage] ? initialLanguage : "en");
</script>
