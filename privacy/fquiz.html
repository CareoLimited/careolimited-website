<script>
  const policyData = {"en":[{"type":"h1","text":"Privacy Policy - F Quiz"},{"type":"meta","html":"<strong>Last updated:</strong> July 2026<br><strong>App:</strong> F Quiz<br><strong>Developer / Publisher:</strong> CAREO LIMITED<br><strong>Contact:</strong> careolimited@gmail.com"},{"type":"p","text":"F Quiz respects your privacy. This Policy explains what information may be processed, how it is used, and your rights when you use the mobile application on iOS and Android."},{"type":"h2","text":"1. Data Processing Overview"},{"type":"p","text":"F Quiz processes only the information needed to provide the app, online accounts, leaderboards, multiplayer, advertising, analytics, security and support. Depending on the feature and your region, processing is based on providing the service you request, our legitimate interests in operating and securing the app, or your consent. We do not sell personal data."},{"type":"h2","text":"2. Locally Stored Data"},{"type":"p","text":"The app may store quiz progress, answers, scores, streaks, lives, missions, settings, language, ad preferences and offline progress on your device. Local data is used to operate the app, remember choices and support offline play where available."},{"type":"h2","text":"3. Processing Purposes"},{"type":"ul","items":["Provide quizzes, missions and other core app features","Authenticate accounts and synchronize eligible progress","Operate leaderboards, multiplayer rooms and matches","Remember preferences and support offline play","Measure advertising and app performance, diagnose errors and improve reliability","Protect the app, prevent fraud and respond to support requests"]},{"type":"h2","text":"4. Online Accounts, Leaderboards and Multiplayer"},{"type":"p","text":"If you sign in, Firebase may process your email address, account identifier, authentication provider, username or display name, selected flag, points, mission progress and synchronization data. Leaderboards make your username, flag, score or rank visible to other users. Multiplayer may process room codes and settings, participant identifiers and names, question or match progress, responses, scores, readiness and connection status so matches can be synchronized."},{"type":"h2","text":"5. Analytics and Advertising Diagnostics"},{"type":"p","text":"Firebase Analytics and advertising diagnostic events may process app and device information and interactions, including platform, app version, ad format and placement, load and display outcomes, latency ranges, network state, match type, ad source or adapter, response identifiers and impression-level revenue. We use this information to measure performance, troubleshoot ad delivery, prevent abuse and improve the app. Email addresses, passwords and quiz answer text are not included in our advertising lifecycle events."},{"type":"h2","text":"6. Third-Party Services"},{"type":"p","text":"The app may use Google Firebase Authentication, Cloud Firestore and Analytics; Google AdMob and the User Messaging Platform (UMP); Apple Game Center and App Store; and Google Play Games and Google Play. These providers process data under their own terms and privacy policies."},{"type":"h2","text":"7. Advertising and Tracking"},{"type":"p","text":"Google AdMob may provide banner, interstitial and rewarded ads. Depending on your device, settings, consent and region, the Google Mobile Ads SDK may process IP address for approximate location, app and ad interactions, diagnostic information, and device or advertising identifiers for advertising, measurement and fraud prevention. Where required, Google UMP is used to collect and manage privacy choices. You can reopen the UMP form from Privacy Options in your profile when that option is required. On iOS, App Tracking Transparency permission may also be requested. Choosing non-personalized or limited ads does not necessarily remove ads."},{"type":"h2","text":"8. Purchases and Premium Features"},{"type":"p","text":"Optional purchases, subscriptions or premium access may be processed by Apple App Store or Google Play. We do not receive or store credit card details. Purchase status may be stored locally or verified through the relevant store."},{"type":"h2","text":"9. Data Sharing"},{"type":"p","text":"We do not sell personal data. Data may be processed by the providers listed above only for the purposes described in this Policy. Public leaderboard details such as username, flag, points and rank, and relevant multiplayer details, may be visible to other players. Your email address and password are not displayed publicly."},{"type":"h2","text":"10. Data Retention and Deletion"},{"type":"p","text":"Local data remains until you clear it, reset the app or uninstall it. Account, profile, leaderboard and synchronized mission data may be retained while your account is active. You can request account deletion from the profile screen or by contacting us; account-linked personal data will be deleted or anonymized unless retention is required for security, fraud prevention, legal obligations or limited backups. Multiplayer, advertising and analytics records are retained only as necessary for their operational purposes and according to the relevant provider policies."},{"type":"h2","text":"11. User Rights"},{"type":"p","text":"Depending on your location, you may have rights to access, correct, delete, restrict, object to or receive a copy of your personal data, and to withdraw consent. You can edit certain profile information or request account deletion in the app, contact us for other requests, manage device advertising permissions in system settings, and change UMP choices through Privacy Options when available. Withdrawal of consent does not affect processing completed before withdrawal."},{"type":"h2","text":"12. Data Security"},{"type":"p","text":"We use HTTPS for external communications where applicable and design our apps to minimize data collection. No software or device environment can guarantee absolute security."},{"type":"h2","text":"13. Children’s Privacy"},{"type":"p","text":"The app is not directed to children under 13. We do not knowingly collect personal data from children under 13. If you believe a child has provided personal data, contact us."},{"type":"h2","text":"14. International Data Transfers"},{"type":"p","text":"Third-party providers may process limited data in countries outside your own. Appropriate safeguards apply where required by law."},{"type":"h2","text":"15. Contact"},{"type":"p","html":"<strong>CAREO LIMITED</strong><br>71-75 Shelton Street, Covent Garden, London, United Kingdom, WC2H 9JQ<br>careolimited@gmail.com<br>F Quiz - Privacy Inquiry"},{"type":"h2","text":"16. Policy Updates"},{"type":"p","text":"We may update this Policy if app features, third-party services or legal requirements change. Updates will be reflected with a new Last updated date. Continued use of the app implies acceptance of the updated Policy."}],"fr":[{"type":"h1","text":"Politique de confidentialité - F Quiz"},{"type":"meta","html":"<strong>Dernière mise à jour:</strong> juillet 2026<br><strong>App:</strong> F Quiz<br><strong>Développeur / Éditeur:</strong> CAREO LIMITED<br><strong>Contact:</strong> careolimited@gmail.com"},{"type":"p","text":"F Quiz respecte votre vie privée. Cette Politique explique quelles informations peuvent être traitées, comment elles sont utilisées et quels sont vos droits lorsque vous utilisez l’application mobile sur iOS et Android."},{"type":"h2","text":"1. Aperçu du traitement des données"},{"type":"p","text":"F Quiz traite uniquement les informations nécessaires au fonctionnement de l’application, des comptes en ligne, des classements, du multijoueur, de la publicité, des analyses, de la sécurité et de l’assistance. Selon la fonction et votre région, le traitement repose sur la fourniture du service demandé, notre intérêt légitime à exploiter et sécuriser l’application, ou votre consentement. Nous ne vendons pas de données personnelles."},{"type":"h2","text":"2. Données stockées localement"},{"type":"p","text":"L’application peut stocker sur votre appareil la progression des quiz, les réponses, scores, séries, vies, missions, réglages, langue, préférences publicitaires et progression hors ligne. Ces données locales servent à faire fonctionner l’application, mémoriser vos choix et permettre le jeu hors ligne lorsqu’il est disponible."},{"type":"h2","text":"3. Finalités du traitement"},{"type":"ul","items":["Fournir les quiz, missions et fonctions principales","Authentifier les comptes et synchroniser la progression éligible","Gérer les classements, salons et matchs multijoueurs","Mémoriser les préférences et permettre le jeu hors ligne","Mesurer les performances publicitaires et de l’application, diagnostiquer les erreurs et améliorer la fiabilité","Protéger l’application, prévenir la fraude et répondre aux demandes d’assistance"]},{"type":"h2","text":"4. Comptes en ligne, classements et multijoueur"},{"type":"p","text":"Si vous vous connectez, Firebase peut traiter votre adresse e-mail, identifiant de compte, fournisseur d’authentification, nom d’utilisateur ou nom affiché, drapeau choisi, points, progression des missions et données de synchronisation. Les classements rendent votre nom d’utilisateur, drapeau, score ou rang visibles aux autres utilisateurs. Le multijoueur peut traiter les codes et réglages de salon, les identifiants et noms des participants, la progression des questions ou du match, les réponses, scores, états de préparation et de connexion afin de synchroniser les parties."},{"type":"h2","text":"5. Analyses et diagnostics publicitaires"},{"type":"p","text":"Firebase Analytics et les événements de diagnostic publicitaire peuvent traiter des informations et interactions relatives à l’application et à l’appareil, notamment la plateforme, la version, le format et l’emplacement publicitaire, les résultats de chargement et d’affichage, les plages de latence, l’état du réseau, le type de match, la source ou l’adaptateur publicitaire, les identifiants de réponse et les revenus au niveau de l’impression. Ces données servent à mesurer les performances, diagnostiquer la diffusion des annonces, prévenir les abus et améliorer l’application. Les adresses e-mail, mots de passe et textes des réponses aux quiz ne figurent pas dans nos événements de cycle de vie publicitaire."},{"type":"h2","text":"6. Services tiers"},{"type":"p","text":"L’application peut utiliser Google Firebase Authentication, Cloud Firestore et Analytics, Google AdMob et User Messaging Platform (UMP), Apple Game Center et App Store, ainsi que Google Play Games et Google Play. Ces fournisseurs traitent les données selon leurs propres conditions et politiques de confidentialité."},{"type":"h2","text":"7. Publicité et suivi"},{"type":"p","text":"Google AdMob peut fournir des bannières, annonces interstitielles et annonces avec récompense. Selon votre appareil, vos réglages, votre consentement et votre région, le SDK Google Mobile Ads peut traiter l’adresse IP pour une localisation approximative, les interactions avec l’application et les annonces, des informations de diagnostic et des identifiants d’appareil ou publicitaires à des fins de publicité, mesure et prévention de la fraude. Lorsque cela est requis, Google UMP gère les choix de confidentialité. Vous pouvez rouvrir le formulaire UMP depuis Options de confidentialité dans votre profil lorsque cette option est requise. Sur iOS, l’autorisation App Tracking Transparency peut également être demandée. Le choix d’annonces non personnalisées ou limitées ne supprime pas nécessairement les annonces."},{"type":"h2","text":"8. Achats et fonctions Premium"},{"type":"p","text":"Les achats, abonnements ou accès Premium optionnels peuvent être traités par Apple App Store ou Google Play. Nous ne recevons ni ne stockons les informations de carte bancaire. L’état d’achat peut être stocké localement ou vérifié via la boutique concernée."},{"type":"h2","text":"9. Partage des données"},{"type":"p","text":"Nous ne vendons pas de données personnelles. Les données peuvent être traitées par les fournisseurs mentionnés ci-dessus uniquement aux fins décrites dans cette Politique. Les informations publiques du classement, comme le nom d’utilisateur, le drapeau, les points et le rang, ainsi que les informations multijoueurs pertinentes, peuvent être visibles par d’autres joueurs. Votre adresse e-mail et votre mot de passe ne sont pas affichés publiquement."},{"type":"h2","text":"10. Conservation et suppression"},{"type":"p","text":"Les données locales restent jusqu’à leur suppression, la réinitialisation de l’application ou sa désinstallation. Les données de compte, profil, classement et missions synchronisées peuvent être conservées tant que votre compte est actif. Vous pouvez demander la suppression du compte depuis le profil ou en nous contactant ; les données personnelles liées au compte seront supprimées ou anonymisées, sauf conservation nécessaire pour la sécurité, la prévention de la fraude, des obligations légales ou des sauvegardes limitées. Les données multijoueurs, publicitaires et analytiques sont conservées uniquement selon les besoins opérationnels et les politiques des fournisseurs concernés."},{"type":"h2","text":"11. Droits des utilisateurs"},{"type":"p","text":"Selon votre lieu de résidence, vous pouvez disposer de droits d’accès, rectification, suppression, limitation, opposition, portabilité et retrait du consentement. Vous pouvez modifier certaines informations du profil ou demander la suppression du compte dans l’application, nous contacter pour d’autres demandes, gérer les autorisations publicitaires dans les réglages du système et modifier vos choix UMP via Options de confidentialité lorsqu’elles sont disponibles. Le retrait du consentement n’affecte pas les traitements antérieurs."},{"type":"h2","text":"12. Sécurité des données"},{"type":"p","text":"Nous utilisons HTTPS pour les communications externes lorsque cela s’applique et concevons nos apps pour réduire la collecte de données. Aucun logiciel ni appareil ne peut garantir une sécurité absolue."},{"type":"h2","text":"13. Confidentialité des enfants"},{"type":"p","text":"L’application ne s’adresse pas aux enfants de moins de 13 ans. Nous ne collectons pas sciemment de données personnelles d’enfants de moins de 13 ans. Si vous pensez qu’un enfant a fourni des données personnelles, contactez-nous."},{"type":"h2","text":"14. Transferts internationaux"},{"type":"p","text":"Des fournisseurs tiers peuvent traiter des données limitées dans des pays autres que le vôtre. Des garanties appropriées s’appliquent lorsque la loi l’exige."},{"type":"h2","text":"15. Contact"},{"type":"p","html":"<strong>CAREO LIMITED</strong><br>71-75 Shelton Street, Covent Garden, London, United Kingdom, WC2H 9JQ<br>careolimited@gmail.com<br>F Quiz - Privacy Inquiry"},{"type":"h2","text":"16. Mises à jour de la Politique"},{"type":"p","text":"Nous pouvons mettre à jour cette Politique si les fonctions de l’app, les services tiers ou les exigences légales changent. Les mises à jour seront indiquées par une nouvelle date de mise à jour. L’utilisation continue de l’app implique l’acceptation de la Politique mise à jour."}],"de":[{"type":"h1","text":"Datenschutzerklärung - F Quiz"},{"type":"meta","html":"<strong>Letzte Aktualisierung:</strong> Juli 2026<br><strong>App:</strong> F Quiz<br><strong>Entwickler / Herausgeber:</strong> CAREO LIMITED<br><strong>Kontakt:</strong> careolimited@gmail.com"},{"type":"p","text":"F Quiz respektiert Ihre Privatsphäre. Diese Richtlinie erklärt, welche Informationen verarbeitet werden können, wie sie verwendet werden und welche Rechte Sie bei der Nutzung der mobilen App auf iOS und Android haben."},{"type":"h2","text":"1. Überblick zur Datenverarbeitung"},{"type":"p","text":"F Quiz verarbeitet nur Informationen, die für die App, Online-Konten, Bestenlisten, Multiplayer, Werbung, Analysen, Sicherheit und Support erforderlich sind. Je nach Funktion und Region beruht die Verarbeitung auf der Bereitstellung des angeforderten Dienstes, unserem berechtigten Interesse am Betrieb und Schutz der App oder Ihrer Einwilligung. Wir verkaufen keine personenbezogenen Daten."},{"type":"h2","text":"2. Lokal gespeicherte Daten"},{"type":"p","text":"Die App kann Quizfortschritt, Antworten, Punkte, Serien, Leben, Missionen, Einstellungen, Sprache, Werbepräferenzen und Offline-Fortschritt auf Ihrem Gerät speichern. Lokale Daten dienen dem Betrieb der App, dem Speichern Ihrer Auswahl und dem Offline-Spiel, sofern verfügbar."},{"type":"h2","text":"3. Zwecke der Verarbeitung"},{"type":"ul","items":["Quiz, Missionen und Kernfunktionen bereitstellen","Konten authentifizieren und geeigneten Fortschritt synchronisieren","Bestenlisten, Multiplayer-Räume und Spiele betreiben","Einstellungen speichern und Offline-Spiel unterstützen","Werbe- und App-Leistung messen, Fehler diagnostizieren und Zuverlässigkeit verbessern","Die App schützen, Betrug verhindern und Supportanfragen bearbeiten"]},{"type":"h2","text":"4. Online-Konten, Bestenlisten und Multiplayer"},{"type":"p","text":"Wenn Sie sich anmelden, kann Firebase Ihre E-Mail-Adresse, Konto-ID, den Authentifizierungsanbieter, Benutzer- oder Anzeigenamen, die gewählte Flagge, Punkte, Missionsfortschritt und Synchronisierungsdaten verarbeiten. Bestenlisten machen Benutzername, Flagge, Punktestand oder Rang für andere sichtbar. Im Multiplayer können Raumcodes und Einstellungen, Teilnehmer-IDs und Namen, Fragen- oder Spielfortschritt, Antworten, Punktestände sowie Bereitschafts- und Verbindungsstatus zur Synchronisierung verarbeitet werden."},{"type":"h2","text":"5. Analysen und Werbediagnosen"},{"type":"p","text":"Firebase Analytics und Werbediagnose-Ereignisse können App- und Geräteinformationen sowie Interaktionen verarbeiten, darunter Plattform, App-Version, Werbeformat und Platzierung, Lade- und Anzeigeergebnisse, Latenzbereiche, Netzwerkstatus, Spieltyp, Werbequelle oder Adapter, Antwort-IDs und Einnahmen pro Impression. Diese Informationen dienen der Leistungsmessung, Fehleranalyse bei der Anzeigenbereitstellung, Missbrauchsprävention und Verbesserung der App. E-Mail-Adressen, Passwörter und Texte von Quizantworten sind nicht in unseren Werbelebenszyklus-Ereignissen enthalten."},{"type":"h2","text":"6. Drittanbieter-Dienste"},{"type":"p","text":"Die App kann Google Firebase Authentication, Cloud Firestore und Analytics, Google AdMob und die User Messaging Platform (UMP), Apple Game Center und App Store sowie Google Play Games und Google Play verwenden. Diese Anbieter verarbeiten Daten nach ihren eigenen Bedingungen und Datenschutzrichtlinien."},{"type":"h2","text":"7. Werbung und Tracking"},{"type":"p","text":"Google AdMob kann Banner-, Interstitial- und Rewarded-Anzeigen bereitstellen. Je nach Gerät, Einstellungen, Einwilligung und Region kann das Google Mobile Ads SDK IP-Adressen zur ungefähren Standortbestimmung, App- und Werbeinteraktionen, Diagnosedaten sowie Geräte- oder Werbe-IDs für Werbung, Messung und Betrugsprävention verarbeiten. Wo erforderlich, verwaltet Google UMP die Datenschutzentscheidungen. Das UMP-Formular kann über Datenschutzoptionen im Profil erneut geöffnet werden, wenn diese Option erforderlich ist. Unter iOS kann außerdem die App-Tracking-Transparency-Berechtigung angefordert werden. Nicht personalisierte oder eingeschränkte Werbung entfernt Werbung nicht zwingend."},{"type":"h2","text":"8. Käufe und Premium-Funktionen"},{"type":"p","text":"Optionale Käufe, Abonnements oder Premium-Zugriffe können über Apple App Store oder Google Play verarbeitet werden. Wir erhalten oder speichern keine Kreditkartendaten. Der Kaufstatus kann lokal gespeichert oder über den jeweiligen Store geprüft werden."},{"type":"h2","text":"9. Datenweitergabe"},{"type":"p","text":"Wir verkaufen keine personenbezogenen Daten. Daten dürfen von den oben genannten Anbietern nur zu den in dieser Richtlinie beschriebenen Zwecken verarbeitet werden. Öffentliche Bestenlistendaten wie Benutzername, Flagge, Punkte und Rang sowie relevante Multiplayer-Daten können für andere Spieler sichtbar sein. E-Mail-Adresse und Passwort werden nicht öffentlich angezeigt."},{"type":"h2","text":"10. Aufbewahrung und Löschung"},{"type":"p","text":"Lokale Daten bleiben gespeichert, bis Sie sie löschen, die App zurücksetzen oder deinstallieren. Konto-, Profil-, Bestenlisten- und synchronisierte Missionsdaten können während der Aktivität Ihres Kontos gespeichert werden. Die Kontolöschung kann im Profil oder über uns angefordert werden; kontobezogene personenbezogene Daten werden gelöscht oder anonymisiert, sofern keine Aufbewahrung für Sicherheit, Betrugsprävention, gesetzliche Pflichten oder begrenzte Sicherungen erforderlich ist. Multiplayer-, Werbe- und Analysedaten werden nur für betriebliche Zwecke und gemäß den Richtlinien der jeweiligen Anbieter gespeichert."},{"type":"h2","text":"11. Nutzerrechte"},{"type":"p","text":"Je nach Standort können Sie Rechte auf Auskunft, Berichtigung, Löschung, Einschränkung, Widerspruch, Datenübertragbarkeit und Widerruf der Einwilligung haben. Bestimmte Profildaten können in der App geändert und die Kontolöschung angefordert werden. Für weitere Anfragen können Sie uns kontaktieren, Werbeberechtigungen in den Systemeinstellungen verwalten und UMP-Entscheidungen über Datenschutzoptionen ändern, sofern verfügbar. Ein Widerruf berührt die vorherige Verarbeitung nicht."},{"type":"h2","text":"12. Datensicherheit"},{"type":"p","text":"Wir verwenden HTTPS für externe Kommunikation, sofern zutreffend, und gestalten unsere Apps so, dass die Datenerhebung minimiert wird. Keine Software- oder Geräteumgebung kann absolute Sicherheit garantieren."},{"type":"h2","text":"13. Datenschutz von Kindern"},{"type":"p","text":"Die App richtet sich nicht an Kinder unter 13 Jahren. Wir sammeln wissentlich keine personenbezogenen Daten von Kindern unter 13 Jahren. Wenn Sie glauben, dass ein Kind personenbezogene Daten bereitgestellt hat, kontaktieren Sie uns."},{"type":"h2","text":"14. Internationale Datenübertragungen"},{"type":"p","text":"Drittanbieter können begrenzte Daten in Ländern außerhalb Ihres Landes verarbeiten. Gesetzlich erforderliche Schutzmaßnahmen werden angewendet."},{"type":"h2","text":"15. Kontakt"},{"type":"p","html":"<strong>CAREO LIMITED</strong><br>71-75 Shelton Street, Covent Garden, London, United Kingdom, WC2H 9JQ<br>careolimited@gmail.com<br>F Quiz - Privacy Inquiry"},{"type":"h2","text":"16. Aktualisierungen"},{"type":"p","text":"Wir können diese Richtlinie aktualisieren, wenn sich App-Funktionen, Drittanbieter-Dienste oder gesetzliche Anforderungen ändern. Aktualisierungen werden mit einem neuen Aktualisierungsdatum angezeigt. Die weitere Nutzung der App gilt als Zustimmung."}],"it":[{"type":"h1","text":"Informativa sulla privacy - F Quiz"},{"type":"meta","html":"<strong>Ultimo aggiornamento:</strong> luglio 2026<br><strong>App:</strong> F Quiz<br><strong>Sviluppatore / Editore:</strong> CAREO LIMITED<br><strong>Contatto:</strong> careolimited@gmail.com"},{"type":"p","text":"F Quiz rispetta la tua privacy. Questa Informativa spiega quali informazioni possono essere trattate, come vengono utilizzate e quali diritti hai quando usi l’app mobile su iOS e Android."},{"type":"h2","text":"1. Panoramica del trattamento dei dati"},{"type":"p","text":"F Quiz tratta solo le informazioni necessarie per fornire l’app, gli account online, le classifiche, il multiplayer, la pubblicità, le analisi, la sicurezza e l’assistenza. In base alla funzione e alla regione, il trattamento si fonda sull’erogazione del servizio richiesto, sul nostro legittimo interesse a gestire e proteggere l’app o sul consenso. Non vendiamo dati personali."},{"type":"h2","text":"2. Dati archiviati localmente"},{"type":"p","text":"L’app può memorizzare sul dispositivo progressi dei quiz, risposte, punteggi, serie, vite, missioni, impostazioni, lingua, preferenze pubblicitarie e progressi offline. I dati locali servono a far funzionare l’app, ricordare le scelte e supportare il gioco offline quando disponibile."},{"type":"h2","text":"3. Finalità del trattamento"},{"type":"ul","items":["Fornire quiz, missioni e funzioni principali","Autenticare gli account e sincronizzare i progressi idonei","Gestire classifiche, stanze e partite multiplayer","Ricordare le preferenze e supportare il gioco offline","Misurare le prestazioni di pubblicità e app, diagnosticare errori e migliorare l’affidabilità","Proteggere l’app, prevenire frodi e rispondere alle richieste di assistenza"]},{"type":"h2","text":"4. Account online, classifiche e multiplayer"},{"type":"p","text":"Se accedi, Firebase può trattare indirizzo e-mail, identificativo account, provider di autenticazione, nome utente o visualizzato, bandiera scelta, punti, progressi delle missioni e dati di sincronizzazione. Le classifiche rendono visibili agli altri utenti nome utente, bandiera, punteggio o posizione. Il multiplayer può trattare codici e impostazioni delle stanze, identificativi e nomi dei partecipanti, avanzamento di domande o partite, risposte, punteggi, stato di preparazione e connessione per sincronizzare le partite."},{"type":"h2","text":"5. Analisi e diagnostica pubblicitaria"},{"type":"p","text":"Firebase Analytics e gli eventi diagnostici pubblicitari possono trattare informazioni e interazioni relative ad app e dispositivo, tra cui piattaforma, versione dell’app, formato e posizionamento degli annunci, esiti di caricamento e visualizzazione, intervalli di latenza, stato della rete, tipo di partita, sorgente o adapter pubblicitario, identificativi di risposta e ricavi a livello di impressione. Usiamo queste informazioni per misurare le prestazioni, risolvere problemi pubblicitari, prevenire abusi e migliorare l’app. Indirizzi e-mail, password e testo delle risposte ai quiz non sono inclusi nei nostri eventi del ciclo pubblicitario."},{"type":"h2","text":"6. Servizi di terze parti"},{"type":"p","text":"L’app può utilizzare Google Firebase Authentication, Cloud Firestore e Analytics, Google AdMob e User Messaging Platform (UMP), Apple Game Center e App Store, nonché Google Play Games e Google Play. Questi fornitori trattano i dati secondo i propri termini e le proprie informative sulla privacy."},{"type":"h2","text":"7. Pubblicità e tracciamento"},{"type":"p","text":"Google AdMob può fornire banner, annunci interstitial e con premio. In base a dispositivo, impostazioni, consenso e regione, Google Mobile Ads SDK può trattare indirizzo IP per la posizione approssimativa, interazioni con app e annunci, dati diagnostici e identificativi del dispositivo o pubblicitari per pubblicità, misurazione e prevenzione delle frodi. Dove richiesto, Google UMP gestisce le scelte sulla privacy. Puoi riaprire il modulo UMP da Opzioni sulla privacy nel profilo quando tale opzione è richiesta. Su iOS può essere richiesta anche l’autorizzazione App Tracking Transparency. La scelta di annunci non personalizzati o limitati non elimina necessariamente gli annunci."},{"type":"h2","text":"8. Acquisti e funzioni Premium"},{"type":"p","text":"Acquisti, abbonamenti o accessi Premium facoltativi possono essere elaborati da Apple App Store o Google Play. Non riceviamo né memorizziamo dati della carta di credito. Lo stato di acquisto può essere salvato localmente o verificato tramite lo store pertinente."},{"type":"h2","text":"9. Condivisione dei dati"},{"type":"p","text":"Non vendiamo dati personali. I dati possono essere trattati dai fornitori sopra elencati solo per gli scopi descritti in questa Informativa. I dati pubblici della classifica, come nome utente, bandiera, punti e posizione, e i dati multiplayer pertinenti possono essere visibili agli altri giocatori. L’indirizzo e-mail e la password non sono mostrati pubblicamente."},{"type":"h2","text":"10. Conservazione e cancellazione"},{"type":"p","text":"I dati locali restano finché non li elimini, reimposti l’app o la disinstalli. I dati di account, profilo, classifica e missioni sincronizzate possono essere conservati mentre l’account è attivo. Puoi richiedere l’eliminazione dell’account dal profilo o contattandoci; i dati personali collegati saranno eliminati o anonimizzati salvo necessità di conservazione per sicurezza, prevenzione delle frodi, obblighi legali o backup limitati. I dati multiplayer, pubblicitari e analitici sono conservati solo per le esigenze operative e secondo le politiche dei relativi fornitori."},{"type":"h2","text":"11. Diritti degli utenti"},{"type":"p","text":"In base alla tua località, puoi avere diritti di accesso, rettifica, cancellazione, limitazione, opposizione, portabilità e revoca del consenso. Puoi modificare alcune informazioni del profilo o richiedere l’eliminazione dell’account nell’app, contattarci per altre richieste, gestire le autorizzazioni pubblicitarie nelle impostazioni di sistema e modificare le scelte UMP tramite Opzioni sulla privacy quando disponibili. La revoca non incide sui trattamenti precedenti."},{"type":"h2","text":"12. Sicurezza dei dati"},{"type":"p","text":"Usiamo HTTPS per le comunicazioni esterne quando applicabile e progettiamo le nostre app per ridurre la raccolta dati. Nessun software o dispositivo può garantire sicurezza assoluta."},{"type":"h2","text":"13. Privacy dei minori"},{"type":"p","text":"L’app non è rivolta a minori di 13 anni. Non raccogliamo consapevolmente dati personali da minori di 13 anni. Se ritieni che un minore abbia fornito dati personali, contattaci."},{"type":"h2","text":"14. Trasferimenti internazionali"},{"type":"p","text":"Fornitori terzi possono trattare dati limitati in paesi diversi dal tuo. Si applicano garanzie adeguate quando richiesto dalla legge."},{"type":"h2","text":"15. Contatto"},{"type":"p","html":"<strong>CAREO LIMITED</strong><br>71-75 Shelton Street, Covent Garden, London, United Kingdom, WC2H 9JQ<br>careolimited@gmail.com<br>F Quiz - Privacy Inquiry"},{"type":"h2","text":"16. Aggiornamenti"},{"type":"p","text":"Possiamo aggiornare questa Informativa se cambiano funzioni dell’app, servizi terzi o requisiti legali. Gli aggiornamenti saranno indicati con una nuova data. L’uso continuato dell’app implica accettazione."}],"ja":[{"type":"h1","text":"プライバシーポリシー - F Quiz"},{"type":"meta","html":"<strong>最終更新:</strong> 2026年7月<br><strong>アプリ:</strong> F Quiz<br><strong>開発者 / 発行者:</strong> CAREO LIMITED<br><strong>連絡先:</strong> careolimited@gmail.com"},{"type":"p","text":"F Quizはプライバシーを尊重します。本ポリシーは、iOSおよびAndroidのモバイルアプリを利用する際に処理される可能性のある情報、その利用方法、ユーザーの権利について説明します。"},{"type":"h2","text":"1. データ処理の概要"},{"type":"p","text":"F Quizは、アプリ、オンラインアカウント、ランキング、マルチプレイヤー、広告、分析、セキュリティおよびサポートの提供に必要な情報のみを処理します。機能と地域に応じて、処理はお客様が要求したサービスの提供、アプリの運営と保護に関する正当な利益、またはお客様の同意に基づきます。個人データを販売することはありません。"},{"type":"h2","text":"2. ローカル保存データ"},{"type":"p","text":"アプリは、クイズの進行、回答、スコア、連続記録、ライフ、ミッション、設定、言語、広告設定およびオフライン進行状況を端末に保存する場合があります。ローカルデータは、アプリの動作、選択内容の記憶、および利用可能な場合のオフラインプレイに使用されます。"},{"type":"h2","text":"3. 処理目的"},{"type":"ul","items":["クイズ、ミッションおよび主要機能の提供","アカウントの認証と対象となる進行状況の同期","ランキング、マルチプレイヤールームおよび対戦の運営","設定の記憶とオフラインプレイの提供","広告とアプリの性能測定、エラー診断および信頼性向上","アプリの保護、不正防止およびサポート対応"]},{"type":"h2","text":"4. オンラインアカウント、ランキング、マルチプレイヤー"},{"type":"p","text":"サインインすると、Firebaseはメールアドレス、アカウント識別子、認証プロバイダ、ユーザー名または表示名、選択した旗、ポイント、ミッション進行状況および同期データを処理する場合があります。ランキングでは、ユーザー名、旗、スコアまたは順位が他の利用者に表示されます。マルチプレイヤーでは、対戦を同期するため、ルームコードと設定、参加者の識別子と名前、問題または対戦の進行、回答、スコア、準備状態および接続状態を処理する場合があります。"},{"type":"h2","text":"5. 分析および広告診断"},{"type":"p","text":"Firebase Analyticsおよび広告診断イベントは、プラットフォーム、アプリバージョン、広告形式と配置、読み込みと表示の結果、遅延範囲、ネットワーク状態、対戦形式、広告ソースまたはアダプタ、レスポンス識別子、インプレッション単位の収益など、アプリと端末の情報および操作を処理する場合があります。これらは性能測定、広告配信の問題調査、不正防止およびアプリ改善に使用されます。メールアドレス、パスワード、クイズ回答文は広告ライフサイクルイベントに含まれません。"},{"type":"h2","text":"6. 第三者サービス"},{"type":"p","text":"アプリは、Google Firebase Authentication、Cloud Firestore、Analytics、Google AdMobとUser Messaging Platform（UMP）、Apple Game CenterとApp Store、Google Play GamesとGoogle Playを使用する場合があります。各提供者は独自の規約とプライバシーポリシーに基づいてデータを処理します。"},{"type":"h2","text":"7. 広告とトラッキング"},{"type":"p","text":"Google AdMobは、バナー、インタースティシャルおよびリワード広告を配信する場合があります。端末、設定、同意および地域に応じて、Google Mobile Ads SDKは、広告、測定、不正防止のため、おおよその位置情報に用いるIPアドレス、アプリと広告の操作、診断情報、端末または広告識別子を処理する場合があります。必要な場合、Google UMPがプライバシー選択を管理します。必要と判定された場合は、プロフィールの「プライバシー設定」からUMPフォームを再度開けます。iOSではApp Tracking Transparencyの許可を求める場合もあります。非パーソナライズ広告または制限付き広告を選択しても、広告自体がなくなるとは限りません。"},{"type":"h2","text":"8. 購入とPremium機能"},{"type":"p","text":"任意の購入、サブスクリプション、PremiumアクセスはApple App StoreまたはGoogle Playによって処理される場合があります。当社はクレジットカード情報を受け取ったり保存したりしません。購入状態はローカルに保存されるか、該当ストアで確認される場合があります。"},{"type":"h2","text":"9. データ共有"},{"type":"p","text":"個人データを販売しません。データは、本ポリシーに記載された目的に限り、上記の提供者によって処理される場合があります。ユーザー名、旗、ポイント、順位などの公開ランキング情報および関連するマルチプレイヤー情報は、他のプレイヤーに表示される場合があります。メールアドレスとパスワードは公開されません。"},{"type":"h2","text":"10. 保持と削除"},{"type":"p","text":"ローカルデータは、削除、アプリのリセットまたはアンインストールまで保持されます。アカウント、プロフィール、ランキングおよび同期されたミッションデータは、アカウントが有効な間保持される場合があります。プロフィール画面またはお問い合わせによりアカウント削除を申請できます。アカウントに関連する個人データは、セキュリティ、不正防止、法的義務または限定的なバックアップのために保持が必要な場合を除き、削除または匿名化されます。マルチプレイヤー、広告および分析記録は、運用上必要な範囲と各提供者のポリシーに従って保持されます。"},{"type":"h2","text":"11. ユーザーの権利"},{"type":"p","text":"地域に応じて、アクセス、訂正、削除、制限、異議申立て、データの受領および同意撤回の権利を有する場合があります。アプリで一部のプロフィール情報を編集またはアカウント削除を申請し、その他の請求は当社に連絡できます。端末設定で広告権限を管理し、利用可能な場合は「プライバシー設定」からUMPの選択を変更できます。同意撤回は、それ以前の処理には影響しません。"},{"type":"h2","text":"12. データセキュリティ"},{"type":"p","text":"該当する場合、外部通信にはHTTPSを使用し、データ収集を最小限にするよう設計しています。ただし、ソフトウェアや端末環境が絶対的な安全性を保証することはできません。"},{"type":"h2","text":"13. 子どものプライバシー"},{"type":"p","text":"本アプリは13歳未満の子どもを対象としていません。13歳未満の子どもから意図的に個人データを収集することはありません。子どもが個人データを提供したと思われる場合はお問い合わせください。"},{"type":"h2","text":"14. 国際データ移転"},{"type":"p","text":"第三者提供元は、ユーザーの国以外で限定的なデータを処理する場合があります。法律で求められる場合は適切な保護措置が適用されます。"},{"type":"h2","text":"15. お問い合わせ"},{"type":"p","html":"<strong>CAREO LIMITED</strong><br>71-75 Shelton Street, Covent Garden, London, United Kingdom, WC2H 9JQ<br>careolimited@gmail.com<br>F Quiz - Privacy Inquiry"},{"type":"h2","text":"16. ポリシー更新"},{"type":"p","text":"アプリ機能、第三者サービス、法的要件が変更された場合、本ポリシーを更新することがあります。更新は新しい最終更新日で表示されます。アプリの継続利用は更新後のポリシーへの同意を意味します。"}],"ko":[{"type":"h1","text":"개인정보 처리방침 - F Quiz"},{"type":"meta","html":"<strong>마지막 업데이트:</strong> 2026년 7월<br><strong>앱:</strong> F Quiz<br><strong>개발자 / 게시자:</strong> CAREO LIMITED<br><strong>문의:</strong> careolimited@gmail.com"},{"type":"p","text":"F Quiz은 개인정보를 존중합니다. 본 정책은 iOS 및 Android 모바일 앱을 사용할 때 어떤 정보가 처리될 수 있는지, 어떻게 사용되는지, 사용자의 권리가 무엇인지 설명합니다."},{"type":"h2","text":"1. 데이터 처리 개요"},{"type":"p","text":"F Quiz는 앱, 온라인 계정, 리더보드, 멀티플레이어, 광고, 분석, 보안 및 지원을 제공하는 데 필요한 정보만 처리합니다. 기능과 지역에 따라 처리는 사용자가 요청한 서비스 제공, 앱 운영 및 보호에 대한 당사의 정당한 이익 또는 사용자의 동의를 근거로 합니다. 당사는 개인정보를 판매하지 않습니다."},{"type":"h2","text":"2. 로컬 저장 데이터"},{"type":"p","text":"앱은 퀴즈 진행 상황, 답변, 점수, 연속 기록, 생명, 미션, 설정, 언어, 광고 환경설정 및 오프라인 진행 상황을 기기에 저장할 수 있습니다. 로컬 데이터는 앱 기능 제공, 선택 사항 기억 및 가능한 경우 오프라인 플레이 지원에 사용됩니다."},{"type":"h2","text":"3. 처리 목적"},{"type":"ul","items":["퀴즈, 미션 및 핵심 기능 제공","계정 인증 및 해당 진행 상황 동기화","리더보드, 멀티플레이어 방 및 경기 운영","환경설정 기억 및 오프라인 플레이 지원","광고와 앱 성능 측정, 오류 진단 및 안정성 개선","앱 보호, 부정 사용 방지 및 지원 요청 처리"]},{"type":"h2","text":"4. 온라인 계정, 리더보드 및 멀티플레이어"},{"type":"p","text":"로그인하면 Firebase가 이메일 주소, 계정 식별자, 인증 제공자, 사용자 이름 또는 표시 이름, 선택한 깃발, 포인트, 미션 진행 상황 및 동기화 데이터를 처리할 수 있습니다. 리더보드에서는 사용자 이름, 깃발, 점수 또는 순위가 다른 사용자에게 표시됩니다. 멀티플레이어에서는 경기 동기화를 위해 방 코드와 설정, 참가자 식별자와 이름, 질문 또는 경기 진행, 답변, 점수, 준비 및 연결 상태를 처리할 수 있습니다."},{"type":"h2","text":"5. 분석 및 광고 진단"},{"type":"p","text":"Firebase Analytics와 광고 진단 이벤트는 플랫폼, 앱 버전, 광고 형식과 위치, 로드 및 표시 결과, 지연 시간 구간, 네트워크 상태, 경기 유형, 광고 소스 또는 어댑터, 응답 식별자 및 노출 단위 수익을 포함한 앱·기기 정보와 상호작용을 처리할 수 있습니다. 이 정보는 성능 측정, 광고 전송 문제 해결, 부정 사용 방지 및 앱 개선에 사용됩니다. 이메일 주소, 비밀번호 및 퀴즈 답변 문구는 광고 수명 주기 이벤트에 포함되지 않습니다."},{"type":"h2","text":"6. 제3자 서비스"},{"type":"p","text":"앱은 Google Firebase Authentication, Cloud Firestore와 Analytics, Google AdMob과 User Messaging Platform(UMP), Apple Game Center와 App Store, Google Play Games와 Google Play를 사용할 수 있습니다. 각 제공자는 자체 약관과 개인정보 처리방침에 따라 데이터를 처리합니다."},{"type":"h2","text":"7. 광고 및 추적"},{"type":"p","text":"Google AdMob은 배너, 전면 및 보상형 광고를 제공할 수 있습니다. 기기, 설정, 동의 및 지역에 따라 Google Mobile Ads SDK는 광고, 측정 및 부정행위 방지를 위해 대략적인 위치 파악용 IP 주소, 앱과 광고 상호작용, 진단 정보, 기기 또는 광고 식별자를 처리할 수 있습니다. 필요한 경우 Google UMP가 개인정보 선택을 관리합니다. 해당 옵션이 필요한 경우 프로필의 개인정보 보호 옵션에서 UMP 양식을 다시 열 수 있습니다. iOS에서는 App Tracking Transparency 권한을 요청할 수도 있습니다. 비개인 맞춤형 또는 제한된 광고를 선택해도 광고가 완전히 제거되는 것은 아닙니다."},{"type":"h2","text":"8. 구매 및 Premium 기능"},{"type":"p","text":"선택적 구매, 구독 또는 Premium 접근은 Apple App Store 또는 Google Play에서 처리될 수 있습니다. 당사는 신용카드 정보를 받거나 저장하지 않습니다. 구매 상태는 로컬에 저장되거나 해당 스토어를 통해 확인될 수 있습니다."},{"type":"h2","text":"9. 데이터 공유"},{"type":"p","text":"당사는 개인정보를 판매하지 않습니다. 데이터는 본 방침에 설명된 목적에 한해 위 제공자들이 처리할 수 있습니다. 사용자 이름, 깃발, 포인트, 순위 같은 공개 리더보드 정보와 관련 멀티플레이어 정보는 다른 플레이어에게 표시될 수 있습니다. 이메일 주소와 비밀번호는 공개되지 않습니다."},{"type":"h2","text":"10. 보관 및 삭제"},{"type":"p","text":"로컬 데이터는 삭제, 앱 초기화 또는 제거 시까지 유지됩니다. 계정, 프로필, 리더보드 및 동기화된 미션 데이터는 계정이 활성 상태인 동안 보관될 수 있습니다. 프로필 화면이나 문의를 통해 계정 삭제를 요청할 수 있으며, 보안, 부정행위 방지, 법적 의무 또는 제한된 백업을 위해 보관이 필요한 경우를 제외하고 계정 관련 개인정보는 삭제되거나 익명화됩니다. 멀티플레이어, 광고 및 분석 기록은 운영상 필요한 기간과 관련 제공자 정책에 따라 보관됩니다."},{"type":"h2","text":"11. 사용자 권리"},{"type":"p","text":"지역에 따라 개인정보 열람, 정정, 삭제, 처리 제한, 반대, 사본 수령 및 동의 철회 권리가 있을 수 있습니다. 앱에서 일부 프로필 정보를 수정하거나 계정 삭제를 요청할 수 있고, 기타 요청은 당사에 문의할 수 있습니다. 시스템 설정에서 광고 권한을 관리하고, 가능한 경우 개인정보 보호 옵션에서 UMP 선택을 변경할 수 있습니다. 동의 철회는 철회 이전의 처리에는 영향을 주지 않습니다."},{"type":"h2","text":"12. 데이터 보안"},{"type":"p","text":"해당되는 경우 외부 통신에 HTTPS를 사용하며 데이터 수집을 최소화하도록 앱을 설계합니다. 어떤 소프트웨어나 기기 환경도 절대적인 보안을 보장할 수는 없습니다."},{"type":"h2","text":"13. 아동 개인정보"},{"type":"p","text":"앱은 13세 미만 아동을 대상으로 하지 않습니다. 당사는 13세 미만 아동의 개인정보를 고의로 수집하지 않습니다. 아동이 개인정보를 제공했다고 생각되면 문의해 주세요."},{"type":"h2","text":"14. 국제 데이터 이전"},{"type":"p","text":"제3자 제공업체는 사용자의 국가 외 지역에서 제한된 데이터를 처리할 수 있습니다. 법에서 요구하는 경우 적절한 보호조치가 적용됩니다."},{"type":"h2","text":"15. 문의"},{"type":"p","html":"<strong>CAREO LIMITED</strong><br>71-75 Shelton Street, Covent Garden, London, United Kingdom, WC2H 9JQ<br>careolimited@gmail.com<br>F Quiz - Privacy Inquiry"},{"type":"h2","text":"16. 정책 업데이트"},{"type":"p","text":"앱 기능, 제3자 서비스 또는 법적 요구사항이 변경되면 본 정책을 업데이트할 수 있습니다. 업데이트는 새로운 마지막 업데이트 날짜로 표시됩니다. 앱을 계속 사용하면 업데이트된 정책에 동의한 것으로 간주됩니다."}],"pt":[{"type":"h1","text":"Política de Privacidade - F Quiz"},{"type":"meta","html":"<strong>Última atualização:</strong> julho de 2026<br><strong>App:</strong> F Quiz<br><strong>Programador / Editor:</strong> CAREO LIMITED<br><strong>Contacto:</strong> careolimited@gmail.com"},{"type":"p","text":"F Quiz respeita a sua privacidade. Esta Política explica que informações podem ser tratadas, como são utilizadas e quais são os seus direitos ao usar a aplicação móvel em iOS e Android."},{"type":"h2","text":"1. Visão geral do tratamento de dados"},{"type":"p","text":"O F Quiz trata apenas as informações necessárias para disponibilizar a aplicação, contas online, classificações, multiplayer, publicidade, análise, segurança e apoio. Conforme a funcionalidade e a região, o tratamento baseia-se na prestação do serviço pedido, nos nossos interesses legítimos em operar e proteger a aplicação ou no seu consentimento. Não vendemos dados pessoais."},{"type":"h2","text":"2. Dados armazenados localmente"},{"type":"p","text":"A aplicação pode guardar no dispositivo o progresso dos quizzes, respostas, pontuações, sequências, vidas, missões, definições, idioma, preferências de publicidade e progresso offline. Os dados locais servem para operar a aplicação, recordar escolhas e permitir jogo offline quando disponível."},{"type":"h2","text":"3. Finalidades do tratamento"},{"type":"ul","items":["Disponibilizar quizzes, missões e funções principais","Autenticar contas e sincronizar progresso elegível","Operar classificações, salas e partidas multiplayer","Recordar preferências e permitir jogo offline","Medir o desempenho da publicidade e da aplicação, diagnosticar erros e melhorar a fiabilidade","Proteger a aplicação, prevenir fraude e responder a pedidos de apoio"]},{"type":"h2","text":"4. Contas online, classificações e multiplayer"},{"type":"p","text":"Se iniciar sessão, o Firebase pode tratar o seu endereço de e-mail, identificador da conta, fornecedor de autenticação, nome de utilizador ou nome apresentado, bandeira escolhida, pontos, progresso das missões e dados de sincronização. As classificações tornam o nome de utilizador, bandeira, pontuação ou posição visíveis a outros utilizadores. O multiplayer pode tratar códigos e definições de sala, identificadores e nomes dos participantes, progresso de perguntas ou partidas, respostas, pontuações, prontidão e estado da ligação para sincronizar as partidas."},{"type":"h2","text":"5. Análise e diagnóstico de publicidade"},{"type":"p","text":"O Firebase Analytics e os eventos de diagnóstico publicitário podem tratar informações e interações da aplicação e do dispositivo, incluindo plataforma, versão da aplicação, formato e posicionamento do anúncio, resultados de carregamento e apresentação, intervalos de latência, estado da rede, tipo de partida, origem ou adaptador do anúncio, identificadores de resposta e receita por impressão. Usamos estas informações para medir o desempenho, resolver problemas de publicidade, prevenir abusos e melhorar a aplicação. Endereços de e-mail, palavras-passe e texto das respostas dos quizzes não são incluídos nos nossos eventos do ciclo de vida publicitário."},{"type":"h2","text":"6. Serviços de terceiros"},{"type":"p","text":"A aplicação pode usar Google Firebase Authentication, Cloud Firestore e Analytics, Google AdMob e User Messaging Platform (UMP), Apple Game Center e App Store, bem como Google Play Games e Google Play. Estes fornecedores tratam dados segundo os seus próprios termos e políticas de privacidade."},{"type":"h2","text":"7. Publicidade e rastreio"},{"type":"p","text":"O Google AdMob pode fornecer anúncios banner, intersticiais e com recompensa. Conforme o dispositivo, definições, consentimento e região, o Google Mobile Ads SDK pode tratar o endereço IP para localização aproximada, interações com a aplicação e anúncios, informações de diagnóstico e identificadores do dispositivo ou de publicidade para publicidade, medição e prevenção de fraude. Quando necessário, o Google UMP gere as escolhas de privacidade. Pode reabrir o formulário UMP em Opções de privacidade no perfil quando essa opção for necessária. No iOS, também pode ser pedida a autorização App Tracking Transparency. Escolher anúncios não personalizados ou limitados não elimina necessariamente os anúncios."},{"type":"h2","text":"8. Compras e funcionalidades Premium"},{"type":"p","text":"Compras, subscrições ou acesso Premium opcionais podem ser processados pela Apple App Store ou Google Play. Não recebemos nem armazenamos dados de cartão de crédito. O estado da compra pode ser guardado localmente ou verificado através da loja relevante."},{"type":"h2","text":"9. Partilha de dados"},{"type":"p","text":"Não vendemos dados pessoais. Os dados podem ser tratados pelos fornecedores acima apenas para os fins descritos nesta Política. Informações públicas da classificação, como nome de utilizador, bandeira, pontos e posição, e informações multiplayer relevantes podem ser visíveis a outros jogadores. O endereço de e-mail e a palavra-passe não são apresentados publicamente."},{"type":"h2","text":"10. Retenção e eliminação"},{"type":"p","text":"Os dados locais permanecem até serem apagados, a aplicação ser reposta ou desinstalada. Os dados de conta, perfil, classificação e missões sincronizadas podem ser conservados enquanto a conta estiver ativa. Pode pedir a eliminação da conta no perfil ou contactando-nos; os dados pessoais ligados à conta serão eliminados ou anonimizados, salvo quando a retenção for necessária para segurança, prevenção de fraude, obrigações legais ou cópias de segurança limitadas. Os registos multiplayer, publicitários e analíticos são conservados apenas para fins operacionais e segundo as políticas dos fornecedores relevantes."},{"type":"h2","text":"11. Direitos dos utilizadores"},{"type":"p","text":"Conforme a sua localização, pode ter direitos de acesso, correção, eliminação, limitação, oposição, portabilidade e retirada do consentimento. Pode editar certas informações do perfil ou pedir a eliminação da conta na aplicação, contactar-nos para outros pedidos, gerir permissões de publicidade nas definições do sistema e alterar escolhas UMP em Opções de privacidade quando disponíveis. A retirada não afeta o tratamento anterior."},{"type":"h2","text":"12. Segurança dos dados"},{"type":"p","text":"Usamos HTTPS para comunicações externas quando aplicável e concebemos as nossas apps para minimizar a recolha de dados. Nenhum software ou dispositivo pode garantir segurança absoluta."},{"type":"h2","text":"13. Privacidade das crianças"},{"type":"p","text":"A app não se destina a crianças menores de 13 anos. Não recolhemos conscientemente dados pessoais de crianças menores de 13 anos. Se acredita que uma criança forneceu dados pessoais, contacte-nos."},{"type":"h2","text":"14. Transferências internacionais"},{"type":"p","text":"Fornecedores terceiros podem tratar dados limitados em países fora do seu. São aplicadas salvaguardas adequadas quando exigido por lei."},{"type":"h2","text":"15. Contacto"},{"type":"p","html":"<strong>CAREO LIMITED</strong><br>71-75 Shelton Street, Covent Garden, London, United Kingdom, WC2H 9JQ<br>careolimited@gmail.com<br>F Quiz - Privacy Inquiry"},{"type":"h2","text":"16. Atualizações da Política"},{"type":"p","text":"Podemos atualizar esta Política se as funcionalidades da app, serviços terceiros ou requisitos legais mudarem. As atualizações serão refletidas com uma nova data. A utilização continuada da app implica aceitação."}],"ru":[{"type":"h1","text":"Политика конфиденциальности - F Quiz"},{"type":"meta","html":"<strong>Последнее обновление:</strong> июль 2026 г.<br><strong>Приложение:</strong> F Quiz<br><strong>Разработчик / Издатель:</strong> CAREO LIMITED<br><strong>Контакт:</strong> careolimited@gmail.com"},{"type":"p","text":"F Quiz уважает вашу конфиденциальность. Эта Политика объясняет, какие сведения могут обрабатываться, как они используются и какие права у вас есть при использовании мобильного приложения на iOS и Android."},{"type":"h2","text":"1. Обзор обработки данных"},{"type":"p","text":"F Quiz обрабатывает только информацию, необходимую для работы приложения, онлайн-аккаунтов, таблиц лидеров, мультиплеера, рекламы, аналитики, безопасности и поддержки. В зависимости от функции и региона обработка основана на предоставлении запрошенной услуги, наших законных интересах по эксплуатации и защите приложения либо вашем согласии. Мы не продаем персональные данные."},{"type":"h2","text":"2. Локально хранимые данные"},{"type":"p","text":"Приложение может хранить на устройстве прогресс викторин, ответы, баллы, серии, жизни, задания, настройки, язык, рекламные предпочтения и офлайн-прогресс. Локальные данные используются для работы приложения, запоминания выбора и офлайн-игры, если она доступна."},{"type":"h2","text":"3. Цели обработки"},{"type":"ul","items":["Предоставление викторин, заданий и основных функций","Аутентификация аккаунтов и синхронизация подходящего прогресса","Работа таблиц лидеров, мультиплеерных комнат и матчей","Сохранение настроек и поддержка офлайн-игры","Измерение эффективности рекламы и приложения, диагностика ошибок и повышение надежности","Защита приложения, предотвращение мошенничества и обработка обращений в поддержку"]},{"type":"h2","text":"4. Онлайн-аккаунты, таблицы лидеров и мультиплеер"},{"type":"p","text":"При входе Firebase может обрабатывать адрес электронной почты, идентификатор аккаунта, поставщика аутентификации, имя пользователя или отображаемое имя, выбранный флаг, баллы, прогресс заданий и данные синхронизации. В таблицах лидеров имя пользователя, флаг, счет или место видны другим пользователям. Для синхронизации мультиплеера могут обрабатываться коды и настройки комнат, идентификаторы и имена участников, прогресс вопросов или матча, ответы, счет, готовность и состояние подключения."},{"type":"h2","text":"5. Аналитика и диагностика рекламы"},{"type":"p","text":"Firebase Analytics и события диагностики рекламы могут обрабатывать сведения о приложении и устройстве и взаимодействиях, включая платформу, версию приложения, формат и место рекламы, результаты загрузки и показа, диапазоны задержки, состояние сети, тип матча, источник или адаптер рекламы, идентификаторы ответа и доход на уровне показа. Эти данные используются для измерения эффективности, поиска проблем с рекламой, предотвращения злоупотреблений и улучшения приложения. Адреса электронной почты, пароли и тексты ответов викторины не включаются в наши события жизненного цикла рекламы."},{"type":"h2","text":"6. Сторонние сервисы"},{"type":"p","text":"Приложение может использовать Google Firebase Authentication, Cloud Firestore и Analytics, Google AdMob и User Messaging Platform (UMP), Apple Game Center и App Store, а также Google Play Games и Google Play. Эти поставщики обрабатывают данные по собственным условиям и политикам конфиденциальности."},{"type":"h2","text":"7. Реклама и отслеживание"},{"type":"p","text":"Google AdMob может предоставлять баннерную, межстраничную и вознаграждаемую рекламу. В зависимости от устройства, настроек, согласия и региона Google Mobile Ads SDK может обрабатывать IP-адрес для приблизительного местоположения, взаимодействия с приложением и рекламой, диагностические сведения и идентификаторы устройства или рекламы в целях рекламы, измерения и предотвращения мошенничества. При необходимости Google UMP управляет настройками конфиденциальности. Форму UMP можно снова открыть через Настройки конфиденциальности в профиле, когда этот пункт требуется. В iOS также может запрашиваться разрешение App Tracking Transparency. Выбор неперсонализированной или ограниченной рекламы не обязательно удаляет рекламу."},{"type":"h2","text":"8. Покупки и функции Premium"},{"type":"p","text":"Необязательные покупки, подписки или доступ Premium могут обрабатываться Apple App Store или Google Play. Мы не получаем и не храним данные кредитных карт. Статус покупки может храниться локально или проверяться через соответствующий магазин."},{"type":"h2","text":"9. Передача данных"},{"type":"p","text":"Мы не продаем персональные данные. Данные могут обрабатываться перечисленными выше поставщиками только для целей, описанных в этой Политике. Публичные данные таблицы лидеров, такие как имя пользователя, флаг, баллы и место, а также относящиеся к мультиплееру сведения могут быть видны другим игрокам. Адрес электронной почты и пароль публично не отображаются."},{"type":"h2","text":"10. Хранение и удаление"},{"type":"p","text":"Локальные данные хранятся до их удаления, сброса приложения или его удаления. Данные аккаунта, профиля, таблицы лидеров и синхронизированных заданий могут храниться, пока аккаунт активен. Удаление аккаунта можно запросить в профиле или связавшись с нами; связанные с аккаунтом персональные данные будут удалены или обезличены, кроме случаев, когда хранение требуется для безопасности, предотвращения мошенничества, выполнения закона или ограниченных резервных копий. Мультиплеерные, рекламные и аналитические записи хранятся только для операционных целей и по правилам соответствующих поставщиков."},{"type":"h2","text":"11. Права пользователя"},{"type":"p","text":"В зависимости от места проживания вы можете иметь права на доступ, исправление, удаление, ограничение, возражение, получение копии данных и отзыв согласия. В приложении можно изменить некоторые данные профиля или запросить удаление аккаунта, а по другим вопросам связаться с нами. Рекламными разрешениями можно управлять в настройках системы, а выбор UMP менять через Настройки конфиденциальности, когда они доступны. Отзыв не влияет на предыдущую обработку."},{"type":"h2","text":"12. Безопасность данных"},{"type":"p","text":"Мы используем HTTPS для внешних соединений, где это применимо, и проектируем приложения так, чтобы минимизировать сбор данных. Ни одна программная или аппаратная среда не может гарантировать абсолютную безопасность."},{"type":"h2","text":"13. Конфиденциальность детей"},{"type":"p","text":"Приложение не предназначено для детей младше 13 лет. Мы сознательно не собираем персональные данные детей младше 13 лет. Если вы считаете, что ребенок предоставил персональные данные, свяжитесь с нами."},{"type":"h2","text":"14. Международная передача данных"},{"type":"p","text":"Сторонние поставщики могут обрабатывать ограниченные данные в странах за пределами вашей страны. При необходимости применяются соответствующие гарантии."},{"type":"h2","text":"15. Контакты"},{"type":"p","html":"<strong>CAREO LIMITED</strong><br>71-75 Shelton Street, Covent Garden, London, United Kingdom, WC2H 9JQ<br>careolimited@gmail.com<br>F Quiz - Privacy Inquiry"},{"type":"h2","text":"16. Обновления Политики"},{"type":"p","text":"Мы можем обновлять эту Политику при изменении функций приложения, сторонних сервисов или требований закона. Обновления будут отражены новой датой. Продолжение использования приложения означает принятие обновленной Политики."}],"es":[{"type":"h1","text":"Política de privacidad - F Quiz"},{"type":"meta","html":"<strong>Última actualización:</strong> julio de 2026<br><strong>App:</strong> F Quiz<br><strong>Desarrollador / Editor:</strong> CAREO LIMITED<br><strong>Contacto:</strong> careolimited@gmail.com"},{"type":"p","text":"F Quiz respeta tu privacidad. Esta Política explica qué información puede procesarse, cómo se utiliza y cuáles son tus derechos al usar la aplicación móvil en iOS y Android."},{"type":"h2","text":"1. Resumen del procesamiento de datos"},{"type":"p","text":"F Quiz trata únicamente la información necesaria para ofrecer la aplicación, las cuentas en línea, clasificaciones, multijugador, publicidad, análisis, seguridad y asistencia. Según la función y tu región, el tratamiento se basa en prestar el servicio solicitado, en nuestro interés legítimo por operar y proteger la aplicación o en tu consentimiento. No vendemos datos personales."},{"type":"h2","text":"2. Datos almacenados localmente"},{"type":"p","text":"La aplicación puede guardar en el dispositivo el progreso de los cuestionarios, respuestas, puntuaciones, rachas, vidas, misiones, ajustes, idioma, preferencias publicitarias y progreso sin conexión. Los datos locales se usan para hacer funcionar la aplicación, recordar tus elecciones y permitir el juego sin conexión cuando esté disponible."},{"type":"h2","text":"3. Finalidades del procesamiento"},{"type":"ul","items":["Ofrecer cuestionarios, misiones y funciones principales","Autenticar cuentas y sincronizar el progreso correspondiente","Gestionar clasificaciones, salas y partidas multijugador","Recordar preferencias y permitir juego sin conexión","Medir el rendimiento de la publicidad y la aplicación, diagnosticar errores y mejorar la fiabilidad","Proteger la aplicación, prevenir el fraude y responder a solicitudes de asistencia"]},{"type":"h2","text":"4. Cuentas en línea, clasificaciones y multijugador"},{"type":"p","text":"Si inicias sesión, Firebase puede tratar tu dirección de correo electrónico, identificador de cuenta, proveedor de autenticación, nombre de usuario o nombre visible, bandera elegida, puntos, progreso de misiones y datos de sincronización. Las clasificaciones hacen visibles a otros usuarios tu nombre, bandera, puntuación o puesto. El multijugador puede tratar códigos y ajustes de sala, identificadores y nombres de participantes, progreso de preguntas o partidas, respuestas, puntuaciones, estado de preparación y conexión para sincronizar las partidas."},{"type":"h2","text":"5. Análisis y diagnóstico publicitario"},{"type":"p","text":"Firebase Analytics y los eventos de diagnóstico publicitario pueden tratar información e interacciones de la aplicación y el dispositivo, como plataforma, versión, formato y ubicación del anuncio, resultados de carga y visualización, rangos de latencia, estado de red, tipo de partida, fuente o adaptador publicitario, identificadores de respuesta e ingresos por impresión. Usamos esta información para medir el rendimiento, resolver problemas de anuncios, prevenir abusos y mejorar la aplicación. Las direcciones de correo electrónico, contraseñas y textos de respuestas del cuestionario no se incluyen en nuestros eventos del ciclo publicitario."},{"type":"h2","text":"6. Servicios de terceros"},{"type":"p","text":"La aplicación puede usar Google Firebase Authentication, Cloud Firestore y Analytics, Google AdMob y User Messaging Platform (UMP), Apple Game Center y App Store, además de Google Play Games y Google Play. Estos proveedores tratan los datos según sus propios términos y políticas de privacidad."},{"type":"h2","text":"7. Publicidad y seguimiento"},{"type":"p","text":"Google AdMob puede ofrecer anuncios de banner, intersticiales y recompensados. Según el dispositivo, los ajustes, el consentimiento y la región, Google Mobile Ads SDK puede tratar la dirección IP para obtener una ubicación aproximada, interacciones con la aplicación y los anuncios, información de diagnóstico e identificadores del dispositivo o publicitarios con fines de publicidad, medición y prevención del fraude. Cuando sea necesario, Google UMP gestiona las opciones de privacidad. Puedes volver a abrir el formulario UMP desde Opciones de privacidad en tu perfil cuando esta opción sea obligatoria. En iOS también puede solicitarse permiso de App Tracking Transparency. Elegir anuncios no personalizados o limitados no elimina necesariamente los anuncios."},{"type":"h2","text":"8. Compras y funciones Premium"},{"type":"p","text":"Las compras, suscripciones o accesos Premium opcionales pueden ser procesados por Apple App Store o Google Play. No recibimos ni almacenamos datos de tarjetas de crédito. El estado de compra puede guardarse localmente o verificarse mediante la tienda correspondiente."},{"type":"h2","text":"9. Compartición de datos"},{"type":"p","text":"No vendemos datos personales. Los proveedores anteriores pueden tratar datos únicamente para los fines descritos en esta Política. Los datos públicos de clasificación, como nombre de usuario, bandera, puntos y puesto, y la información multijugador relevante pueden ser visibles para otros jugadores. Tu dirección de correo electrónico y contraseña no se muestran públicamente."},{"type":"h2","text":"10. Conservación y eliminación"},{"type":"p","text":"Los datos locales permanecen hasta que los elimines, restablezcas la aplicación o la desinstales. Los datos de cuenta, perfil, clasificación y misiones sincronizadas pueden conservarse mientras la cuenta esté activa. Puedes solicitar la eliminación de la cuenta desde el perfil o contactándonos; los datos personales vinculados se eliminarán o anonimizarán salvo que deban conservarse por seguridad, prevención del fraude, obligaciones legales o copias de seguridad limitadas. Los registros multijugador, publicitarios y analíticos se conservan solo para fines operativos y según las políticas de los proveedores correspondientes."},{"type":"h2","text":"11. Derechos del usuario"},{"type":"p","text":"Según tu ubicación, puedes tener derechos de acceso, corrección, eliminación, limitación, oposición, portabilidad y retirada del consentimiento. Puedes editar cierta información del perfil o solicitar la eliminación de la cuenta en la aplicación, contactarnos para otras solicitudes, gestionar permisos publicitarios en los ajustes del sistema y cambiar las opciones de UMP desde Opciones de privacidad cuando estén disponibles. La retirada no afecta al tratamiento anterior."},{"type":"h2","text":"12. Seguridad de datos"},{"type":"p","text":"Usamos HTTPS para comunicaciones externas cuando corresponde y diseñamos nuestras apps para minimizar la recopilación de datos. Ningún software o dispositivo puede garantizar seguridad absoluta."},{"type":"h2","text":"13. Privacidad de menores"},{"type":"p","text":"La app no está dirigida a menores de 13 años. No recopilamos conscientemente datos personales de menores de 13 años. Si crees que un menor proporcionó datos personales, contáctanos."},{"type":"h2","text":"14. Transferencias internacionales"},{"type":"p","text":"Los proveedores terceros pueden procesar datos limitados en países fuera del tuyo. Se aplican salvaguardias adecuadas cuando lo exige la ley."},{"type":"h2","text":"15. Contacto"},{"type":"p","html":"<strong>CAREO LIMITED</strong><br>71-75 Shelton Street, Covent Garden, London, United Kingdom, WC2H 9JQ<br>careolimited@gmail.com<br>F Quiz - Privacy Inquiry"},{"type":"h2","text":"16. Actualizaciones de la Política"},{"type":"p","text":"Podemos actualizar esta Política si cambian las funciones de la app, servicios terceros o requisitos legales. Las actualizaciones se reflejarán con una nueva fecha. El uso continuado de la app implica aceptación."}],"tr":[{"type":"h1","text":"Gizlilik Politikası - F Quiz"},{"type":"meta","html":"<strong>Son güncelleme:</strong> Temmuz 2026<br><strong>Uygulama:</strong> F Quiz<br><strong>Geliştirici / Yayıncı:</strong> CAREO LIMITED<br><strong>İletişim:</strong> careolimited@gmail.com"},{"type":"p","text":"F Quiz gizliliğinize saygı duyar. Bu Politika, iOS ve Android mobil uygulamasını kullanırken hangi bilgilerin işlenebileceğini, nasıl kullanıldığını ve haklarınızı açıklar."},{"type":"h2","text":"1. Veri İşleme Özeti"},{"type":"p","text":"F Quiz yalnızca uygulamayı, çevrimiçi hesapları, liderlik tablolarını, multiplayer özelliklerini, reklamları, analizleri, güvenliği ve desteği sunmak için gereken bilgileri işler. Özelliğe ve bulunduğunuz bölgeye göre işleme; talep ettiğiniz hizmeti sunmaya, uygulamayı işletme ve korumaya yönelik meşru menfaatlerimize veya onayınıza dayanır. Kişisel verileri satmayız."},{"type":"h2","text":"2. Yerel Olarak Saklanan Veriler"},{"type":"p","text":"Uygulama; quiz ilerlemesini, cevapları, puanları, serileri, canları, görevleri, ayarları, dili, reklam tercihlerini ve çevrimdışı ilerlemeyi cihazınızda saklayabilir. Yerel veriler uygulamayı çalıştırmak, seçimlerinizi hatırlamak ve mümkün olduğunda çevrimdışı oynamayı desteklemek için kullanılır."},{"type":"h2","text":"3. İşleme Amaçları"},{"type":"ul","items":["Quizleri, görevleri ve temel uygulama özelliklerini sunmak","Hesapları doğrulamak ve uygun ilerlemeyi senkronize etmek","Liderlik tablolarını, multiplayer odalarını ve maçları işletmek","Tercihleri hatırlamak ve çevrimdışı oynamayı desteklemek","Reklam ve uygulama performansını ölçmek, hataları teşhis etmek ve güvenilirliği artırmak","Uygulamayı korumak, sahtekârlığı önlemek ve destek taleplerini yanıtlamak"]},{"type":"h2","text":"4. Çevrimiçi Hesaplar, Liderlik Tabloları ve Multiplayer"},{"type":"p","text":"Giriş yaparsanız Firebase; e-posta adresinizi, hesap kimliğinizi, giriş sağlayıcınızı, kullanıcı veya görünen adınızı, seçtiğiniz bayrağı, puanlarınızı, görev ilerlemenizi ve senkronizasyon verilerini işleyebilir. Liderlik tablolarında kullanıcı adınız, bayrağınız, puanınız veya sıranız diğer kullanıcılara görünür. Multiplayer maçlarını senkronize etmek için oda kodları ve ayarları, katılımcı kimlikleri ve adları, soru veya maç ilerlemesi, cevaplar, skorlar, hazır olma ve bağlantı durumu işlenebilir."},{"type":"h2","text":"5. Analiz ve Reklam Tanılama"},{"type":"p","text":"Firebase Analytics ve reklam tanılama olayları; platform, uygulama sürümü, reklam biçimi ve yerleşimi, yükleme ve gösterim sonuçları, gecikme aralıkları, ağ durumu, maç türü, reklam kaynağı veya adaptörü, yanıt kimlikleri ve gösterim düzeyinde gelir dahil olmak üzere uygulama ve cihaz bilgileri ile etkileşimleri işleyebilir. Bu bilgileri performansı ölçmek, reklam sunumundaki sorunları teşhis etmek, kötüye kullanımı önlemek ve uygulamayı geliştirmek için kullanırız. E-posta adresleri, parolalar ve quiz cevap metinleri reklam yaşam döngüsü olaylarımıza dahil edilmez."},{"type":"h2","text":"6. Üçüncü Taraf Hizmetler"},{"type":"p","text":"Uygulama; Google Firebase Authentication, Cloud Firestore ve Analytics, Google AdMob ve User Messaging Platform (UMP), Apple Game Center ve App Store ile Google Play Games ve Google Play hizmetlerini kullanabilir. Bu sağlayıcılar verileri kendi koşulları ve gizlilik politikaları uyarınca işler."},{"type":"h2","text":"7. Reklam ve Takip"},{"type":"p","text":"Google AdMob banner, geçiş ve ödüllü reklamlar sunabilir. Cihazınıza, ayarlarınıza, onayınıza ve bölgenize göre Google Mobile Ads SDK; reklam, ölçüm ve sahtekârlığı önleme amaçlarıyla yaklaşık konum için IP adresini, uygulama ve reklam etkileşimlerini, tanılama bilgilerini ve cihaz ya da reklam tanımlayıcılarını işleyebilir. Gerekli olduğunda gizlilik tercihlerini toplamak ve yönetmek için Google UMP kullanılır. Bu seçenek gerekli olduğunda profilinizdeki Gizlilik Seçenekleri üzerinden UMP formunu yeniden açabilirsiniz. iOS’ta App Tracking Transparency izni de istenebilir. Kişiselleştirilmemiş veya sınırlı reklamları seçmek reklamları tamamen kaldırmayabilir."},{"type":"h2","text":"8. Satın Almalar ve Premium Özellikler"},{"type":"p","text":"İsteğe bağlı satın almalar, abonelikler veya Premium erişim Apple App Store ya da Google Play tarafından işlenebilir. Kredi kartı bilgilerini almayız veya saklamayız. Satın alma durumu yerel olarak saklanabilir veya ilgili mağaza üzerinden doğrulanabilir."},{"type":"h2","text":"9. Veri Paylaşımı"},{"type":"p","text":"Kişisel verileri satmayız. Veriler yalnızca bu Politikada açıklanan amaçlarla yukarıda listelenen sağlayıcılar tarafından işlenebilir. Kullanıcı adı, bayrak, puan ve sıra gibi herkese açık liderlik tablosu bilgileri ile ilgili multiplayer bilgileri diğer oyunculara görünür olabilir. E-posta adresiniz ve parolanız herkese açık gösterilmez."},{"type":"h2","text":"10. Saklama ve Silme"},{"type":"p","text":"Yerel veriler siz silene, uygulamayı sıfırlayana veya kaldırana kadar kalır. Hesap, profil, liderlik tablosu ve senkronize görev verileri hesabınız aktif olduğu sürece saklanabilir. Profil ekranından veya bizimle iletişime geçerek hesap silme talebinde bulunabilirsiniz; güvenlik, sahtekârlığı önleme, yasal yükümlülükler veya sınırlı yedeklemeler için saklama gerekmediği sürece hesaba bağlı kişisel veriler silinir ya da anonimleştirilir. Multiplayer, reklam ve analiz kayıtları yalnızca operasyonel amaçlar için gerektiği kadar ve ilgili sağlayıcı politikalarına göre saklanır."},{"type":"h2","text":"11. Kullanıcı Hakları"},{"type":"p","text":"Bulunduğunuz yere göre kişisel verilerinize erişme, bunları düzeltme, silme, işlemeyi sınırlandırma, işlemeye itiraz etme, verilerin bir kopyasını alma ve onayı geri çekme haklarınız olabilir. Uygulamada belirli profil bilgilerini düzenleyebilir veya hesap silme talebinde bulunabilir, diğer talepler için bizimle iletişime geçebilir, sistem ayarlarından reklam izinlerini yönetebilir ve kullanılabilir olduğunda Gizlilik Seçenekleri üzerinden UMP tercihlerinizi değiştirebilirsiniz. Onayın geri çekilmesi önceki işlemenin hukuka uygunluğunu etkilemez."},{"type":"h2","text":"12. Veri Güvenliği"},{"type":"p","text":"Uygun durumlarda harici iletişim için HTTPS kullanırız ve uygulamalarımızı veri toplamayı azaltacak şekilde tasarlarız. Hiçbir yazılım veya cihaz ortamı mutlak güvenlik garanti edemez."},{"type":"h2","text":"13. Çocukların Gizliliği"},{"type":"p","text":"Uygulama 13 yaş altındaki çocuklara yönelik değildir. 13 yaş altındaki çocuklardan bilerek kişisel veri toplamayız. Bir çocuğun kişisel veri sağladığını düşünüyorsanız bizimle iletişime geçin."},{"type":"h2","text":"14. Uluslararası Veri Aktarımları"},{"type":"p","text":"Üçüncü taraf sağlayıcılar sınırlı verileri ülkeniz dışındaki ülkelerde işleyebilir. Kanunen gerekli olduğunda uygun korumalar uygulanır."},{"type":"h2","text":"15. İletişim"},{"type":"p","html":"<strong>CAREO LIMITED</strong><br>71-75 Shelton Street, Covent Garden, London, United Kingdom, WC2H 9JQ<br>careolimited@gmail.com<br>F Quiz - Privacy Inquiry"},{"type":"h2","text":"16. Politika Güncellemeleri"},{"type":"p","text":"Uygulama özellikleri, üçüncü taraf hizmetler veya yasal gereklilikler değişirse bu Politikayı güncelleyebiliriz. Güncellemeler yeni Son güncelleme tarihiyle gösterilir. Uygulamayı kullanmaya devam etmeniz güncel Politikayı kabul ettiğiniz anlamına gelir."}]};
  const uiText = {"en": {"back": "← Back to CAREO LIMITED", "privacy": "Privacy Policy", "last": "Last updated", "app": "App", "dev": "Developer / Publisher", "contact": "Contact", "lang": "Language"}, "fr": {"back": "← Retour à CAREO LIMITED", "privacy": "Politique de confidentialité", "last": "Dernière mise à jour", "app": "App", "dev": "Développeur / Éditeur", "contact": "Contact", "lang": "Langue"}, "de": {"back": "← Zurück zu CAREO LIMITED", "privacy": "Datenschutzerklärung", "last": "Letzte Aktualisierung", "app": "App", "dev": "Entwickler / Herausgeber", "contact": "Kontakt", "lang": "Sprache"}, "it": {"back": "← Torna a CAREO LIMITED", "privacy": "Informativa sulla privacy", "last": "Ultimo aggiornamento", "app": "App", "dev": "Sviluppatore / Editore", "contact": "Contatto", "lang": "Lingua"}, "ja": {"back": "← CAREO LIMITEDに戻る", "privacy": "プライバシーポリシー", "last": "最終更新", "app": "アプリ", "dev": "開発者 / 発行者", "contact": "連絡先", "lang": "言語"}, "ko": {"back": "← CAREO LIMITED로 돌아가기", "privacy": "개인정보 처리방침", "last": "마지막 업데이트", "app": "앱", "dev": "개발자 / 게시자", "contact": "문의", "lang": "언어"}, "pt": {"back": "← Voltar para CAREO LIMITED", "privacy": "Política de Privacidade", "last": "Última atualização", "app": "App", "dev": "Programador / Editor", "contact": "Contacto", "lang": "Idioma"}, "ru": {"back": "← Назад к CAREO LIMITED", "privacy": "Политика конфиденциальности", "last": "Последнее обновление", "app": "Приложение", "dev": "Разработчик / Издатель", "contact": "Контакт", "lang": "Язык"}, "es": {"back": "← Volver a CAREO LIMITED", "privacy": "Política de privacidad", "last": "Última actualización", "app": "App", "dev": "Desarrollador / Editor", "contact": "Contacto", "lang": "Idioma"}, "tr": {"back": "← CAREO LIMITED’a dön", "privacy": "Gizlilik Politikası", "last": "Son güncelleme", "app": "Uygulama", "dev": "Geliştirici / Yayıncı", "contact": "İletişim", "lang": "Dil"}};
  const languageSelect = document.getElementById("languageSelect");
  const policyContent = document.getElementById("policyContent");
  const backLink = document.getElementById("backLink");
  const params = new URLSearchParams(window.location.search);
  const initialLanguage = params.get("lang") || localStorage.getItem("careo-language") || "en";
  function renderPolicy(language) {
    const selected = policyData[language] || policyData.en;
    const ui = uiText[language] || uiText.en;
    document.documentElement.lang = language;
    languageSelect.value = language;
    backLink.textContent = ui.back;
    backLink.href = `../index.html?lang=${encodeURIComponent(language)}`;
    policyContent.innerHTML = "";
    selected.forEach((block) => {
      if (block.type === "h1" || block.type === "h2") {
        const el = document.createElement(block.type); el.textContent = block.text; policyContent.appendChild(el);
      } else if (block.type === "p" || block.type === "meta") {
        const el = document.createElement("p"); if (block.type === "meta") el.className = "meta"; if (block.html) el.innerHTML = block.html; else el.textContent = block.text; policyContent.appendChild(el);
      } else if (block.type === "ul") {
        const ul = document.createElement("ul"); block.items.forEach((item) => { const li = document.createElement("li"); li.textContent = item; ul.appendChild(li); }); policyContent.appendChild(ul);
      }
    });
    document.title = `${selected[0].text} | CAREO LIMITED`;
    localStorage.setItem("careo-language", language);
    const url = new URL(window.location.href); url.searchParams.set("lang", language); window.history.replaceState(null, "", url.toString());
  }
  languageSelect.addEventListener("change", (event) => renderPolicy(event.target.value));
  renderPolicy(policyData[initialLanguage] ? initialLanguage : "en");
</script>
