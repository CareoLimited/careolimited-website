iry"}, {"type": "h2", "text": "14. Wir können diese Erklärung aktualisieren, wenn sich App-Funktionen, Drittanbieter oder rechtliche Anforderungen ändern. Aktualisierungen werden durch ein neues Datum angezeigt. Die weitere Nutzung der App gilt als Zustimmung."}, {"type": "p", "text": "Wir können diese Erklärung aktualisieren, wenn sich App-Funktionen, Drittanbieter oder rechtliche Anforderungen ändern. Aktualisierungen werden durch ein neues Datum angezeigt. Die weitere Nutzung der App gilt als Zustimmung."}], "it": [{"type": "h1", "text": "Informativa sulla privacy - ArchiveR"}, {"type": "meta", "html": "<strong>Ultimo aggiornamento:</strong> May 2026<br><strong>App:</strong> ArchiveR<br><strong>Sviluppatore / Editore:</strong> CAREO LIMITED<br><strong>Contatto:</strong> careolimited@gmail.com"}, {"type": "p", "text": "ArchiveR (“noi”) rispetta la tua privacy. Questa informativa spiega quali informazioni possono essere trattate, come vengono utilizzate e quali sono i tuoi diritti quando usi l’app mobile su iOS e Android."}, {"type": "h2", "text": "1. Panoramica sul trattamento dei dati"}, {"type": "p", "text": "ArchiveR è progettata per mantenere i dati principali sul tuo dispositivo. Non vendiamo dati personali e usiamo servizi di terze parti solo quando necessari per le funzioni descritte sotto."}, {"type": "p", "text": "ArchiveR-generated QR codes contain compact identifiers for app use. They do not contain full inventory data. Optional metadata lookups occur only when started by the user."}, {"type": "h2", "text": "2. Dati salvati localmente"}, {"type": "p", "text": "L’app può salvare localmente sul tuo dispositivo le seguenti informazioni:"}, {"type": "ul", "items": ["Inventory items", "Custom categories and custom fields", "Quantities, prices and values", "Locations such as rooms, shelves and boxes", "Notes, tags and movement history", "Barcode and QR code mappings", "Photos attached to items", "Dashboard, language and currency preferences", "Cached metadata imported by the user"]}, {"type": "p", "text": "Queste informazioni servono a fornire le funzioni dell’app, ricordare le preferenze e supportare l’uso offline quando disponibile. Non vengono inviate ai server di CAREO LIMITED salvo indicazione esplicita."}, {"type": "h2", "text": "3. Finalità del trattamento"}, {"type": "ul", "items": ["Inventory and collection management", "Barcode and QR recognition", "Location and stock tracking", "Search, filtering and dashboard summaries", "Price and value tracking", "Backup and export selected by the user"]}, {"type": "h2", "text": "4. Servizi di terze parti"}, {"type": "p", "text": "Alcune funzioni possono usare servizi di terze parti affidabili. Tali fornitori trattano i dati secondo le proprie informative privacy."}, {"type": "ul", "items": ["Google AdMob", "Optional metadata lookup providers"]}, {"type": "h2", "text": "5. Pubblicità e tracciamento"}, {"type": "p", "text": "L’app può usare Google AdMob per mostrare annunci. AdMob può trattare identificatori pubblicitari, informazioni del dispositivo, posizione approssimativa, indirizzo IP, stato del consenso e dati di interazione con gli annunci. Dove richiesto, può essere mostrato un modulo di consenso prima degli annunci personalizzati."}, {"type": "h2", "text": "6. Acquisti o abbonamenti opzionali sono gestiti da Apple App Store o Google Play. Non riceviamo né conserviamo dati di carte di credito. Lo stato di acquisto può essere salvato localmente o verificato tramite lo store pertinente."}, {"type": "p", "text": "Attualmente l’app non offre abbonamenti o acquisti in-app. Se ciò cambia, questa informativa sarà aggiornata."}, {"type": "h2", "text": "7. Non vendiamo i tuoi dati personali. I contenuti salvati localmente non sono condivisi con terzi. Dati limitati possono essere trattati da Apple, Google, Firebase, AdMob o fornitori opzionali di metadati solo come descritto qui."}, {"type": "p", "text": "Non vendiamo i tuoi dati personali. I contenuti salvati localmente non sono condivisi con terzi. Dati limitati possono essere trattati da Apple, Google, Firebase, AdMob o fornitori opzionali di metadati solo come descritto qui."}, {"type": "h2", "text": "8. I dati locali restano sul dispositivo fino a quando li elimini, reimposti l’app o la disinstalli. I registri di pagamento e i dati pubblicitari sono conservati da Apple, Google o altri fornitori secondo le loro policy."}, {"type": "p", "text": "I dati locali restano sul dispositivo fino a quando li elimini, reimposti l’app o la disinstalli. I registri di pagamento e i dati pubblicitari sono conservati da Apple, Google o altri fornitori secondo le loro policy."}, {"type": "h2", "text": "9. A seconda della tua regione, potresti avere diritti di accesso, rettifica, cancellazione, limitazione o opposizione. Poiché la maggior parte dei dati è locale, puoi di solito gestirla o eliminarla dall’app o dalle impostazioni del dispositivo."}, {"type": "p", "text": "A seconda della tua regione, potresti avere diritti di accesso, rettifica, cancellazione, limitazione o opposizione. Poiché la maggior parte dei dati è locale, puoi di solito gestirla o eliminarla dall’app o dalle impostazioni del dispositivo."}, {"type": "h2", "text": "10. Usiamo HTTPS per comunicazioni esterne quando applicabile e progettiamo le app per ridurre la raccolta dati. Nessun software o dispositivo può garantire sicurezza assoluta."}, {"type": "p", "text": "Usiamo HTTPS per comunicazioni esterne quando applicabile e progettiamo le app per ridurre la raccolta dati. Nessun software o dispositivo può garantire sicurezza assoluta."}, {"type": "h2", "text": "11. L’app non è destinata a minori di 13 anni. Non raccogliamo consapevolmente dati personali di minori di 13 anni. Contattaci se ritieni che un minore abbia fornito dati personali."}, {"type": "p", "text": "L’app non è destinata a minori di 13 anni. Non raccogliamo consapevolmente dati personali di minori di 13 anni. Contattaci se ritieni che un minore abbia fornito dati personali."}, {"type": "h2", "text": "12. Fornitori terzi possono trattare dati limitati in paesi diversi dal tuo. Si applicano garanzie adeguate quando richiesto dalla legge."}, {"type": "p", "text": "Fornitori terzi possono trattare dati limitati in paesi diversi dal tuo. Si applicano garanzie adeguate quando richiesto dalla legge."}, {"type": "h2", "text": "13. Contatto"}, {"type": "p", "html": "<strong>Titolare del trattamento:</strong> CAREO LIMITED<br><strong>Email:</strong> careolimited@gmail.com<br><strong>Oggetto:</strong> ArchiveR - Privacy Inquiry"}, {"type": "h2", "text": "14. Possiamo aggiornare questa informativa se cambiano funzioni, servizi terzi o requisiti legali. Le modifiche saranno indicate con una nuova data. L’uso continuato implica accettazione."}, {"type": "p", "text": "Possiamo aggiornare questa informativa se cambiano funzioni, servizi terzi o requisiti legali. Le modifiche saranno indicate con una nuova data. L’uso continuato implica accettazione."}], "ja": [{"type": "h1", "text": "プライバシーポリシー - ArchiveR"}, {"type": "meta", "html": "<strong>最終更新:</strong> May 2026<br><strong>アプリ:</strong> ArchiveR<br><strong>開発者 / 発行者:</strong> CAREO LIMITED<br><strong>連絡先:</strong> careolimited@gmail.com"}, {"type": "p", "text": "ArchiveR（「当社」）はお客様のプライバシーを尊重します。本ポリシーは、iOSおよびAndroidのモバイルアプリ利用時に処理される可能性のある情報、その利用方法、お客様の権利を説明します。"}, {"type": "h2", "text": "1. データ処理の概要"}, {"type": "p", "text": "ArchiveRは主要なアプリデータを端末内に保持するよう設計されています。当社は個人データを販売せず、以下の機能に必要な場合のみ第三者サービスを使用します。"}, {"type": "p", "text": "ArchiveR-generated QR codes contain compact identifiers for app use. They do not contain full inventory data. Optional metadata lookups occur only when started by the user."}, {"type": "h2", "text": "2. ローカルに保存されるデータ"}, {"type": "p", "text": "アプリは次の情報を端末内に保存する場合があります:"}, {"type": "ul", "items": ["Inventory items", "Custom categories and custom fields", "Quantities, prices and values", "Locations such as rooms, shelves and boxes", "Notes, tags and movement history", "Barcode and QR code mappings", "Photos attached to items", "Dashboard, language and currency preferences", "Cached metadata imported by the user"]}, {"type": "p", "text": "これらの情報は、アプリ機能の提供、設定の保存、利用可能な場合のオフライン利用のために使用されます。機能が明示しない限り、CAREO LIMITEDのサーバーには送信されません。"}, {"type": "h2", "text": "3. 処理目的"}, {"type": "ul", "items": ["Inventory and collection management", "Barcode and QR recognition", "Location and stock tracking", "Search, filtering and dashboard summaries", "Price and value tracking", "Backup and export selected by the user"]}, {"type": "h2", "text": "4. 第三者サービス"}, {"type": "p", "text": "一部の機能では信頼できる第三者サービスを使用する場合があります。各提供者はそれぞれのプライバシーポリシーに従ってデータを処理します。"}, {"type": "ul", "items": ["Google AdMob", "Optional metadata lookup providers"]}, {"type": "h2", "text": "5. 広告とトラッキング"}, {"type": "p", "text": "アプリは広告表示のためにGoogle AdMobを使用する場合があります。AdMobは広告ID、端末情報、おおよその位置情報、IPアドレス、同意状態、広告操作データを処理することがあります。必要な地域では、パーソナライズ広告の前に同意フォームが表示される場合があります。"}, {"type": "h2", "text": "6. 任意の購入またはサブスクリプションはApple App StoreまたはGoogle Playによって処理されます。当社はクレジットカード情報を受け取らず保存しません。購入状態は端末内に保存されるか、該当ストアを通じて確認される場合があります。"}, {"type": "p", "text": "現在、このアプリはサブスクリプションまたはアプリ内購入を提供していません。変更がある場合、本ポリシーを更新します。"}, {"type": "h2", "text": "7. 当社は個人データを販売しません。端末内に保存されたアプリ内容は第三者と共有されません。限定的なデータは、本ポリシーに記載された範囲でApple、Google、Firebase、AdMob、または任意のメタデータ提供者により処理される場合があります。"}, {"type": "p", "text": "当社は個人データを販売しません。端末内に保存されたアプリ内容は第三者と共有されません。限定的なデータは、本ポリシーに記載された範囲でApple、Google、Firebase、AdMob、または任意のメタデータ提供者により処理される場合があります。"}, {"type": "h2", "text": "8. ローカルデータは、お客様が削除、アプリをリセット、またはアンインストールするまで端末に残ります。支払い記録や広告データはApple、Google、その他提供者のポリシーに従って保存されます。"}, {"type": "p", "text": "ローカルデータは、お客様が削除、アプリをリセット、またはアンインストールするまで端末に残ります。支払い記録や広告データはApple、Google、その他提供者のポリシーに従って保存されます。"}, {"type": "h2", "text": "9. 地域によって、アクセス、訂正、削除、制限、異議申し立ての権利を有する場合があります。ほとんどのデータはローカル保存のため、通常はアプリまたは端末設定から管理または削除できます。"}, {"type": "p", "text": "地域によって、アクセス、訂正、削除、制限、異議申し立ての権利を有する場合があります。ほとんどのデータはローカル保存のため、通常はアプリまたは端末設定から管理または削除できます。"}, {"type": "h2", "text": "10. 該当する外部通信にはHTTPSを使用し、データ収集を最小限にするようアプリを設計しています。ただし、いかなるソフトウェアや端末環境も絶対的な安全を保証できません。"}, {"type": "p", "text": "該当する外部通信にはHTTPSを使用し、データ収集を最小限にするようアプリを設計しています。ただし、いかなるソフトウェアや端末環境も絶対的な安全を保証できません。"}, {"type": "h2", "text": "11. このアプリは13歳未満の子どもを対象としていません。当社は13歳未満の子どもから故意に個人データを収集しません。子どもが個人データを提供したと思われる場合はご連絡ください。"}, {"type": "p", "text": "このアプリは13歳未満の子どもを対象としていません。当社は13歳未満の子どもから故意に個人データを収集しません。子どもが個人データを提供したと思われる場合はご連絡ください。"}, {"type": "h2", "text": "12. 第三者提供者は限定的なデータをお客様の国以外で処理する場合があります。法律上必要な場合、適切な保護措置が適用されます。"}, {"type": "p", "text": "第三者提供者は限定的なデータをお客様の国以外で処理する場合があります。法律上必要な場合、適切な保護措置が適用されます。"}, {"type": "h2", "text": "13. 連絡先"}, {"type": "p", "html": "<strong>データ管理者:</strong> CAREO LIMITED<br><strong>メール:</strong> careolimited@gmail.com<br><strong>件名:</strong> ArchiveR - Privacy Inquiry"}, {"type": "h2", "text": "14. 機能、第三者サービス、法的要件が変更された場合、本ポリシーを更新することがあります。更新は新しい最終更新日で示されます。継続利用は更新後のポリシーへの同意を意味します。"}, {"type": "p", "text": "機能、第三者サービス、法的要件が変更された場合、本ポリシーを更新することがあります。更新は新しい最終更新日で示されます。継続利用は更新後のポリシーへの同意を意味します。"}], "ko": [{"type": "h1", "text": "개인정보 처리방침 - ArchiveR"}, {"type": "meta", "html": "<strong>마지막 업데이트:</strong> May 2026<br><strong>앱:</strong> ArchiveR<br><strong>개발자 / 게시자:</strong> CAREO LIMITED<br><strong>문의:</strong> careolimited@gmail.com"}, {"type": "p", "text": "ArchiveR(“당사”)는 사용자의 개인정보를 존중합니다. 본 방침은 iOS 및 Android 모바일 앱 사용 시 어떤 정보가 처리될 수 있는지, 어떻게 사용되는지, 사용자의 권리를 설명합니다."}, {"type": "h2", "text": "1. 데이터 처리 개요"}, {"type": "p", "text": "ArchiveR는 핵심 앱 데이터를 기기에 보관하도록 설계되었습니다. 당사는 개인정보를 판매하지 않으며, 아래 기능에 필요한 경우에만 제3자 서비스를 사용합니다."}, {"type": "p", "text": "ArchiveR-generated QR codes contain compact identifiers for app use. They do not contain full inventory data. Optional metadata lookups occur only when started by the user."}, {"type": "h2", "text": "2. 로컬 저장 데이터"}, {"type": "p", "text": "앱은 다음 정보를 사용자의 기기에 로컬로 저장할 수 있습니다:"}, {"type": "ul", "items": ["Inventory items", "Custom categories and custom fields", "Quantities, prices and values", "Locations such as rooms, shelves and boxes", "Notes, tags and movement history", "Barcode and QR code mappings", "Photos attached to items", "Dashboard, language and currency preferences", "Cached metadata imported by the user"]}, {"type": "p", "text": "이 정보는 앱 기능 제공, 환경설정 저장, 가능한 경우 오프라인 사용 지원을 위해 사용됩니다. 기능에서 명확히 안내하지 않는 한 CAREO LIMITED 서버로 전송되지 않습니다."}, {"type": "h2", "text": "3. 처리 목적"}, {"type": "ul", "items": ["Inventory and collection management", "Barcode and QR recognition", "Location and stock tracking", "Search, filtering and dashboard summaries", "Price and value tracking", "Backup and export selected by the user"]}, {"type": "h2", "text": "4. 제3자 서비스"}, {"type": "p", "text": "일부 기능은 신뢰할 수 있는 제3자 서비스를 사용할 수 있습니다. 해당 제공자는 각자의 개인정보처리방침에 따라 데이터를 처리합니다."}, {"type": "ul", "items": ["Google AdMob", "Optional metadata lookup providers"]}, {"type": "h2", "text": "5. 광고 및 추적"}, {"type": "p", "text": "앱은 광고 표시를 위해 Google AdMob을 사용할 수 있습니다. AdMob은 광고 식별자, 기기 정보, 대략적인 위치, IP 주소, 동의 상태, 광고 상호작용 데이터를 처리할 수 있습니다. 필요한 지역에서는 맞춤 광고 전에 동의 양식이 표시될 수 있습니다."}, {"type": "h2", "text": "6. 선택적 구매 또는 구독은 Apple App Store 또는 Google Play를 통해 처리됩니다. 당사는 신용카드 정보를 받거나 저장하지 않습니다. 구매 상태는 로컬에 저장되거나 해당 스토어를 통해 확인될 수 있습니다."}, {"type": "p", "text": "현재 앱은 구독 또는 인앱 구매를 제공하지 않습니다. 변경 시 본 방침을 업데이트합니다."}, {"type": "h2", "text": "7. 당사는 개인정보를 판매하지 않습니다. 로컬 저장 앱 콘텐츠는 제3자와 공유되지 않습니다. 제한된 데이터는 본 방침에 설명된 경우에만 Apple, Google, Firebase, AdMob 또는 선택적 메타데이터 제공자에 의해 처리될 수 있습니다."}, {"type": "p", "text": "당사는 개인정보를 판매하지 않습니다. 로컬 저장 앱 콘텐츠는 제3자와 공유되지 않습니다. 제한된 데이터는 본 방침에 설명된 경우에만 Apple, Google, Firebase, AdMob 또는 선택적 메타데이터 제공자에 의해 처리될 수 있습니다."}, {"type": "h2", "text": "8. 로컬 데이터는 사용자가 삭제하거나 앱을 초기화 또는 제거할 때까지 기기에 남아 있습니다. 결제 기록 및 광고 데이터는 Apple, Google 또는 기타 제공자의 정책에 따라 보관됩니다."}, {"type": "p", "text": "로컬 데이터는 사용자가 삭제하거나 앱을 초기화 또는 제거할 때까지 기기에 남아 있습니다. 결제 기록 및 광고 데이터는 Apple, Google 또는 기타 제공자의 정책에 따라 보관됩니다."}, {"type": "h2", "text": "9. 지역에 따라 접근, 수정, 삭제, 제한 또는 반대 권리가 있을 수 있습니다. 대부분의 데이터는 로컬에 저장되므로 일반적으로 앱 또는 기기 설정에서 관리하거나 삭제할 수 있습니다."}, {"type": "p", "text": "지역에 따라 접근, 수정, 삭제, 제한 또는 반대 권리가 있을 수 있습니다. 대부분의 데이터는 로컬에 저장되므로 일반적으로 앱 또는 기기 설정에서 관리하거나 삭제할 수 있습니다."}, {"type": "h2", "text": "10. 해당되는 외부 통신에는 HTTPS를 사용하며 데이터 수집을 최소화하도록 앱을 설계합니다. 어떤 소프트웨어나 기기 환경도 절대적인 보안을 보장할 수 없습니다."}, {"type": "p", "text": "해당되는 외부 통신에는 HTTPS를 사용하며 데이터 수집을 최소화하도록 앱을 설계합니다. 어떤 소프트웨어나 기기 환경도 절대적인 보안을 보장할 수 없습니다."}, {"type": "h2", "text": "11. 앱은 13세 미만 아동을 대상으로 하지 않습니다. 당사는 13세 미만 아동의 개인정보를 고의로 수집하지 않습니다. 아동이 개인정보를 제공했다고 생각되면 문의해 주세요."}, {"type": "p", "text": "앱은 13세 미만 아동을 대상으로 하지 않습니다. 당사는 13세 미만 아동의 개인정보를 고의로 수집하지 않습니다. 아동이 개인정보를 제공했다고 생각되면 문의해 주세요."}, {"type": "h2", "text": "12. 제3자 제공자는 제한된 데이터를 사용자의 국가 밖에서 처리할 수 있습니다. 법에서 요구하는 경우 적절한 보호조치가 적용됩니다."}, {"type": "p", "text": "제3자 제공자는 제한된 데이터를 사용자의 국가 밖에서 처리할 수 있습니다. 법에서 요구하는 경우 적절한 보호조치가 적용됩니다."}, {"type": "h2", "text": "13. 문의"}, {"type": "p", "html": "<strong>개인정보 처리자:</strong> CAREO LIMITED<br><strong>이메일:</strong> careolimited@gmail.com<br><strong>제목:</strong> ArchiveR - Privacy Inquiry"}, {"type": "h2", "text": "14. 앱 기능, 제3자 서비스 또는 법적 요구사항이 변경되면 본 방침을 업데이트할 수 있습니다. 업데이트는 새로운 날짜로 표시됩니다. 앱을 계속 사용하면 업데이트된 방침에 동의한 것으로 간주됩니다."}, {"type": "p", "text": "앱 기능, 제3자 서비스 또는 법적 요구사항이 변경되면 본 방침을 업데이트할 수 있습니다. 업데이트는 새로운 날짜로 표시됩니다. 앱을 계속 사용하면 업데이트된 방침에 동의한 것으로 간주됩니다."}], "pt": [{"type": "h1", "text": "Política de Privacidade - ArchiveR"}, {"type": "meta", "html": "<strong>Última atualização:</strong> May 2026<br><strong>App:</strong> ArchiveR<br><strong>Programador / Editor:</strong> CAREO LIMITED<br><strong>Contacto:</strong> careolimited@gmail.com"}, {"type": "p", "text": "ArchiveR (“nós”) respeita a sua privacidade. Esta Política explica que informações podem ser processadas, como são utilizadas e quais são os seus direitos ao usar a aplicação móvel em iOS e Android."}, {"type": "h2", "text": "1. Resumo do tratamento de dados"}, {"type": "p", "text": "ArchiveR foi criada para manter os dados principais no seu dispositivo. Não vendemos dados pessoais e usamos serviços de terceiros apenas quando necessários para as funcionalidades descritas abaixo."}, {"type": "p", "text": "ArchiveR-generated QR codes contain compact identifiers for app use. They do not contain full inventory data. Optional metadata lookups occur only when started by the user."}, {"type": "h2", "text": "2. Dados armazenados localmente"}, {"type": "p", "text": "A aplicação pode armazenar localmente as seguintes informações no seu dispositivo:"}, {"type": "ul", "items": ["Inventory items", "Custom categories and custom fields", "Quantities, prices and values", "Locations such as rooms, shelves and boxes", "Notes, tags and movement history", "Barcode and QR code mappings", "Photos attached to items", "Dashboard, language and currency preferences", "Cached metadata imported by the user"]}, {"type": "p", "text": "Estas informações são usadas para fornecer as funcionalidades da aplicação, lembrar preferências e suportar utilização offline quando disponível. Não são enviadas para servidores da CAREO LIMITED salvo indicação explícita de uma funcionalidade."}, {"type": "h2", "text": "3. Finalidades do tratamento"}, {"type": "ul", "items": ["Inventory and collection management", "Barcode and QR recognition", "Location and stock tracking", "Search, filtering and dashboard summaries", "Price and value tracking", "Backup and export selected by the user"]}, {"type": "h2", "text": "4. Serviços de terceiros"}, {"type": "p", "text": "Algumas funcionalidades podem usar serviços terceiros de confiança. Estes fornecedores processam dados de acordo com as suas próprias políticas de privacidade."}, {"type": "ul", "items": ["Google AdMob", "Optional metadata lookup providers"]}, {"type": "h2", "text": "5. Publicidade e rastreamento"}, {"type": "p", "text": "A aplicação pode usar Google AdMob para apresentar anúncios. O AdMob pode processar identificadores de publicidade, informação do dispositivo, localização aproximada, endereço IP, estado de consentimento e dados de interação com anúncios. Quando exigido, pode ser apresentado um formulário de consentimento antes de anúncios personalizados."}, {"type": "h2", "text": "6. Compras ou subscrições opcionais são processadas pela Apple App Store ou Google Play. Não recebemos nem armazenamos dados de cartões. O estado da compra pode ser armazenado localmente ou verificado através da loja relevante."}, {"type": "p", "text": "A aplicação não oferece atualmente subscrições ou compras na app. Se isto mudar, esta Política será atualizada."}, {"type": "h2", "text": "7. Não vendemos os seus dados pessoais. O conteúdo armazenado localmente não é partilhado com terceiros. Dados limitados podem ser processados pela Apple, Google, Firebase, AdMob ou fornecedores opcionais de metadados apenas como descrito nesta Política."}, {"type": "p", "text": "Não vendemos os seus dados pessoais. O conteúdo armazenado localmente não é partilhado com terceiros. Dados limitados podem ser processados pela Apple, Google, Firebase, AdMob ou fornecedores opcionais de metadados apenas como descrito nesta Política."}, {"type": "h2", "text": "8. Os dados locais permanecem no dispositivo até serem eliminados, a app ser reposta ou desinstalada. Registos de pagamento e dados de publicidade são retidos pela Apple, Google ou outros fornecedores segundo as suas políticas."}, {"type": "p", "text": "Os dados locais permanecem no dispositivo até serem eliminados, a app ser reposta ou desinstalada. Registos de pagamento e dados de publicidade são retidos pela Apple, Google ou outros fornecedores segundo as suas políticas."}, {"type": "h2", "text": "9. Dependendo da sua região, pode ter direitos de acesso, correção, eliminação, restrição ou oposição. Como a maioria dos dados fica localmente, normalmente pode geri-los ou apagá-los na app ou nas definições do dispositivo."}, {"type": "p", "text": "Dependendo da sua região, pode ter direitos de acesso, correção, eliminação, restrição ou oposição. Como a maioria dos dados fica localmente, normalmente pode geri-los ou apagá-los na app ou nas definições do dispositivo."}, {"type": "h2", "text": "10. Usamos HTTPS para comunicações externas quando aplicável e desenhamos as nossas apps para minimizar a recolha de dados. Nenhum software ou dispositivo pode garantir segurança absoluta."}, {"type": "p", "text": "Usamos HTTPS para comunicações externas quando aplicável e desenhamos as nossas apps para minimizar a recolha de dados. Nenhum software ou dispositivo pode garantir segurança absoluta."}, {"type": "h2", "text": "11. A app não se destina a crianças com menos de 13 anos. Não recolhemos conscientemente dados pessoais de crianças com menos de 13 anos. Contacte-nos se acredita que uma criança forneceu dados pessoais."}, {"type": "p", "text": "A app não se destina a crianças com menos de 13 anos. Não recolhemos conscientemente dados pessoais de crianças com menos de 13 anos. Contacte-nos se acredita que uma criança forneceu dados pessoais."}, {"type": "h2", "text": "12. Fornecedores terceiros podem processar dados limitados em países fora do seu. São aplicadas salvaguardas adequadas quando exigido por lei."}, {"type": "p", "text": "Fornecedores terceiros podem processar dados limitados em países fora do seu. São aplicadas salvaguardas adequadas quando exigido por lei."}, {"type": "h2", "text": "13. Contacto"}, {"type": "p", "html": "<strong>Responsável pelo tratamento:</strong> CAREO LIMITED<br><strong>Email:</strong> careolimited@gmail.com<br><strong>Assunto:</strong> ArchiveR - Privacy Inquiry"}, {"type": "h2", "text": "14. Podemos atualizar esta Política se funcionalidades, serviços terceiros ou requisitos legais mudarem. As atualizações serão indicadas por uma nova data. O uso continuado implica aceitação."}, {"type": "p", "text": "Podemos atualizar esta Política se funcionalidades, serviços terceiros ou requisitos legais mudarem. As atualizações serão indicadas por uma nova data. O uso continuado implica aceitação."}], "ru": [{"type": "h1", "text": "Политика конфиденциальности - ArchiveR"}, {"type": "meta", "html": "<strong>Последнее обновление:</strong> May 2026<br><strong>Приложение:</strong> ArchiveR<br><strong>Разработчик / Издатель:</strong> CAREO LIMITED<br><strong>Контакт:</strong> careolimited@gmail.com"}, {"type": "p", "text": "ArchiveR («мы») уважает вашу конфиденциальность. Эта Политика объясняет, какие сведения могут обрабатываться, как они используются и какие права у вас есть при использовании мобильного приложения на iOS и Android."}, {"type": "h2", "text": "1. Обзор обработки данных"}, {"type": "p", "text": "ArchiveR разработано так, чтобы основные данные приложения оставались на вашем устройстве. Мы не продаем персональные данные и используем сторонние сервисы только если они нужны для функций, описанных ниже."}, {"type": "p", "text": "ArchiveR-generated QR codes contain compact identifiers for app use. They do not contain full inventory data. Optional metadata lookups occur only when started by the user."}, {"type": "h2", "text": "2. Локально сохраняемые данные"}, {"type": "p", "text": "Приложение может локально сохранять на вашем устройстве следующие сведения:"}, {"type": "ul", "items": ["Inventory items", "Custom categories and custom fields", "Quantities, prices and values", "Locations such as rooms, shelves and boxes", "Notes, tags and movement history", "Barcode and QR code mappings", "Photos attached to items", "Dashboard, language and currency preferences", "Cached metadata imported by the user"]}, {"type": "p", "text": "Эти сведения используются для работы функций приложения, запоминания настроек и поддержки офлайн-использования, если оно доступно. Они не отправляются на серверы CAREO LIMITED, если функция явно не сообщает об обратном."}, {"type": "h2", "text": "3. Цели обработки"}, {"type": "ul", "items": ["Inventory and collection management", "Barcode and QR recognition", "Location and stock tracking", "Search, filtering and dashboard summaries", "Price and value tracking", "Backup and export selected by the user"]}, {"type": "h2", "text": "4. Сторонние сервисы"}, {"type": "p", "text": "Некоторые функции могут использовать доверенные сторонние сервисы. Эти поставщики обрабатывают данные по своим политикам конфиденциальности."}, {"type": "ul", "items": ["Google AdMob", "Optional metadata lookup providers"]}, {"type": "h2", "text": "5. Реклама и отслеживание"}, {"type": "p", "text": "Приложение может использовать Google AdMob для показа рекламы. AdMob может обрабатывать рекламные идентификаторы, сведения об устройстве, приблизительное местоположение, IP-адрес, статус согласия и данные взаимодействия с рекламой. Там, где требуется, перед персонализированной рекламой может показываться форма согласия."}, {"type": "h2", "text": "6. Необязательные покупки или подписки обрабатываются через Apple App Store или Google Play. Мы не получаем и не храним данные банковских карт. Статус покупки может сохраняться локально или проверяться через соответствующий магазин."}, {"type": "p", "text": "В настоящее время приложение не предлагает подписки или встроенные покупки. Если это изменится, Политика будет обновлена."}, {"type": "h2", "text": "7. Мы не продаем ваши персональные данные. Локально сохраненное содержимое приложения не передается третьим лицам. Ограниченные данные могут обрабатываться Apple, Google, Firebase, AdMob или дополнительными поставщиками метаданных только как описано в этой Политике."}, {"type": "p", "text": "Мы не продаем ваши персональные данные. Локально сохраненное содержимое приложения не передается третьим лицам. Ограниченные данные могут обрабатываться Apple, Google, Firebase, AdMob или дополнительными поставщиками метаданных только как описано в этой Политике."}, {"type": "h2", "text": "8. Локальные данные остаются на устройстве, пока вы не удалите их, не сбросите приложение или не удалите приложение. Платежные записи и рекламные данные хранятся Apple, Google или другими поставщиками по их политикам."}, {"type": "p", "text": "Локальные данные остаются на устройстве, пока вы не удалите их, не сбросите приложение или не удалите приложение. Платежные записи и рекламные данные хранятся Apple, Google или другими поставщиками по их политикам."}, {"type": "h2", "text": "9. В зависимости от региона у вас могут быть права на доступ, исправление, удаление, ограничение или возражение. Поскольку большинство данных хранится локально, обычно вы можете управлять ими или удалять их в приложении или настройках устройства."}, {"type": "p", "text": "В зависимости от региона у вас могут быть права на доступ, исправление, удаление, ограничение или возражение. Поскольку большинство данных хранится локально, обычно вы можете управлять ими или удалять их в приложении или настройках устройства."}, {"type": "h2", "text": "10. Мы используем HTTPS для внешних коммуникаций, где применимо, и проектируем приложения так, чтобы минимизировать сбор данных. Ни одно программное обеспечение или устройство не может гарантировать абсолютную безопасность."}, {"type": "p", "text": "Мы используем HTTPS для внешних коммуникаций, где применимо, и проектируем приложения так, чтобы минимизировать сбор данных. Ни одно программное обеспечение или устройство не может гарантировать абсолютную безопасность."}, {"type": "h2", "text": "11. Приложение не предназначено для детей младше 13 лет. Мы сознательно не собираем персональные данные детей младше 13 лет. Если вы считаете, что ребенок предоставил персональные данные, свяжитесь с нами."}, {"type": "p", "text": "Приложение не предназначено для детей младше 13 лет. Мы сознательно не собираем персональные данные детей младше 13 лет. Если вы считаете, что ребенок предоставил персональные данные, свяжитесь с нами."}, {"type": "h2", "text": "12. Сторонние поставщики могут обрабатывать ограниченные данные за пределами вашей страны. Там, где требуется законом, применяются соответствующие меры защиты."}, {"type": "p", "text": "Сторонние поставщики могут обрабатывать ограниченные данные за пределами вашей страны. Там, где требуется законом, применяются соответствующие меры защиты."}, {"type": "h2", "text": "13. Контакты"}, {"type": "p", "html": "<strong>Контролер данных:</strong> CAREO LIMITED<br><strong>Email:</strong> careolimited@gmail.com<br><strong>Тема:</strong> ArchiveR - Privacy Inquiry"}, {"type": "h2", "text": "14. Мы можем обновлять эту Политику при изменении функций, сторонних сервисов или требований закона. Обновления будут отражены новой датой. Продолжение использования приложения означает принятие обновленной Политики."}, {"type": "p", "text": "Мы можем обновлять эту Политику при изменении функций, сторонних сервисов или требований закона. Обновления будут отражены новой датой. Продолжение использования приложения означает принятие обновленной Политики."}], "es": [{"type": "h1", "text": "Política de privacidad - ArchiveR"}, {"type": "meta", "html": "<strong>Última actualización:</strong> May 2026<br><strong>App:</strong> ArchiveR<br><strong>Desarrollador / Editor:</strong> CAREO LIMITED<br><strong>Contacto:</strong> careolimited@gmail.com"}, {"type": "p", "text": "ArchiveR (“nosotros”) respeta tu privacidad. Esta Política explica qué información puede procesarse, cómo se utiliza y cuáles son tus derechos al usar la aplicación móvil en iOS y Android."}, {"type": "h2", "text": "1. Resumen del tratamiento de datos"}, {"type": "p", "text": "ArchiveR está diseñada para mantener los datos principales en tu dispositivo. No vendemos datos personales y solo usamos servicios de terceros cuando son necesarios para las funciones descritas abajo."}, {"type": "p", "text": "ArchiveR-generated QR codes contain compact identifiers for app use. They do not contain full inventory data. Optional metadata lookups occur only when started by the user."}, {"type": "h2", "text": "2. Datos almacenados localmente"}, {"type": "p", "text": "La app puede almacenar la siguiente información localmente en tu dispositivo:"}, {"type": "ul", "items": ["Inventory items", "Custom categories and custom fields", "Quantities, prices and values", "Locations such as rooms, shelves and boxes", "Notes, tags and movement history", "Barcode and QR code mappings", "Photos attached to items", "Dashboard, language and currency preferences", "Cached metadata imported by the user"]}, {"type": "p", "text": "Esta información se usa para ofrecer las funciones de la app, recordar preferencias y permitir el uso sin conexión cuando esté disponible. No se envía a servidores de CAREO LIMITED salvo que una función lo indique claramente."}, {"type": "h2", "text": "3. Finalidades del tratamiento"}, {"type": "ul", "items": ["Inventory and collection management", "Barcode and QR recognition", "Location and stock tracking", "Search, filtering and dashboard summaries", "Price and value tracking", "Backup and export selected by the user"]}, {"type": "h2", "text": "4. Servicios de terceros"}, {"type": "p", "text": "Algunas funciones pueden usar servicios de terceros de confianza. Estos proveedores procesan datos según sus propias políticas de privacidad."}, {"type": "ul", "items": ["Google AdMob", "Optional metadata lookup providers"]}, {"type": "h2", "text": "5. Publicidad y seguimiento"}, {"type": "p", "text": "La app puede usar Google AdMob para mostrar anuncios. AdMob puede procesar identificadores publicitarios, información del dispositivo, ubicación aproximada, dirección IP, estado de consentimiento y datos de interacción con anuncios. Cuando sea necesario, se puede mostrar un formulario de consentimiento antes de anuncios personalizados."}, {"type": "h2", "text": "6. Las compras o suscripciones opcionales se procesan mediante Apple App Store o Google Play. No recibimos ni almacenamos datos de tarjetas. El estado de compra puede guardarse localmente o verificarse mediante la tienda correspondiente."}, {"type": "p", "text": "Actualmente la app no ofrece suscripciones ni compras dentro de la app. Si esto cambia, esta Política se actualizará."}, {"type": "h2", "text": "7. No vendemos tus datos personales. El contenido almacenado localmente no se comparte con terceros. Datos limitados pueden ser procesados por Apple, Google, Firebase, AdMob o proveedores opcionales de metadatos solo como se describe aquí."}, {"type": "p", "text": "No vendemos tus datos personales. El contenido almacenado localmente no se comparte con terceros. Datos limitados pueden ser procesados por Apple, Google, Firebase, AdMob o proveedores opcionales de metadatos solo como se describe aquí."}, {"type": "h2", "text": "8. Los datos locales permanecen en tu dispositivo hasta que los elimines, restablezcas la app o la desinstales. Los registros de pagos y datos publicitarios son conservados por Apple, Google u otros proveedores según sus políticas."}, {"type": "p", "text": "Los datos locales permanecen en tu dispositivo hasta que los elimines, restablezcas la app o la desinstales. Los registros de pagos y datos publicitarios son conservados por Apple, Google u otros proveedores según sus políticas."}, {"type": "h2", "text": "9. Según tu región, puedes tener derechos de acceso, corrección, eliminación, restricción u oposición. Como la mayoría de los datos se almacena localmente, normalmente puedes gestionarlos o eliminarlos desde la app o los ajustes del dispositivo."}, {"type": "p", "text": "Según tu región, puedes tener derechos de acceso, corrección, eliminación, restricción u oposición. Como la mayoría de los datos se almacena localmente, normalmente puedes gestionarlos o eliminarlos desde la app o los ajustes del dispositivo."}, {"type": "h2", "text": "10. Usamos HTTPS para comunicaciones externas cuando corresponde y diseñamos nuestras apps para minimizar la recopilación de datos. Ningún entorno de software o dispositivo puede garantizar seguridad absoluta."}, {"type": "p", "text": "Usamos HTTPS para comunicaciones externas cuando corresponde y diseñamos nuestras apps para minimizar la recopilación de datos. Ningún entorno de software o dispositivo puede garantizar seguridad absoluta."}, {"type": "h2", "text": "11. La app no está dirigida a menores de 13 años. No recopilamos conscientemente datos personales de menores de 13 años. Si crees que un menor ha proporcionado datos personales, contáctanos."}, {"type": "p", "text": "La app no está dirigida a menores de 13 años. No recopilamos conscientemente datos personales de menores de 13 años. Si crees que un menor ha proporcionado datos personales, contáctanos."}, {"type": "h2", "text": "12. Los proveedores terceros pueden procesar datos limitados en países fuera del tuyo. Se aplican salvaguardas adecuadas cuando la ley lo exige."}, {"type": "p", "text": "Los proveedores terceros pueden procesar datos limitados en países fuera del tuyo. Se aplican salvaguardas adecuadas cuando la ley lo exige."}, {"type": "h2", "text": "13. Contacto"}, {"type": "p", "html": "<strong>Responsable del tratamiento:</strong> CAREO LIMITED<br><strong>Email:</strong> careolimited@gmail.com<br><strong>Asunto:</strong> ArchiveR - Privacy Inquiry"}, {"type": "h2", "text": "14. Podemos actualizar esta Política si cambian las funciones, servicios terceros o requisitos legales. Las actualizaciones se reflejarán con una nueva fecha. El uso continuado de la app implica la aceptación."}, {"type": "p", "text": "Podemos actualizar esta Política si cambian las funciones, servicios terceros o requisitos legales. Las actualizaciones se reflejarán con una nueva fecha. El uso continuado de la app implica la aceptación."}], "tr": [{"type": "h1", "text": "Gizlilik Politikası - ArchiveR"}, {"type": "meta", "html": "<strong>Son güncelleme:</strong> May 2026<br><strong>Uygulama:</strong> ArchiveR<br><strong>Geliştirici / Yayıncı:</strong> CAREO LIMITED<br><strong>İletişim:</strong> careolimited@gmail.com"}, {"type": "p", "text": "ArchiveR (“biz”, “bize”, “bizim”) gizliliğinize saygı duyar. Bu Politika, iOS ve Android mobil uygulamasını kullanırken hangi bilgilerin işlenebileceğini, nasıl kullanıldığını ve haklarınızı açıklar."}, {"type": "h2", "text": "1. Veri İşleme Özeti"}, {"type": "p", "text": "ArchiveR, temel uygulama verilerini cihazınızda tutacak şekilde tasarlanmıştır. Kişisel verileri satmayız ve üçüncü taraf hizmetleri yalnızca aşağıda açıklanan özellikler için gerekli olduğunda kullanırız."}, {"type": "p", "text": "ArchiveR-generated QR codes contain compact identifiers for app use. They do not contain full inventory data. Optional metadata lookups occur only when started by the user."}, {"type": "h2", "text": "2. Yerel Olarak Saklanan Veriler"}, {"type": "p", "text": "Uygulama aşağıdaki bilgileri cihazınızda yerel olarak saklayabilir:"}, {"type": "ul", "items": ["Envanter öğeleri", "Özel kategoriler ve özel alanlar", "Miktarlar, fiyatlar ve değerler", "Oda, raf ve kutu gibi konumlar", "Notlar, etiketler ve hareket geçmişi", "Barkod ve QR kod eşleştirmeleri", "Öğelere eklenen fotoğraflar", "Panel, dil ve para birimi tercihleri", "Kullanıcı tarafından içe aktarılan önbellek metadata"]}, {"type": "p", "text": "Bu bilgiler uygulama özelliklerini sunmak, tercihlerinizi hatırlamak ve mümkün olduğunda çevrimdışı kullanımı desteklemek için kullanılır. Bir özellik açıkça belirtmediği sürece CAREO LIMITED sunucularına gönderilmez."}, {"type": "h2", "text": "3. İşleme Amaçları"}, {"type": "ul", "items": ["Inventory and collection management", "Barcode and QR recognition", "Location and stock tracking", "Search, filtering and dashboard summaries", "Price and value tracking", "Backup and export selected by the user"]}, {"type": "h2", "text": "4. Üçüncü Taraf Hizmetler"}, {"type": "p", "text": "Bazı özellikler güvenilir üçüncü taraf hizmetleri kullanabilir. Bu sağlayıcılar verileri kendi gizlilik politikalarına göre işler."}, {"type": "ul", "items": ["Google AdMob", "Optional metadata lookup providers"]}, {"type": "h2", "text": "5. Reklam ve Takip"}, {"type": "p", "text": "Uygulama reklam göstermek için Google AdMob kullanabilir. AdMob reklam kimlikleri, cihaz bilgileri, yaklaşık konum, IP adresi, izin durumu ve reklam etkileşim verilerini işleyebilir. Gerekli bölgelerde kişiselleştirilmiş reklamlar için izin formu gösterilebilir."}, {"type": "h2", "text": "6. İsteğe bağlı satın almalar veya abonelikler Apple App Store ya da Google Play tarafından işlenir. Kredi kartı bilgilerini almayız veya saklamayız. Satın alma durumu yerel olarak saklanabilir veya ilgili mağaza üzerinden doğrulanabilir."}, {"type": "p", "text": "Uygulama şu anda abonelik veya uygulama içi satın alma sunmaz. Bu durum değişirse Politika güncellenecektir."}, {"type": "h2", "text": "7. Kişisel verilerinizi satmayız. Yerel olarak saklanan uygulama içeriği üçüncü taraflarla paylaşılmaz. Sınırlı veriler yalnızca bu Politikada açıklandığı şekilde Apple, Google, Firebase, AdMob veya isteğe bağlı metadata sağlayıcıları tarafından işlenebilir."}, {"type": "p", "text": "Kişisel verilerinizi satmayız. Yerel olarak saklanan uygulama içeriği üçüncü taraflarla paylaşılmaz. Sınırlı veriler yalnızca bu Politikada açıklandığı şekilde Apple, Google, Firebase, AdMob veya isteğe bağlı metadata sağlayıcıları tarafından işlenebilir."}, {"type": "h2", "text": "8. Yerel veriler siz silene, uygulamayı sıfırlayana veya kaldırana kadar cihazınızda kalır. Mağaza ödeme kayıtları ve reklam verileri Apple, Google veya diğer sağlayıcıların kendi politikalarına göre saklanır."}, {"type": "p", "text": "Yerel veriler siz silene, uygulamayı sıfırlayana veya kaldırana kadar cihazınızda kalır. Mağaza ödeme kayıtları ve reklam verileri Apple, Google veya diğer sağlayıcıların kendi politikalarına göre saklanır."}, {"type": "h2", "text": "9. Bölgenize bağlı olarak erişim, düzeltme, silme, sınırlandırma veya itiraz haklarınız olabilir. Verilerin çoğu yerel saklandığı için bunları genellikle uygulama veya cihaz ayarları üzerinden yönetebilir ya da silebilirsiniz."}, {"type": "p", "text": "Bölgenize bağlı olarak erişim, düzeltme, silme, sınırlandırma veya itiraz haklarınız olabilir. Verilerin çoğu yerel saklandığı için bunları   const supportedLanguages = Object.keys(policyData);
  const languageSelect = document.getElementById("languageSelect");
  const backLink = document.getElementById("backLink");
  const policyContent = document.getElementById("policyContent");

  function escapeHtml(value) {
    return String(value).replace(/[&<>"']/g, (char) => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[char]));
  }

  function renderBlock(block) {
    if (block.type === "h1") return `<h1>${escapeHtml(block.text)}</h1>`;
    if (block.type === "h2") return `<h2>${escapeHtml(block.text)}</h2>`;
    if (block.type === "meta") return `<p class="meta">${block.html}</p>`;
    if (block.type === "p") return `<p>${block.html || escapeHtml(block.text)}</p>`;
    if (block.type === "ul") return `<ul>${block.items.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`;
    return "";
  }

  function setLanguage(language) {
    const selected = supportedLanguages.includes(language) ? language : "en";
    document.documentElement.lang = selected;
    languageSelect.value = selected;
    localStorage.setItem("careo-language", selected);
    backLink.textContent = uiText[selected].back;
    backLink.href = `../index.html?lang=${encodeURIComponent(selected)}`;
    policyContent.innerHTML = policyData[selected].map(renderBlock).join("
");
  }

  const urlLanguage = new URLSearchParams(window.location.search).get("lang");
  const initialLanguage = supportedLanguages.includes(urlLanguage) ? urlLanguage : (localStorage.getItem("careo-language") || "en");
  languageSelect.addEventListener("change", (event) => setLanguage(event.target.value));
  setLanguage(initialLanguage);
