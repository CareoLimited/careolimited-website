<script>
  const policyData = {"en":[{"type":"h1","text":"Privacy Policy - Booklio"},{"type":"meta","html":"<strong>Last updated:<\/strong> July 13, 2026<br><strong>App:<\/strong> Booklio<br><strong>Developer / Publisher:<\/strong> CAREO LIMITED<br><strong>Contact:<\/strong> careolimited@gmail.com"},{"type":"p","text":"Booklio respects your privacy. This Policy explains what information may be processed, how it is used, and your rights when you use the mobile application on iOS and Android."},{"type":"h2","text":"1. Data Processing Overview"},{"type":"p","text":"Booklio is designed to keep core app data on your device where possible. We do not sell personal data and we only use third-party services where they are needed for the features described below."},{"type":"h2","text":"2. Locally Stored Data"},{"type":"p","text":"The app may store data related to book discovery, barcode scanning, personal library management, reading progress, notes, quotes, ratings, goals and statistics locally on your device. This data is used to provide app features, remember preferences and support offline usage where available."},{"type":"h2","text":"3. Processing Purposes"},{"type":"ul","items":["Provide core app functionality","Remember user preferences","Support offline usage where available","Process purchases or premium access where applicable","Improve stability and prevent abuse"]},{"type":"h2","text":"4. Third-Party Services"},{"type":"p","text":"The app may use the following third-party services or providers: Google Books API, Open Library API, OpenAlex, Crossref, openBD, NDL Search, Rakuten Books API, Naver Search API, Kakao Book Search API, German National Library (DNB) SRU, Bibliotheque nationale de France (BnF) SRU, Cloudflare Workers, Google AdMob, Apple App Store and Google Play. These services operate under their own privacy policies."},{"type":"p","text":"When you scan a barcode or search by ISBN, title, author or DOI, the relevant search term may be sent to book metadata providers to retrieve title, author, publisher, cover image, description and similar book information. Some regional book lookups are routed through our Cloudflare Worker metadata proxy so the app can access provider APIs reliably. Your personal library content, notes, ratings and reading progress are not sent to book metadata providers for this purpose."},{"type":"h2","text":"5. Advertising and Tracking"},{"type":"p","text":"The free version uses Google AdMob to display banner and interstitial ads. The Google Mobile Ads SDK may automatically collect and share IP address (which may be used to estimate general location), app and ad interactions such as app launches, taps and ad views, diagnostic and performance information, and device or account identifiers such as advertising identifiers. Google may use this information for advertising, analytics and fraud prevention."},{"type":"p","text":"Depending on your region, consent choices and device permissions, ads may be personalized or non-personalized/limited. We use Google’s User Messaging Platform (UMP) to request and store applicable advertising privacy choices. If consent information cannot be obtained, a required permission is not granted, or the consent flow fails, the app defaults to requesting non-personalized ads."},{"type":"p","text":"On iOS, the app uses Apple App Tracking Transparency (ATT) before allowing personalized advertising or access to the advertising identifier. You can change this permission in iOS Settings. Where available, free users can review or change Google advertising choices in Settings > Privacy & Legal > Ad Privacy Options. Availability depends on region and legal requirements. Pro removes banner and interstitial ads."},{"type":"p","html":"For more information, see <a href=\"https://policies.google.com/privacy\" target=\"_blank\" rel=\"noopener noreferrer\">Google’s Privacy Policy<\/a> and your device’s advertising and privacy settings."},{"type":"h2","text":"6. Purchases and Premium Features"},{"type":"p","text":"Optional purchases, subscriptions or premium access may be processed by Apple App Store or Google Play. We do not receive or store credit card details. Purchase status may be stored locally or verified through the relevant store."},{"type":"h2","text":"7. Data Sharing"},{"type":"p","text":"We do not sell personal data. Locally stored app content is not shared with CAREO LIMITED servers. Limited data may be processed by third-party providers only as described in this Policy, including book lookup identifiers such as ISBN, title, author or DOI when you use metadata lookup features."},{"type":"h2","text":"8. Data Retention and Deletion"},{"type":"p","text":"Local data remains on your device until you delete it, reset the app, or uninstall the app. Store payment records, advertising data and analytics data are retained by the relevant providers according to their own policies."},{"type":"h2","text":"9. User Rights"},{"type":"p","text":"Depending on your region, you may have rights to access, correct, delete, restrict, or object to processing. Because most app data is stored locally, you can usually manage or remove it directly through the app or your device settings."},{"type":"h2","text":"10. Data Security"},{"type":"p","text":"We use HTTPS for external communications where applicable, route some provider API requests through a server-side metadata proxy where needed, and design our apps to minimize data collection. No software or device environment can guarantee absolute security."},{"type":"h2","text":"11. Children’s Privacy"},{"type":"p","text":"The app is not directed to children under 13. We do not knowingly collect personal data from children under 13. If you believe a child has provided personal data, contact us."},{"type":"h2","text":"12. International Data Transfers"},{"type":"p","text":"Third-party providers may process limited data in countries outside your own. Appropriate safeguards apply where required by law."},{"type":"h2","text":"13. Contact"},{"type":"p","html":"<strong>CAREO LIMITED<\/strong><br>careolimited@gmail.com<br>Booklio - Privacy Inquiry"},{"type":"h2","text":"14. Policy Updates"},{"type":"p","text":"We may update this Policy if app features, third-party services or legal requirements change. Updates will be reflected with a new Last updated date. Continued use of the app implies acceptance of the updated Policy."}],"fr":[{"type":"h1","text":"Politique de confidentialité - Livreo"},{"type":"meta","html":"<strong>Dernière mise à jour:<\/strong> 13 juillet 2026<br><strong>App:<\/strong> Livreo<br><strong>Développeur / Éditeur:<\/strong> CAREO LIMITED<br><strong>Contact:<\/strong> careolimited@gmail.com"},{"type":"p","text":"Livreo respecte votre vie privée. Cette Politique explique quelles informations peuvent être traitées, comment elles sont utilisées et quels sont vos droits lorsque vous utilisez l’application mobile sur iOS et Android."},{"type":"h2","text":"1. Aperçu du traitement des données"},{"type":"p","text":"Livreo est conçue pour conserver les données principales sur votre appareil lorsque cela est possible. Nous ne vendons pas de données personnelles et nous utilisons des services tiers uniquement lorsqu'ils sont nécessaires aux fonctions décrites ci-dessous."},{"type":"h2","text":"2. Données stockées localement"},{"type":"p","text":"L’application peut stocker localement sur votre appareil des données liées à la découverte de livres, le scan de codes-barres, la gestion de bibliothèque personnelle, la progression de lecture, les notes, les citations, les évaluations, les objectifs et les statistiques. Ces données servent à fournir les fonctions de l’app, mémoriser vos préférences et permettre l’utilisation hors ligne lorsque disponible."},{"type":"h2","text":"3. Finalités du traitement"},{"type":"ul","items":["Fournir les fonctions principales de l’application","Mémoriser les préférences utilisateur","Permettre l’utilisation hors ligne lorsque disponible","Traiter les achats ou l’accès Premium si applicable","Améliorer la stabilité et prévenir les abus"]},{"type":"h2","text":"4. Services tiers"},{"type":"p","text":"L'application peut utiliser les services ou fournisseurs tiers suivants : Google Books API, Open Library API, OpenAlex, Crossref, openBD, NDL Search, Rakuten Books API, Naver Search API, Kakao Book Search API, Deutsche Nationalbibliothek (DNB) SRU, Bibliotheque nationale de France (BnF) SRU, Cloudflare Workers, Google AdMob, Apple App Store et Google Play. Ces services fonctionnent selon leurs propres politiques de confidentialite."},{"type":"p","text":"Lorsque vous scannez un code-barres ou recherchez par ISBN, titre, auteur ou DOI, le terme de recherche pertinent peut etre envoye a des fournisseurs de metadonnees de livres afin de recuperer le titre, l'auteur, l'editeur, l'image de couverture, la description et des informations similaires. Certaines recherches regionales de livres sont acheminees via notre proxy de metadonnees Cloudflare Worker afin que l'application puisse acceder aux API des fournisseurs de facon fiable. Le contenu de votre bibliotheque personnelle, vos notes, evaluations et progression de lecture ne sont pas envoyes a ces fournisseurs a cette fin."},{"type":"h2","text":"5. Publicité et suivi"},{"type":"p","text":"La version gratuite utilise Google AdMob pour afficher des bannières et des annonces interstitielles. Le SDK Google Mobile Ads peut collecter et partager automatiquement l’adresse IP (qui peut servir à estimer une localisation générale), les interactions avec l’app et les annonces telles que les lancements, les appuis et les vues d’annonces, des informations de diagnostic et de performance, ainsi que des identifiants d’appareil ou de compte tels que les identifiants publicitaires. Google peut utiliser ces informations à des fins de publicité, d’analyse et de prévention de la fraude."},{"type":"p","text":"Selon votre région, vos choix de consentement et les autorisations de l’appareil, les annonces peuvent être personnalisées ou non personnalisées/limitées. Nous utilisons la User Messaging Platform (UMP) de Google pour recueillir et enregistrer les choix applicables en matière de confidentialité publicitaire. Si les informations de consentement ne peuvent pas être obtenues, si une autorisation requise n’est pas accordée ou si le processus échoue, l’app demande par défaut des annonces non personnalisées."},{"type":"p","text":"Sur iOS, l’app utilise l’App Tracking Transparency (ATT) d’Apple avant d’autoriser la publicité personnalisée ou l’accès à l’identifiant publicitaire. Vous pouvez modifier cette autorisation dans les réglages iOS. Lorsqu’elle est disponible, l’option Réglages > Confidentialité et mentions légales > Options de confidentialité des annonces permet aux utilisateurs gratuits de consulter ou modifier leurs choix Google. Sa disponibilité dépend de la région et des exigences légales. Pro supprime les bannières et annonces interstitielles."},{"type":"p","html":"Pour plus d’informations, consultez la <a href=\"https://policies.google.com/privacy?hl=fr\" target=\"_blank\" rel=\"noopener noreferrer\">Politique de confidentialité de Google<\/a> et les réglages publicitaires et de confidentialité de votre appareil."},{"type":"h2","text":"6. Achats et fonctions Premium"},{"type":"p","text":"Les achats, abonnements ou accès Premium optionnels peuvent être traités par Apple App Store ou Google Play. Nous ne recevons ni ne stockons les informations de carte bancaire. L’état d’achat peut être stocké localement ou vérifié via la boutique concernée."},{"type":"h2","text":"7. Partage des données"},{"type":"p","text":"Nous ne vendons pas de donnees personnelles. Le contenu stocke localement n'est pas partage avec les serveurs de CAREO LIMITED. Des donnees limitees peuvent etre traitees par des fournisseurs tiers uniquement comme decrit dans cette Politique, y compris les identifiants de recherche de livre tels que l'ISBN, le titre, l'auteur ou le DOI lorsque vous utilisez les fonctions de recherche de metadonnees."},{"type":"h2","text":"8. Conservation et suppression"},{"type":"p","text":"Les données locales restent sur votre appareil jusqu’à ce que vous les supprimiez, réinitialisiez l’app ou désinstalliez l’app. Les enregistrements de paiement, données publicitaires et données d’analyse sont conservés par les fournisseurs concernés selon leurs propres politiques."},{"type":"h2","text":"9. Droits des utilisateurs"},{"type":"p","text":"Selon votre région, vous pouvez disposer de droits d’accès, de rectification, de suppression, de limitation ou d’opposition. Comme la plupart des données sont stockées localement, vous pouvez généralement les gérer ou les supprimer via l’app ou les réglages de votre appareil."},{"type":"h2","text":"10. Sécurité des données"},{"type":"p","text":"Nous utilisons HTTPS pour les communications externes lorsque cela s'applique, acheminons certaines requêtes API de fournisseurs via un proxy de métadonnées côté serveur lorsque nécessaire et concevons nos apps pour réduire la collecte de données. Aucun logiciel ni appareil ne peut garantir une sécurité absolue."},{"type":"h2","text":"11. Confidentialité des enfants"},{"type":"p","text":"L’application ne s’adresse pas aux enfants de moins de 13 ans. Nous ne collectons pas sciemment de données personnelles d’enfants de moins de 13 ans. Si vous pensez qu’un enfant a fourni des données personnelles, contactez-nous."},{"type":"h2","text":"12. Transferts internationaux"},{"type":"p","text":"Des fournisseurs tiers peuvent traiter des données limitées dans des pays autres que le vôtre. Des garanties appropriées s’appliquent lorsque la loi l’exige."},{"type":"h2","text":"13. Contact"},{"type":"p","html":"<strong>CAREO LIMITED<\/strong><br>careolimited@gmail.com<br>Livreo - Privacy Inquiry"},{"type":"h2","text":"14. Mises à jour de la Politique"},{"type":"p","text":"Nous pouvons mettre à jour cette Politique si les fonctions de l’app, les services tiers ou les exigences légales changent. Les mises à jour seront indiquées par une nouvelle date de mise à jour. L’utilisation continue de l’app implique l’acceptation de la Politique mise à jour."}],"de":[{"type":"h1","text":"Datenschutzerklärung - Buchio"},{"type":"meta","html":"<strong>Letzte Aktualisierung:<\/strong> 13. Juli 2026<br><strong>App:<\/strong> Buchio<br><strong>Entwickler / Herausgeber:<\/strong> CAREO LIMITED<br><strong>Kontakt:<\/strong> careolimited@gmail.com"},{"type":"p","text":"Buchio respektiert Ihre Privatsphäre. Diese Richtlinie erklärt, welche Informationen verarbeitet werden können, wie sie verwendet werden und welche Rechte Sie bei der Nutzung der mobilen App auf iOS und Android haben."},{"type":"h2","text":"1. Überblick zur Datenverarbeitung"},{"type":"p","text":"Buchio ist so gestaltet, dass Kerndaten nach Möglichkeit auf Ihrem Gerät bleiben. Wir verkaufen keine personenbezogenen Daten und verwenden Drittanbieter nur, wenn sie für die unten beschriebenen Funktionen erforderlich sind."},{"type":"h2","text":"2. Lokal gespeicherte Daten"},{"type":"p","text":"Die App kann Daten zu Buchsuche, Barcode-Scanning, persönliche Bibliotheksverwaltung, Lesefortschritt, Notizen, Zitate, Bewertungen, Ziele und Statistiken lokal auf Ihrem Gerät speichern. Diese Daten werden genutzt, um App-Funktionen bereitzustellen, Einstellungen zu merken und Offline-Nutzung zu unterstützen, sofern verfügbar."},{"type":"h2","text":"3. Zwecke der Verarbeitung"},{"type":"ul","items":["Bereitstellung der Kernfunktionen","Speichern von Nutzereinstellungen","Unterstützung der Offline-Nutzung, sofern verfügbar","Verarbeitung von Käufen oder Premium-Zugriff, sofern zutreffend","Verbesserung der Stabilität und Verhinderung von Missbrauch"]},{"type":"h2","text":"4. Drittanbieter-Dienste"},{"type":"p","text":"Die App kann folgende Drittanbieter-Dienste oder Anbieter verwenden: Google Books API, Open Library API, OpenAlex, Crossref, openBD, NDL Search, Rakuten Books API, Naver Search API, Kakao Book Search API, Deutsche Nationalbibliothek (DNB) SRU, Bibliotheque nationale de France (BnF) SRU, Cloudflare Workers, Google AdMob, Apple App Store und Google Play. Diese Dienste unterliegen ihren eigenen Datenschutzrichtlinien."},{"type":"p","text":"Wenn Sie einen Barcode scannen oder nach ISBN, Titel, Autor oder DOI suchen, kann der jeweilige Suchbegriff an Buchmetadaten-Anbieter gesendet werden, um Titel, Autor, Verlag, Coverbild, Beschreibung und ahnliche Buchinformationen abzurufen. Einige regionale Buchsuchen werden uber unseren Cloudflare-Worker-Metadaten-Proxy geleitet, damit die App zuverlassig auf Anbieter-APIs zugreifen kann. Ihre personlichen Bibliotheksinhalte, Notizen, Bewertungen und Lesefortschritte werden zu diesem Zweck nicht an Buchmetadaten-Anbieter gesendet."},{"type":"h2","text":"5. Werbung und Tracking"},{"type":"p","text":"Die kostenlose Version verwendet Google AdMob für Banner- und Interstitial-Werbung. Das Google Mobile Ads SDK kann automatisch die IP-Adresse (zur Schätzung des ungefähren Standorts), Interaktionen mit App und Werbung wie App-Starts, Tippen und Anzeigenaufrufe, Diagnose- und Leistungsinformationen sowie Geräte- oder Kontokennungen wie Werbe-IDs erfassen und weitergeben. Google kann diese Informationen für Werbung, Analysen und Betrugsprävention verwenden."},{"type":"p","text":"Abhängig von Ihrer Region, Ihren Einwilligungsentscheidungen und Geräteberechtigungen können personalisierte oder nicht personalisierte/eingeschränkte Anzeigen erscheinen. Wir verwenden Googles User Messaging Platform (UMP), um geltende Datenschutzentscheidungen für Werbung abzufragen und zu speichern. Können Einwilligungsinformationen nicht abgerufen werden, fehlt eine erforderliche Berechtigung oder schlägt der Vorgang fehl, fordert die App standardmäßig nicht personalisierte Anzeigen an."},{"type":"p","text":"Unter iOS verwendet die App Apples App Tracking Transparency (ATT), bevor personalisierte Werbung oder der Zugriff auf die Werbe-ID zugelassen wird. Sie können diese Berechtigung in den iOS-Einstellungen ändern. Soweit verfügbar, können Nutzer der kostenlosen Version ihre Google-Werbeentscheidungen unter Einstellungen > Datenschutz & Rechtliches > Datenschutzoptionen für Werbung prüfen oder ändern. Die Verfügbarkeit hängt von Region und gesetzlichen Anforderungen ab. Pro entfernt Banner- und Interstitial-Werbung."},{"type":"p","html":"Weitere Informationen finden Sie in der <a href=\"https://policies.google.com/privacy?hl=de\" target=\"_blank\" rel=\"noopener noreferrer\">Datenschutzerklärung von Google<\/a> sowie in den Werbe- und Datenschutzeinstellungen Ihres Geräts."},{"type":"h2","text":"6. Käufe und Premium-Funktionen"},{"type":"p","text":"Optionale Käufe, Abonnements oder Premium-Zugriffe können über Apple App Store oder Google Play verarbeitet werden. Wir erhalten oder speichern keine Kreditkartendaten. Der Kaufstatus kann lokal gespeichert oder über den jeweiligen Store geprüft werden."},{"type":"h2","text":"7. Datenweitergabe"},{"type":"p","text":"Wir verkaufen keine personenbezogenen Daten. Lokal gespeicherte App-Inhalte werden nicht mit CAREO LIMITED-Servern geteilt. Begrenzte Daten konnen nur wie in dieser Richtlinie beschrieben durch Drittanbieter verarbeitet werden, einschliesslich Buchsuchkennungen wie ISBN, Titel, Autor oder DOI, wenn Sie Metadaten-Suchfunktionen verwenden."},{"type":"h2","text":"8. Aufbewahrung und Löschung"},{"type":"p","text":"Lokale Daten bleiben auf Ihrem Gerät, bis Sie sie löschen, die App zurücksetzen oder deinstallieren. Zahlungs-, Werbe- und Analysedaten werden von den jeweiligen Anbietern gemäß deren Richtlinien gespeichert."},{"type":"h2","text":"9. Nutzerrechte"},{"type":"p","text":"Je nach Region können Sie Rechte auf Auskunft, Berichtigung, Löschung, Einschränkung oder Widerspruch haben. Da die meisten App-Daten lokal gespeichert werden, können Sie sie meist direkt in der App oder den Geräteeinstellungen verwalten oder entfernen."},{"type":"h2","text":"10. Datensicherheit"},{"type":"p","text":"Wir verwenden HTTPS für externe Kommunikation, sofern zutreffend, leiten einige Anbieter-API-Anfragen bei Bedarf über einen serverseitigen Metadaten-Proxy und gestalten unsere Apps so, dass die Datenerhebung minimiert wird. Keine Software- oder Geräteumgebung kann absolute Sicherheit garantieren."},{"type":"h2","text":"11. Datenschutz von Kindern"},{"type":"p","text":"Die App richtet sich nicht an Kinder unter 13 Jahren. Wir sammeln wissentlich keine personenbezogenen Daten von Kindern unter 13 Jahren. Wenn Sie glauben, dass ein Kind personenbezogene Daten bereitgestellt hat, kontaktieren Sie uns."},{"type":"h2","text":"12. Internationale Datenübertragungen"},{"type":"p","text":"Drittanbieter können begrenzte Daten in Ländern außerhalb Ihres Landes verarbeiten. Gesetzlich erforderliche Schutzmaßnahmen werden angewendet."},{"type":"h2","text":"13. Kontakt"},{"type":"p","html":"<strong>CAREO LIMITED<\/strong><br>careolimited@gmail.com<br>Buchio - Privacy Inquiry"},{"type":"h2","text":"14. Aktualisierungen"},{"type":"p","text":"Wir können diese Richtlinie aktualisieren, wenn sich App-Funktionen, Drittanbieter-Dienste oder gesetzliche Anforderungen ändern. Aktualisierungen werden mit einem neuen Aktualisierungsdatum angezeigt. Die weitere Nutzung der App gilt als Zustimmung."}],"it":[{"type":"h1","text":"Informativa sulla privacy - Librio"},{"type":"meta","html":"<strong>Ultimo aggiornamento:<\/strong> 13 luglio 2026<br><strong>App:<\/strong> Librio<br><strong>Sviluppatore / Editore:<\/strong> CAREO LIMITED<br><strong>Contatto:<\/strong> careolimited@gmail.com"},{"type":"p","text":"Librio rispetta la tua privacy. Questa Informativa spiega quali informazioni possono essere trattate, come vengono utilizzate e quali diritti hai quando usi l’app mobile su iOS e Android."},{"type":"h2","text":"1. Panoramica del trattamento dei dati"},{"type":"p","text":"Librio è progettata per mantenere i dati principali sul dispositivo quando possibile. Non vendiamo dati personali e usiamo servizi di terze parti solo quando necessari per le funzioni descritte di seguito."},{"type":"h2","text":"2. Dati archiviati localmente"},{"type":"p","text":"L’app può archiviare localmente sul dispositivo dati relativi a scoperta di libri, scansione dei codici a barre, gestione della biblioteca personale, avanzamento di lettura, note, citazioni, valutazioni, obiettivi e statistiche. Questi dati servono a fornire le funzioni dell’app, ricordare le preferenze e supportare l’uso offline dove disponibile."},{"type":"h2","text":"3. Finalità del trattamento"},{"type":"ul","items":["Fornire le funzioni principali dell’app","Ricordare le preferenze dell’utente","Supportare l’uso offline dove disponibile","Gestire acquisti o accesso Premium se applicabile","Migliorare stabilità e prevenire abusi"]},{"type":"h2","text":"4. Servizi di terze parti"},{"type":"p","text":"L'app può usare i seguenti servizi o fornitori di terze parti: Google Books API, Open Library API, OpenAlex, Crossref, openBD, NDL Search, Rakuten Books API, Naver Search API, Kakao Book Search API, Deutsche Nationalbibliothek (DNB) SRU, Bibliotheque nationale de France (BnF) SRU, Cloudflare Workers, Google AdMob, Apple App Store e Google Play. Questi servizi operano secondo le proprie informative sulla privacy."},{"type":"p","text":"Quando scansioni un codice a barre o cerchi per ISBN, titolo, autore o DOI, il relativo termine di ricerca può essere inviato ai fornitori di metadati dei libri per recuperare titolo, autore, editore, immagine di copertina, descrizione e informazioni simili. Alcune ricerche regionali di libri vengono instradate tramite il nostro proxy di metadati Cloudflare Worker, così l'app può accedere in modo affidabile alle API dei fornitori. Il contenuto della tua biblioteca personale, note, valutazioni e progresso di lettura non vengono inviati ai fornitori di metadati per questo scopo."},{"type":"h2","text":"5. Pubblicità e tracciamento"},{"type":"p","text":"La versione gratuita utilizza Google AdMob per mostrare banner e annunci interstitial. Google Mobile Ads SDK può raccogliere e condividere automaticamente l’indirizzo IP (utilizzabile per stimare la posizione generale), le interazioni con l’app e gli annunci come avvii, tocchi e visualizzazioni, informazioni diagnostiche e sulle prestazioni, nonché identificatori del dispositivo o dell’account come gli identificatori pubblicitari. Google può utilizzare queste informazioni per pubblicità, analisi e prevenzione delle frodi."},{"type":"p","text":"In base all’area geografica, alle scelte di consenso e alle autorizzazioni del dispositivo, gli annunci possono essere personalizzati oppure non personalizzati/limitati. Utilizziamo la User Messaging Platform (UMP) di Google per richiedere e memorizzare le scelte applicabili sulla privacy pubblicitaria. Se non è possibile ottenere le informazioni sul consenso, manca un’autorizzazione necessaria o la procedura non riesce, l’app richiede per impostazione predefinita annunci non personalizzati."},{"type":"p","text":"Su iOS, l’app utilizza App Tracking Transparency (ATT) di Apple prima di consentire pubblicità personalizzata o accesso all’identificatore pubblicitario. Puoi modificare questa autorizzazione nelle Impostazioni di iOS. Ove disponibile, gli utenti gratuiti possono rivedere o modificare le scelte pubblicitarie di Google in Impostazioni > Privacy e note legali > Opzioni privacy degli annunci. La disponibilità dipende dall’area geografica e dai requisiti di legge. Pro rimuove banner e annunci interstitial."},{"type":"p","html":"Per ulteriori informazioni, consulta le <a href=\"https://policies.google.com/privacy?hl=it\" target=\"_blank\" rel=\"noopener noreferrer\">Norme sulla privacy di Google<\/a> e le impostazioni pubblicitarie e sulla privacy del dispositivo."},{"type":"h2","text":"6. Acquisti e funzioni Premium"},{"type":"p","text":"Acquisti, abbonamenti o accessi Premium facoltativi possono essere elaborati da Apple App Store o Google Play. Non riceviamo né memorizziamo dati della carta di credito. Lo stato di acquisto può essere salvato localmente o verificato tramite lo store pertinente."},{"type":"h2","text":"7. Condivisione dei dati"},{"type":"p","text":"Non vendiamo dati personali. I contenuti dell'app archiviati localmente non vengono condivisi con server CAREO LIMITED. Dati limitati possono essere trattati da fornitori terzi solo come descritto in questa Informativa, inclusi identificativi di ricerca dei libri come ISBN, titolo, autore o DOI quando usi le funzioni di ricerca metadati."},{"type":"h2","text":"8. Conservazione e cancellazione"},{"type":"p","text":"I dati locali restano sul dispositivo finché non li elimini, reimposti l’app o disinstalli l’app. Dati di pagamento, pubblicità e analisi sono conservati dai rispettivi fornitori secondo le loro politiche."},{"type":"h2","text":"9. Diritti degli utenti"},{"type":"p","text":"A seconda della tua regione, potresti avere diritti di accesso, rettifica, cancellazione, limitazione o opposizione. Poiché la maggior parte dei dati è archiviata localmente, di solito puoi gestirli o rimuoverli tramite l’app o le impostazioni del dispositivo."},{"type":"h2","text":"10. Sicurezza dei dati"},{"type":"p","text":"Usiamo HTTPS per le comunicazioni esterne quando applicabile, instradiamo alcune richieste API dei fornitori tramite un proxy di metadati lato server quando necessario e progettiamo le nostre app per minimizzare la raccolta di dati. Nessun software o dispositivo può garantire sicurezza assoluta."},{"type":"h2","text":"11. Privacy dei minori"},{"type":"p","text":"L’app non è rivolta a minori di 13 anni. Non raccogliamo consapevolmente dati personali da minori di 13 anni. Se ritieni che un minore abbia fornito dati personali, contattaci."},{"type":"h2","text":"12. Trasferimenti internazionali"},{"type":"p","text":"Fornitori terzi possono trattare dati limitati in paesi diversi dal tuo. Si applicano garanzie adeguate quando richiesto dalla legge."},{"type":"h2","text":"13. Contatto"},{"type":"p","html":"<strong>CAREO LIMITED<\/strong><br>careolimited@gmail.com<br>Librio - Privacy Inquiry"},{"type":"h2","text":"14. Aggiornamenti"},{"type":"p","text":"Possiamo aggiornare questa Informativa se cambiano funzioni dell’app, servizi terzi o requisiti legali. Gli aggiornamenti saranno indicati con una nuova data. L’uso continuato dell’app implica accettazione."}],"ja":[{"type":"h1","text":"プライバシーポリシー - ヨムノート"},{"type":"meta","html":"<strong>最終更新:<\/strong> 2026年7月13日<br><strong>アプリ:<\/strong> ヨムノート<br><strong>開発者 / 発行者:<\/strong> CAREO LIMITED<br><strong>連絡先:<\/strong> careolimited@gmail.com"},{"type":"p","text":"ヨムノートはプライバシーを尊重します。本ポリシーは、iOSおよびAndroidのモバイルアプリを利用する際に処理される可能性のある情報、その利用方法、ユーザーの権利について説明します。"},{"type":"h2","text":"1. データ処理の概要"},{"type":"p","text":"ブックログは、可能な限り主要なアプリデータをお使いの端末内に保持するよう設計されています。当社は個人データを販売せず、以下に記載する機能に必要な場合にのみ第三者サービスを使用します。"},{"type":"h2","text":"2. ローカル保存データ"},{"type":"p","text":"アプリは本の検索、バーコードスキャン、個人ライブラリ管理、読書進捗、メモ、引用、評価、目標、統計に関連するデータを端末内に保存する場合があります。これらのデータは、機能提供、設定の保存、利用可能な場合のオフライン利用のために使用されます。"},{"type":"h2","text":"3. 処理目的"},{"type":"ul","items":["アプリの主要機能を提供するため","ユーザー設定を保存するため","利用可能な場合にオフライン利用を支援するため","該当する場合に購入またはPremiumアクセスを処理するため","安定性を向上し、不正利用を防止するため"]},{"type":"h2","text":"4. 第三者サービス"},{"type":"p","text":"本アプリは、Google Books API、Open Library API、OpenAlex、Crossref、openBD、NDL Search、Rakuten Books API、Naver Search API、Kakao Book Search API、ドイツ国立図書館 (DNB) SRU、フランス国立図書館 (BnF) SRU、Cloudflare Workers、Google AdMob、Apple App Store、Google Play などの第三者サービスまたは提供者を使用する場合があります。これらのサービスは、それぞれ独自のプライバシーポリシーに従って運用されます。"},{"type":"p","text":"バーコードをスキャンする場合、またはISBN、タイトル、著者、DOIで検索する場合、該当する検索語が書籍メタデータ提供者に送信され、タイトル、著者、出版社、表紙画像、説明などの書籍情報を取得することがあります。一部の地域別書籍検索は、提供者APIへ安定してアクセスするため、当社のCloudflare Workerメタデータプロキシ経由で処理されます。個人のライブラリ内容、メモ、評価、読書進捗は、この目的で書籍メタデータ提供者に送信されません。"},{"type":"h2","text":"5. 広告とトラッキング"},{"type":"p","text":"無料版では、バナー広告およびインタースティシャル広告の表示に Google AdMob を使用します。Google Mobile Ads SDK は、IP アドレス（おおよその位置情報の推定に使用される場合があります）、アプリの起動、タップ、広告表示などのアプリおよび広告上の操作、診断・パフォーマンス情報、広告 ID などの端末またはアカウント識別子を自動的に収集し、共有する場合があります。Google はこれらの情報を広告、分析、不正防止のために使用する場合があります。"},{"type":"p","text":"地域、同意内容、端末の権限に応じて、パーソナライズ広告または非パーソナライズ広告・制限付き広告が表示される場合があります。適用される広告プライバシーの選択肢を取得・保存するため、Google User Messaging Platform（UMP）を使用します。同意情報を取得できない場合、必要な権限が許可されていない場合、または同意処理に失敗した場合、アプリは既定で非パーソナライズ広告をリクエストします。"},{"type":"p","text":"iOS では、パーソナライズ広告または広告 ID へのアクセスを許可する前に、Apple の App Tracking Transparency（ATT）を使用します。この権限は iOS の「設定」で変更できます。利用可能な地域では、無料ユーザーは「設定 > プライバシーと法的情報 > 広告プライバシー設定」から Google の広告に関する選択を確認・変更できます。利用可否は地域および法的要件によって異なります。Pro ではバナー広告とインタースティシャル広告が削除されます。"},{"type":"p","html":"詳しくは、<a href=\"https://policies.google.com/privacy?hl=ja\" target=\"_blank\" rel=\"noopener noreferrer\">Google プライバシー ポリシー<\/a>および端末の広告・プライバシー設定をご確認ください。"},{"type":"h2","text":"6. 購入とPremium機能"},{"type":"p","text":"任意の購入、サブスクリプション、PremiumアクセスはApple App StoreまたはGoogle Playによって処理される場合があります。当社はクレジットカード情報を受け取ったり保存したりしません。購入状態はローカルに保存されるか、該当ストアで確認される場合があります。"},{"type":"h2","text":"7. データ共有"},{"type":"p","text":"当社は個人データを販売しません。端末内に保存されたアプリの内容はCAREO LIMITEDのサーバーと共有されません。本ポリシーに記載された範囲でのみ、第三者提供者が限定的なデータを処理する場合があります。これには、メタデータ検索機能を使用する際のISBN、タイトル、著者、DOIなどの書籍検索識別子が含まれます。"},{"type":"h2","text":"8. 保持と削除"},{"type":"p","text":"ローカルデータは、ユーザーが削除、アプリをリセット、またはアンインストールするまで端末に残ります。支払い記録、広告データ、分析データは各提供元のポリシーに従って保持されます。"},{"type":"h2","text":"9. ユーザーの権利"},{"type":"p","text":"地域によって、アクセス、訂正、削除、制限、異議申し立ての権利がある場合があります。多くのデータはローカル保存のため、通常はアプリまたは端末設定から管理または削除できます。"},{"type":"h2","text":"10. データセキュリティ"},{"type":"p","text":"当社は、該当する外部通信にHTTPSを使用し、必要に応じて一部の提供者APIリクエストをサーバー側のメタデータプロキシ経由で処理し、データ収集を最小限に抑えるようアプリを設計しています。ただし、いかなるソフトウェアまたは端末環境も絶対的な安全性を保証することはできません。"},{"type":"h2","text":"11. 子どものプライバシー"},{"type":"p","text":"本アプリは13歳未満の子どもを対象としていません。13歳未満の子どもから意図的に個人データを収集することはありません。子どもが個人データを提供したと思われる場合はお問い合わせください。"},{"type":"h2","text":"12. 国際データ移転"},{"type":"p","text":"第三者提供元は、ユーザーの国以外で限定的なデータを処理する場合があります。法律で求められる場合は適切な保護措置が適用されます。"},{"type":"h2","text":"13. お問い合わせ"},{"type":"p","html":"<strong>CAREO LIMITED<\/strong><br>careolimited@gmail.com<br>ヨムノート - Privacy Inquiry"},{"type":"h2","text":"14. ポリシー更新"},{"type":"p","text":"アプリ機能、第三者サービス、法的要件が変更された場合、本ポリシーを更新することがあります。更新は新しい最終更新日で表示されます。アプリの継続利用は更新後のポリシーへの同意を意味します。"}],"ko":[{"type":"h1","text":"개인정보 처리방침 - 북로그"},{"type":"meta","html":"<strong>마지막 업데이트:<\/strong> 2026년 7월 13일<br><strong>앱:<\/strong> 북로그<br><strong>개발자 / 게시자:<\/strong> CAREO LIMITED<br><strong>문의:<\/strong> careolimited@gmail.com"},{"type":"p","text":"북로그은 개인정보를 존중합니다. 본 정책은 iOS 및 Android 모바일 앱을 사용할 때 어떤 정보가 처리될 수 있는지, 어떻게 사용되는지, 사용자의 권리가 무엇인지 설명합니다."},{"type":"h2","text":"1. 데이터 처리 개요"},{"type":"p","text":"북로그는 가능한 경우 핵심 앱 데이터를 기기에 보관하도록 설계되었습니다. 당사는 개인정보를 판매하지 않으며, 아래에 설명된 기능에 필요한 경우에만 제3자 서비스를 사용합니다."},{"type":"h2","text":"2. 로컬 저장 데이터"},{"type":"p","text":"앱은 도서 검색, 바코드 스캔, 개인 서재 관리, 독서 진행률, 메모, 인용문, 평가, 목표 및 통계와 관련된 데이터를 기기에 로컬로 저장할 수 있습니다. 이 데이터는 앱 기능 제공, 설정 기억, 가능한 경우 오프라인 사용 지원에 사용됩니다."},{"type":"h2","text":"3. 처리 목적"},{"type":"ul","items":["핵심 앱 기능 제공","사용자 설정 기억","가능한 경우 오프라인 사용 지원","해당되는 경우 구매 또는 Premium 접근 처리","안정성 개선 및 남용 방지"]},{"type":"h2","text":"4. 제3자 서비스"},{"type":"p","text":"앱은 Google Books API, Open Library API, OpenAlex, Crossref, openBD, NDL Search, Rakuten Books API, Naver Search API, Kakao Book Search API, 독일 국립도서관(DNB) SRU, 프랑스 국립도서관(BnF) SRU, Cloudflare Workers, Google AdMob, Apple App Store 및 Google Play와 같은 제3자 서비스 또는 제공업체를 사용할 수 있습니다. 이러한 서비스는 각자의 개인정보 처리방침에 따라 운영됩니다."},{"type":"p","text":"바코드를 스캔하거나 ISBN, 제목, 저자 또는 DOI로 검색할 때 관련 검색어가 도서 메타데이터 제공업체로 전송되어 제목, 저자, 출판사, 표지 이미지, 설명 및 유사한 도서 정보를 가져올 수 있습니다. 일부 지역별 도서 조회는 앱이 제공업체 API에 안정적으로 접근할 수 있도록 당사의 Cloudflare Worker 메타데이터 프록시를 통해 라우팅됩니다. 개인 서재 내용, 메모, 평가 및 독서 진행 상황은 이 목적을 위해 도서 메타데이터 제공업체로 전송되지 않습니다."},{"type":"h2","text":"5. 광고 및 추적"},{"type":"p","text":"무료 버전은 배너 및 전면 광고를 표시하기 위해 Google AdMob을 사용합니다. Google Mobile Ads SDK는 일반적인 위치를 추정하는 데 사용될 수 있는 IP 주소, 앱 실행·탭·광고 조회 등의 앱 및 광고 상호작용, 진단 및 성능 정보, 광고 식별자와 같은 기기 또는 계정 식별자를 자동으로 수집하고 공유할 수 있습니다. Google은 이 정보를 광고, 분석 및 사기 방지 목적으로 사용할 수 있습니다."},{"type":"p","text":"지역, 동의 선택 및 기기 권한에 따라 맞춤형 광고 또는 개인 맞춤이 아닌 광고·제한된 광고가 표시될 수 있습니다. 적용되는 광고 개인정보 보호 선택을 요청하고 저장하기 위해 Google User Messaging Platform(UMP)을 사용합니다. 동의 정보를 가져올 수 없거나 필요한 권한이 허용되지 않았거나 동의 절차가 실패하면 앱은 기본적으로 개인 맞춤이 아닌 광고를 요청합니다."},{"type":"p","text":"iOS에서는 맞춤형 광고 또는 광고 식별자 접근을 허용하기 전에 Apple의 App Tracking Transparency(ATT)를 사용합니다. 이 권한은 iOS 설정에서 변경할 수 있습니다. 지원되는 지역의 무료 사용자는 설정 > 개인정보 보호 및 법률 > 광고 개인정보 보호 옵션에서 Google 광고 선택을 검토하거나 변경할 수 있습니다. 제공 여부는 지역 및 법적 요구사항에 따라 달라집니다. Pro에서는 배너 및 전면 광고가 제거됩니다."},{"type":"p","html":"자세한 내용은 <a href=\"https://policies.google.com/privacy?hl=ko\" target=\"_blank\" rel=\"noopener noreferrer\">Google 개인정보처리방침<\/a>과 기기의 광고 및 개인정보 보호 설정을 확인하세요."},{"type":"h2","text":"6. 구매 및 Premium 기능"},{"type":"p","text":"선택적 구매, 구독 또는 Premium 접근은 Apple App Store 또는 Google Play에서 처리될 수 있습니다. 당사는 신용카드 정보를 받거나 저장하지 않습니다. 구매 상태는 로컬에 저장되거나 해당 스토어를 통해 확인될 수 있습니다."},{"type":"h2","text":"7. 데이터 공유"},{"type":"p","text":"당사는 개인정보를 판매하지 않습니다. 기기에 로컬로 저장된 앱 콘텐츠는 CAREO LIMITED 서버와 공유되지 않습니다. 제한된 데이터는 본 정책에 설명된 경우에만 제3자 제공업체에 의해 처리될 수 있으며, 여기에는 메타데이터 조회 기능 사용 시 ISBN, 제목, 저자 또는 DOI와 같은 도서 조회 식별자가 포함됩니다."},{"type":"h2","text":"8. 보관 및 삭제"},{"type":"p","text":"로컬 데이터는 사용자가 삭제하거나 앱을 초기화하거나 제거할 때까지 기기에 남습니다. 스토어 결제 기록, 광고 데이터 및 분석 데이터는 해당 제공업체 정책에 따라 보관됩니다."},{"type":"h2","text":"9. 사용자 권리"},{"type":"p","text":"지역에 따라 접근, 정정, 삭제, 제한 또는 반대 권리가 있을 수 있습니다. 대부분의 앱 데이터는 로컬에 저장되므로 일반적으로 앱 또는 기기 설정에서 직접 관리하거나 제거할 수 있습니다."},{"type":"h2","text":"10. 데이터 보안"},{"type":"p","text":"당사는 해당되는 외부 통신에 HTTPS를 사용하고, 필요한 경우 일부 제공업체 API 요청을 서버 측 메타데이터 프록시를 통해 라우팅하며, 데이터 수집을 최소화하도록 앱을 설계합니다. 어떤 소프트웨어나 기기 환경도 절대적인 보안을 보장할 수는 없습니다."},{"type":"h2","text":"11. 아동 개인정보"},{"type":"p","text":"앱은 13세 미만 아동을 대상으로 하지 않습니다. 당사는 13세 미만 아동의 개인정보를 고의로 수집하지 않습니다. 아동이 개인정보를 제공했다고 생각되면 문의해 주세요."},{"type":"h2","text":"12. 국제 데이터 이전"},{"type":"p","text":"제3자 제공업체는 사용자의 국가 외 지역에서 제한된 데이터를 처리할 수 있습니다. 법에서 요구하는 경우 적절한 보호조치가 적용됩니다."},{"type":"h2","text":"13. 문의"},{"type":"p","html":"<strong>CAREO LIMITED<\/strong><br>careolimited@gmail.com<br>북로그 - Privacy Inquiry"},{"type":"h2","text":"14. 정책 업데이트"},{"type":"p","text":"앱 기능, 제3자 서비스 또는 법적 요구사항이 변경되면 본 정책을 업데이트할 수 있습니다. 업데이트는 새로운 마지막 업데이트 날짜로 표시됩니다. 앱을 계속 사용하면 업데이트된 정책에 동의한 것으로 간주됩니다."}],"pt":[{"type":"h1","text":"Política de Privacidade - Livroo"},{"type":"meta","html":"<strong>Última atualização:<\/strong> 13 de julho de 2026<br><strong>App:<\/strong> Livroo<br><strong>Programador / Editor:<\/strong> CAREO LIMITED<br><strong>Contacto:<\/strong> careolimited@gmail.com"},{"type":"p","text":"Livroo respeita a sua privacidade. Esta Política explica que informações podem ser tratadas, como são utilizadas e quais são os seus direitos ao usar a aplicação móvel em iOS e Android."},{"type":"h2","text":"1. Visão geral do tratamento de dados"},{"type":"p","text":"LivroLog foi concebida para manter os dados principais no seu dispositivo sempre que possível. Não vendemos dados pessoais e usamos serviços de terceiros apenas quando necessários para as funcionalidades descritas abaixo."},{"type":"h2","text":"2. Dados armazenados localmente"},{"type":"p","text":"A aplicação pode armazenar localmente no seu dispositivo dados relacionados com descoberta de livros, leitura de códigos de barras, gestão de biblioteca pessoal, progresso de leitura, notas, citações, avaliações, objetivos e estatísticas. Estes dados são usados para fornecer funcionalidades, lembrar preferências e suportar utilização offline quando disponível."},{"type":"h2","text":"3. Finalidades do tratamento"},{"type":"ul","items":["Fornecer as funcionalidades principais da aplicação","Lembrar preferências do utilizador","Suportar utilização offline quando disponível","Processar compras ou acesso Premium quando aplicável","Melhorar a estabilidade e prevenir abusos"]},{"type":"h2","text":"4. Serviços de terceiros"},{"type":"p","text":"A app pode usar os seguintes servicos ou fornecedores terceiros: Google Books API, Open Library API, OpenAlex, Crossref, openBD, NDL Search, Rakuten Books API, Naver Search API, Kakao Book Search API, Deutsche Nationalbibliothek (DNB) SRU, Bibliotheque nationale de France (BnF) SRU, Cloudflare Workers, Google AdMob, Apple App Store e Google Play. Estes servicos funcionam segundo as suas proprias politicas de privacidade."},{"type":"p","text":"Quando digitaliza um codigo de barras ou pesquisa por ISBN, titulo, autor ou DOI, o termo de pesquisa relevante pode ser enviado a fornecedores de metadados de livros para obter titulo, autor, editora, imagem de capa, descricao e informacoes semelhantes. Algumas pesquisas regionais de livros sao encaminhadas atraves do nosso proxy de metadados Cloudflare Worker para que a app possa aceder de forma fiavel as APIs dos fornecedores. O conteudo da sua biblioteca pessoal, notas, avaliacoes e progresso de leitura nao sao enviados a fornecedores de metadados para este fim."},{"type":"h2","text":"5. Publicidade e rastreio"},{"type":"p","text":"A versão gratuita utiliza o Google AdMob para apresentar banners e anúncios intersticiais. O SDK Google Mobile Ads pode recolher e partilhar automaticamente o endereço IP (que pode ser utilizado para estimar a localização geral), interações com a app e os anúncios, como aberturas, toques e visualizações, informações de diagnóstico e desempenho e identificadores do dispositivo ou da conta, como identificadores de publicidade. A Google pode utilizar estas informações para publicidade, análise e prevenção de fraude."},{"type":"p","text":"Consoante a sua região, escolhas de consentimento e permissões do dispositivo, os anúncios podem ser personalizados ou não personalizados/limitados. Utilizamos a User Messaging Platform (UMP) da Google para solicitar e guardar as escolhas de privacidade publicitária aplicáveis. Se não for possível obter as informações de consentimento, uma permissão necessária não for concedida ou o processo falhar, a app solicita anúncios não personalizados por predefinição."},{"type":"p","text":"No iOS, a app utiliza a App Tracking Transparency (ATT) da Apple antes de permitir publicidade personalizada ou acesso ao identificador de publicidade. Pode alterar esta permissão nas Definições do iOS. Quando disponível, os utilizadores da versão gratuita podem rever ou alterar as escolhas de publicidade da Google em Definições > Privacidade e aspetos legais > Opções de privacidade dos anúncios. A disponibilidade depende da região e dos requisitos legais. A versão Pro remove banners e anúncios intersticiais."},{"type":"p","html":"Para mais informações, consulte a <a href=\"https://policies.google.com/privacy?hl=pt-PT\" target=\"_blank\" rel=\"noopener noreferrer\">Política de Privacidade da Google<\/a> e as definições de publicidade e privacidade do seu dispositivo."},{"type":"h2","text":"6. Compras e funcionalidades Premium"},{"type":"p","text":"Compras, subscrições ou acesso Premium opcionais podem ser processados pela Apple App Store ou Google Play. Não recebemos nem armazenamos dados de cartão de crédito. O estado da compra pode ser guardado localmente ou verificado através da loja relevante."},{"type":"h2","text":"7. Partilha de dados"},{"type":"p","text":"Nao vendemos dados pessoais. O conteudo da app guardado localmente nao e partilhado com servidores da CAREO LIMITED. Dados limitados podem ser tratados por fornecedores terceiros apenas conforme descrito nesta Politica, incluindo identificadores de pesquisa de livros como ISBN, titulo, autor ou DOI quando usa funcionalidades de pesquisa de metadados."},{"type":"h2","text":"8. Retenção e eliminação"},{"type":"p","text":"Os dados locais permanecem no dispositivo até os apagar, reiniciar a app ou desinstalar a app. Registos de pagamento, dados de publicidade e dados analíticos são retidos pelos respetivos fornecedores segundo as suas políticas."},{"type":"h2","text":"9. Direitos dos utilizadores"},{"type":"p","text":"Dependendo da sua região, pode ter direitos de acesso, correção, eliminação, limitação ou oposição. Como a maioria dos dados da app é armazenada localmente, normalmente pode geri-los ou removê-los diretamente pela app ou definições do dispositivo."},{"type":"h2","text":"10. Segurança dos dados"},{"type":"p","text":"Usamos HTTPS para comunicações externas quando aplicável, encaminhamos alguns pedidos de API de fornecedores através de um proxy de metadados do lado do servidor quando necessário e concebemos as nossas apps para minimizar a recolha de dados. Nenhum software ou ambiente de dispositivo pode garantir segurança absoluta."},{"type":"h2","text":"11. Privacidade das crianças"},{"type":"p","text":"A app não se destina a crianças menores de 13 anos. Não recolhemos conscientemente dados pessoais de crianças menores de 13 anos. Se acredita que uma criança forneceu dados pessoais, contacte-nos."},{"type":"h2","text":"12. Transferências internacionais"},{"type":"p","text":"Fornecedores terceiros podem tratar dados limitados em países fora do seu. São aplicadas salvaguardas adequadas quando exigido por lei."},{"type":"h2","text":"13. Contacto"},{"type":"p","html":"<strong>CAREO LIMITED<\/strong><br>careolimited@gmail.com<br>Livroo - Privacy Inquiry"},{"type":"h2","text":"14. Atualizações da Política"},{"type":"p","text":"Podemos atualizar esta Política se as funcionalidades da app, serviços terceiros ou requisitos legais mudarem. As atualizações serão refletidas com uma nova data. A utilização continuada da app implica aceitação."}],"ru":[{"type":"h1","text":"Политика конфиденциальности - Книгли"},{"type":"meta","html":"<strong>Последнее обновление:<\/strong> 13 июля 2026 г.<br><strong>Приложение:<\/strong> Книгли<br><strong>Разработчик / Издатель:<\/strong> CAREO LIMITED<br><strong>Контакт:<\/strong> careolimited@gmail.com"},{"type":"p","text":"Книгли уважает вашу конфиденциальность. Эта Политика объясняет, какие сведения могут обрабатываться, как они используются и какие права у вас есть при использовании мобильного приложения на iOS и Android."},{"type":"h2","text":"1. Обзор обработки данных"},{"type":"p","text":"Книгли разработано так, чтобы по возможности хранить основные данные приложения на вашем устройстве. Мы не продаем персональные данные и используем сторонние сервисы только там, где это необходимо для функций, описанных ниже."},{"type":"h2","text":"2. Локально хранимые данные"},{"type":"p","text":"Приложение может локально хранить на вашем устройстве данные, связанные с поиск книг, сканирование штрихкодов, управление личной библиотекой, прогресс чтения, заметки, цитаты, оценки, цели и статистику. Эти данные используются для работы функций приложения, сохранения настроек и поддержки офлайн-использования, если оно доступно."},{"type":"h2","text":"3. Цели обработки"},{"type":"ul","items":["Предоставление основных функций приложения","Сохранение пользовательских настроек","Поддержка офлайн-использования, если доступно","Обработка покупок или доступа Premium, если применимо","Повышение стабильности и предотвращение злоупотреблений"]},{"type":"h2","text":"4. Сторонние сервисы"},{"type":"p","text":"Приложение может использовать следующие сторонние сервисы или поставщиков: Google Books API, Open Library API, OpenAlex, Crossref, openBD, NDL Search, Rakuten Books API, Naver Search API, Kakao Book Search API, Немецкая национальная библиотека (DNB) SRU, Национальная библиотека Франции (BnF) SRU, Cloudflare Workers, Google AdMob, Apple App Store и Google Play. Эти сервисы работают по собственным политикам конфиденциальности."},{"type":"p","text":"Когда вы сканируете штрихкод или выполняете поиск по ISBN, названию, автору или DOI, соответствующий поисковый запрос может быть отправлен поставщикам книжных метаданных для получения названия, автора, издателя, изображения обложки, описания и похожей информации о книге. Некоторые региональные запросы книг направляются через наш прокси метаданных Cloudflare Worker, чтобы приложение могло надежно обращаться к API поставщиков. Содержимое вашей личной библиотеки, заметки, оценки и прогресс чтения не отправляются поставщикам книжных метаданных для этой цели."},{"type":"h2","text":"5. Реклама и отслеживание"},{"type":"p","text":"В бесплатной версии для показа баннерной и полноэкранной рекламы используется Google AdMob. Google Mobile Ads SDK может автоматически собирать и передавать IP-адрес (который может использоваться для определения примерного местоположения), сведения о взаимодействиях с приложением и рекламой, включая запуски приложения, нажатия и просмотры рекламы, диагностические данные и данные о производительности, а также идентификаторы устройства или аккаунта, например рекламные идентификаторы. Google может использовать эти сведения для рекламы, аналитики и предотвращения мошенничества."},{"type":"p","text":"В зависимости от региона, выбранных вариантов согласия и разрешений устройства реклама может быть персонализированной или неперсонализированной/ограниченной. Мы используем Google User Messaging Platform (UMP), чтобы запрашивать и сохранять применимые настройки конфиденциальности рекламы. Если сведения о согласии получить невозможно, необходимое разрешение не предоставлено или процесс завершается с ошибкой, приложение по умолчанию запрашивает неперсонализированную рекламу."},{"type":"p","text":"На iOS приложение использует Apple App Tracking Transparency (ATT), прежде чем разрешить персонализированную рекламу или доступ к рекламному идентификатору. Разрешение можно изменить в настройках iOS. Там, где функция доступна, пользователи бесплатной версии могут просматривать или изменять настройки рекламы Google по пути Настройки > Конфиденциальность и юридическая информация > Настройки конфиденциальности рекламы. Доступность зависит от региона и требований законодательства. Pro удаляет баннерную и полноэкранную рекламу."},{"type":"p","html":"Подробнее см. в <a href=\"https://policies.google.com/privacy?hl=ru\" target=\"_blank\" rel=\"noopener noreferrer\">Политике конфиденциальности Google<\/a> и настройках рекламы и конфиденциальности вашего устройства."},{"type":"h2","text":"6. Покупки и функции Premium"},{"type":"p","text":"Необязательные покупки, подписки или доступ Premium могут обрабатываться Apple App Store или Google Play. Мы не получаем и не храним данные кредитных карт. Статус покупки может храниться локально или проверяться через соответствующий магазин."},{"type":"h2","text":"7. Передача данных"},{"type":"p","text":"Мы не продаем персональные данные. Локально сохраненное содержимое приложения не передается на серверы CAREO LIMITED. Ограниченные данные могут обрабатываться сторонними поставщиками только как описано в этой Политике, включая идентификаторы поиска книг, такие как ISBN, название, автор или DOI, при использовании функций поиска метаданных."},{"type":"h2","text":"8. Хранение и удаление"},{"type":"p","text":"Локальные данные остаются на устройстве, пока вы не удалите их, не сбросите приложение или не удалите приложение. Платежные записи, рекламные и аналитические данные хранятся соответствующими поставщиками согласно их политикам."},{"type":"h2","text":"9. Права пользователя"},{"type":"p","text":"В зависимости от вашего региона у вас могут быть права на доступ, исправление, удаление, ограничение или возражение против обработки. Поскольку большинство данных хранится локально, обычно ими можно управлять или удалить их через приложение или настройки устройства."},{"type":"h2","text":"10. Безопасность данных"},{"type":"p","text":"Мы используем HTTPS для внешних соединений, где это применимо, при необходимости направляем некоторые запросы к API поставщиков через серверный прокси метаданных и проектируем приложения так, чтобы минимизировать сбор данных. Ни одна программная или аппаратная среда не может гарантировать абсолютную безопасность."},{"type":"h2","text":"11. Конфиденциальность детей"},{"type":"p","text":"Приложение не предназначено для детей младше 13 лет. Мы сознательно не собираем персональные данные детей младше 13 лет. Если вы считаете, что ребенок предоставил персональные данные, свяжитесь с нами."},{"type":"h2","text":"12. Международная передача данных"},{"type":"p","text":"Сторонние поставщики могут обрабатывать ограниченные данные в странах за пределами вашей страны. При необходимости применяются соответствующие гарантии."},{"type":"h2","text":"13. Контакты"},{"type":"p","html":"<strong>CAREO LIMITED<\/strong><br>careolimited@gmail.com<br>Книгли - Privacy Inquiry"},{"type":"h2","text":"14. Обновления Политики"},{"type":"p","text":"Мы можем обновлять эту Политику при изменении функций приложения, сторонних сервисов или требований закона. Обновления будут отражены новой датой. Продолжение использования приложения означает принятие обновленной Политики."}],"es":[{"type":"h1","text":"Política de privacidad - Libroo"},{"type":"meta","html":"<strong>Última actualización:<\/strong> 13 de julio de 2026<br><strong>App:<\/strong> Libroo<br><strong>Desarrollador / Editor:<\/strong> CAREO LIMITED<br><strong>Contacto:<\/strong> careolimited@gmail.com"},{"type":"p","text":"Libroo respeta tu privacidad. Esta Política explica qué información puede procesarse, cómo se utiliza y cuáles son tus derechos al usar la aplicación móvil en iOS y Android."},{"type":"h2","text":"1. Resumen del procesamiento de datos"},{"type":"p","text":"Libroo está diseñada para mantener los datos principales en tu dispositivo cuando sea posible. No vendemos datos personales y usamos servicios de terceros solo cuando son necesarios para las funciones descritas abajo."},{"type":"h2","text":"2. Datos almacenados localmente"},{"type":"p","text":"La app puede almacenar localmente en tu dispositivo datos relacionados con descubrimiento de libros, escaneo de códigos de barras, gestión de biblioteca personal, progreso de lectura, notas, citas, calificaciones, objetivos y estadísticas. Estos datos se usan para ofrecer funciones, recordar preferencias y permitir el uso sin conexión cuando esté disponible."},{"type":"h2","text":"3. Finalidades del procesamiento"},{"type":"ul","items":["Proporcionar las funciones principales de la app","Recordar preferencias del usuario","Permitir uso sin conexión cuando esté disponible","Procesar compras o acceso Premium cuando corresponda","Mejorar la estabilidad y prevenir abusos"]},{"type":"h2","text":"4. Servicios de terceros"},{"type":"p","text":"La app puede usar los siguientes servicios o proveedores de terceros: Google Books API, Open Library API, OpenAlex, Crossref, openBD, NDL Search, Rakuten Books API, Naver Search API, Kakao Book Search API, Deutsche Nationalbibliothek (DNB) SRU, Bibliotheque nationale de France (BnF) SRU, Cloudflare Workers, Google AdMob, Apple App Store y Google Play. Estos servicios operan bajo sus propias politicas de privacidad."},{"type":"p","text":"Cuando escaneas un codigo de barras o buscas por ISBN, titulo, autor o DOI, el termino de busqueda correspondiente puede enviarse a proveedores de metadatos de libros para obtener titulo, autor, editorial, imagen de portada, descripcion e informacion similar. Algunas busquedas regionales de libros se enrutan a traves de nuestro proxy de metadatos Cloudflare Worker para que la app pueda acceder de forma fiable a las API de los proveedores. El contenido de tu biblioteca personal, notas, calificaciones y progreso de lectura no se envia a proveedores de metadatos para este fin."},{"type":"h2","text":"5. Publicidad y seguimiento"},{"type":"p","text":"La versión gratuita utiliza Google AdMob para mostrar banners y anuncios intersticiales. El SDK de Google Mobile Ads puede recopilar y compartir automáticamente la dirección IP (que puede utilizarse para estimar la ubicación general), interacciones con la app y los anuncios como inicios, pulsaciones y visualizaciones, información de diagnóstico y rendimiento, e identificadores del dispositivo o de la cuenta, como identificadores publicitarios. Google puede usar esta información para publicidad, análisis y prevención del fraude."},{"type":"p","text":"Según tu región, tus opciones de consentimiento y los permisos del dispositivo, los anuncios pueden ser personalizados o no personalizados/limitados. Usamos la User Messaging Platform (UMP) de Google para solicitar y guardar las opciones de privacidad publicitaria aplicables. Si no se puede obtener la información de consentimiento, no se concede un permiso necesario o el proceso falla, la app solicita de forma predeterminada anuncios no personalizados."},{"type":"p","text":"En iOS, la app utiliza App Tracking Transparency (ATT) de Apple antes de permitir publicidad personalizada o el acceso al identificador publicitario. Puedes cambiar este permiso en los ajustes de iOS. Cuando esté disponible, los usuarios gratuitos pueden revisar o cambiar sus opciones de publicidad de Google en Ajustes > Privacidad y aspectos legales > Opciones de privacidad de anuncios. La disponibilidad depende de la región y de los requisitos legales. Pro elimina los banners y anuncios intersticiales."},{"type":"p","html":"Para más información, consulta la <a href=\"https://policies.google.com/privacy?hl=es\" target=\"_blank\" rel=\"noopener noreferrer\">Política de Privacidad de Google<\/a> y los ajustes de publicidad y privacidad de tu dispositivo."},{"type":"h2","text":"6. Compras y funciones Premium"},{"type":"p","text":"Las compras, suscripciones o accesos Premium opcionales pueden ser procesados por Apple App Store o Google Play. No recibimos ni almacenamos datos de tarjetas de crédito. El estado de compra puede guardarse localmente o verificarse mediante la tienda correspondiente."},{"type":"h2","text":"7. Compartición de datos"},{"type":"p","text":"No vendemos datos personales. El contenido almacenado localmente no se comparte con servidores de CAREO LIMITED. Datos limitados pueden ser procesados por proveedores terceros solo como se describe en esta Politica, incluidos identificadores de busqueda de libros como ISBN, titulo, autor o DOI cuando usas funciones de busqueda de metadatos."},{"type":"h2","text":"8. Conservación y eliminación"},{"type":"p","text":"Los datos locales permanecen en tu dispositivo hasta que los elimines, reinicies la app o desinstales la app. Los registros de pago, datos publicitarios y analíticos se conservan según las políticas de los proveedores correspondientes."},{"type":"h2","text":"9. Derechos del usuario"},{"type":"p","text":"Según tu región, puedes tener derechos de acceso, corrección, eliminación, limitación u oposición. Como la mayoría de los datos se almacenan localmente, normalmente puedes gestionarlos o eliminarlos desde la app o los ajustes del dispositivo."},{"type":"h2","text":"10. Seguridad de datos"},{"type":"p","text":"Usamos HTTPS para comunicaciones externas cuando corresponde, enrutamos algunas solicitudes API de proveedores mediante un proxy de metadatos del lado del servidor cuando es necesario y diseñamos nuestras apps para minimizar la recopilación de datos. Ningún software o dispositivo puede garantizar seguridad absoluta."},{"type":"h2","text":"11. Privacidad de menores"},{"type":"p","text":"La app no está dirigida a menores de 13 años. No recopilamos conscientemente datos personales de menores de 13 años. Si crees que un menor proporcionó datos personales, contáctanos."},{"type":"h2","text":"12. Transferencias internacionales"},{"type":"p","text":"Los proveedores terceros pueden procesar datos limitados en países fuera del tuyo. Se aplican salvaguardias adecuadas cuando lo exige la ley."},{"type":"h2","text":"13. Contacto"},{"type":"p","html":"<strong>CAREO LIMITED<\/strong><br>careolimited@gmail.com<br>Libroo - Privacy Inquiry"},{"type":"h2","text":"14. Actualizaciones de la Política"},{"type":"p","text":"Podemos actualizar esta Política si cambian las funciones de la app, servicios terceros o requisitos legales. Las actualizaciones se reflejarán con una nueva fecha. El uso continuado de la app implica aceptación."}],"tr":[{"type":"h1","text":"Gizlilik Politikası - KitApp"},{"type":"meta","html":"<strong>Son güncelleme:<\/strong> 13 Temmuz 2026<br><strong>Uygulama:<\/strong> KitApp<br><strong>Geliştirici / Yayıncı:<\/strong> CAREO LIMITED<br><strong>İletişim:<\/strong> careolimited@gmail.com"},{"type":"p","text":"KitApp gizliliğinize saygı duyar. Bu Politika, iOS ve Android mobil uygulamasını kullanırken hangi bilgilerin işlenebileceğini, nasıl kullanıldığını ve haklarınızı açıklar."},{"type":"h2","text":"1. Veri İşleme Özeti"},{"type":"p","text":"KitApp, temel uygulama verilerini mümkün olduğunda cihazınızda tutacak şekilde tasarlanmıştır. Kişisel verileri satmayız ve üçüncü taraf hizmetleri yalnızca aşağıda açıklanan özellikler için gerekli olduğunda kullanırız."},{"type":"h2","text":"2. Yerel Olarak Saklanan Veriler"},{"type":"p","text":"Uygulama, kitap keşfi, barkod tarama, kişisel kütüphane yönetimi, okuma ilerlemesi, notlar, alıntılar, puanlar, hedefler ve istatistikler ile ilgili verileri cihazınızda yerel olarak saklayabilir. Bu veriler uygulama özelliklerini sunmak, tercihleri hatırlamak ve varsa çevrimdışı kullanımı desteklemek için kullanılır."},{"type":"h2","text":"3. İşleme Amaçları"},{"type":"ul","items":["Temel uygulama özelliklerini sunmak","Kullanıcı tercihlerini hatırlamak","Varsa çevrimdışı kullanımı desteklemek","Uygunsa satın alma veya Premium erişimi işlemek","Kararlılığı artırmak ve kötüye kullanımı önlemek"]},{"type":"h2","text":"4. Üçüncü Taraf Hizmetler"},{"type":"p","text":"Uygulama şu üçüncü taraf hizmetleri veya sağlayıcıları kullanabilir: Google Books API, Open Library API, OpenAlex, Crossref, openBD, NDL Search, Rakuten Books API, Naver Search API, Kakao Book Search API, Alman Milli Kütüphanesi (DNB) SRU, Bibliotheque nationale de France (BnF) SRU, Cloudflare Workers, Google AdMob, Apple App Store ve Google Play. Bu hizmetler kendi gizlilik politikalarına göre çalışır."},{"type":"p","text":"Bir barkod taradığınızda veya ISBN, başlık, yazar ya da DOI ile arama yaptığınızda, ilgili arama terimi kitap başlığı, yazar, yayınevi, kapak görseli, açıklama ve benzeri kitap bilgilerini almak için kitap metadata sağlayıcılarına gönderilebilir. Bazı bölgesel kitap sorguları, uygulamanın sağlayıcı API’lerine güvenilir şekilde erişebilmesi için Cloudflare Worker metadata proxy’miz üzerinden yönlendirilir. Kişisel kütüphaneniz, notlarınız, puanlarınız ve okuma ilerlemeniz bu amaçla kitap metadata sağlayıcılarına gönderilmez."},{"type":"h2","text":"5. Reklam ve Takip"},{"type":"p","text":"Ücretsiz sürümde banner ve geçiş reklamları göstermek için Google AdMob kullanılır. Google Mobile Ads SDK; genel konumu tahmin etmek için kullanılabilecek IP adresini, uygulama açılışları, dokunmalar ve reklam görüntülemeleri gibi uygulama ve reklam etkileşimlerini, tanılama ve performans bilgilerini ve reklam tanımlayıcıları gibi cihaz veya hesap tanımlayıcılarını otomatik olarak toplayabilir ve paylaşabilir. Google bu bilgileri reklam, analiz ve sahtekârlığı önleme amaçlarıyla kullanabilir."},{"type":"p","text":"Bölgenize, izin tercihlerinize ve cihaz izinlerine bağlı olarak kişiselleştirilmiş veya kişiselleştirilmemiş/sınırlı reklamlar gösterilebilir. Geçerli reklam gizliliği tercihlerini istemek ve saklamak için Google User Messaging Platform (UMP) kullanırız. İzin bilgileri alınamazsa, gerekli bir izin verilmezse veya izin akışı başarısız olursa uygulama varsayılan olarak kişiselleştirilmemiş reklam ister."},{"type":"p","text":"iOS’ta uygulama, kişiselleştirilmiş reklama veya reklam tanımlayıcısına erişime izin vermeden önce Apple App Tracking Transparency (ATT) sistemini kullanır. Bu izni iOS Ayarları’ndan değiştirebilirsiniz. Kullanılabildiği bölgelerde ücretsiz kullanıcılar Ayarlar > Gizlilik ve Yasal > Reklam Gizliliği Seçenekleri yolundan Google reklam tercihlerini inceleyebilir veya değiştirebilir. Kullanılabilirlik bölgeye ve yasal gerekliliklere bağlıdır. Pro, banner ve geçiş reklamlarını kaldırır."},{"type":"p","html":"Daha fazla bilgi için <a href=\"https://policies.google.com/privacy?hl=tr\" target=\"_blank\" rel=\"noopener noreferrer\">Google Gizlilik Politikası<\/a> ile cihazınızın reklam ve gizlilik ayarlarını inceleyin."},{"type":"h2","text":"6. Satın Almalar ve Premium Özellikler"},{"type":"p","text":"İsteğe bağlı satın almalar, abonelikler veya Premium erişim Apple App Store ya da Google Play tarafından işlenebilir. Kredi kartı bilgilerini almayız veya saklamayız. Satın alma durumu yerel olarak saklanabilir veya ilgili mağaza üzerinden doğrulanabilir."},{"type":"h2","text":"7. Veri Paylaşımı"},{"type":"p","text":"Kişisel verileri satmayız. Yerel olarak saklanan uygulama içeriği CAREO LIMITED sunucularıyla paylaşılmaz. Sınırlı veriler yalnızca bu Politikada açıklandığı şekilde üçüncü taraf sağlayıcılar tarafından işlenebilir; buna metadata arama özelliklerini kullandığınızda ISBN, başlık, yazar veya DOI gibi kitap arama tanımlayıcıları dahildir."},{"type":"h2","text":"8. Saklama ve Silme"},{"type":"p","text":"Yerel veriler siz silene, uygulamayı sıfırlayana veya kaldırana kadar cihazınızda kalır. Mağaza ödeme kayıtları, reklam verileri ve analiz verileri ilgili sağlayıcıların politikalarına göre saklanır."},{"type":"h2","text":"9. Kullanıcı Hakları"},{"type":"p","text":"Bölgenize bağlı olarak erişim, düzeltme, silme, sınırlandırma veya itiraz haklarınız olabilir. Verilerin çoğu yerel saklandığı için bunları genellikle uygulama veya cihaz ayarları üzerinden yönetebilir ya da silebilirsiniz."},{"type":"h2","text":"10. Veri Güvenliği"},{"type":"p","text":"Uygun durumlarda harici iletişim için HTTPS kullanırız, gerekli olduğunda bazı sağlayıcı API isteklerini sunucu taraflı metadata proxy üzerinden yönlendiririz ve uygulamalarımızı veri toplamayı azaltacak şekilde tasarlarız. Hiçbir yazılım veya cihaz ortamı mutlak güvenlik garanti edemez."},{"type":"h2","text":"11. Çocukların Gizliliği"},{"type":"p","text":"Uygulama 13 yaş altındaki çocuklara yönelik değildir. 13 yaş altındaki çocuklardan bilerek kişisel veri toplamayız. Bir çocuğun kişisel veri sağladığını düşünüyorsanız bizimle iletişime geçin."},{"type":"h2","text":"12. Uluslararası Veri Aktarımları"},{"type":"p","text":"Üçüncü taraf sağlayıcılar sınırlı verileri ülkeniz dışındaki ülkelerde işleyebilir. Kanunen gerekli olduğunda uygun korumalar uygulanır."},{"type":"h2","text":"13. İletişim"},{"type":"p","html":"<strong>CAREO LIMITED<\/strong><br>careolimited@gmail.com<br>KitApp - Privacy Inquiry"},{"type":"h2","text":"14. Politika Güncellemeleri"},{"type":"p","text":"Uygulama özellikleri, üçüncü taraf hizmetler veya yasal gereklilikler değişirse bu Politikayı güncelleyebiliriz. Güncellemeler yeni Son güncelleme tarihiyle gösterilir. Uygulamayı kullanmaya devam etmeniz güncel Politikayı kabul ettiğiniz anlamına gelir."}]};
  const uiText = {"en": {"back": "← Back to CAREO LIMITED", "privacy": "Privacy Policy", "last": "Last updated", "app": "App", "dev": "Developer / Publisher", "contact": "Contact", "lang": "Language"}, "fr": {"back": "← Retour à CAREO LIMITED", "privacy": "Politique de confidentialité", "last": "Dernière mise à jour", "app": "App", "dev": "Développeur / Éditeur", "contact": "Contact", "lang": "Langue"}, "de": {"back": "← Zurück zu CAREO LIMITED", "privacy": "Datenschutzerklärung", "last": "Letzte Aktualisierung", "app": "App", "dev": "Entwickler / Herausgeber", "contact": "Kontakt", "lang": "Sprache"}, "it": {"back": "← Torna a CAREO LIMITED", "privacy": "Informativa sulla privacy", "last": "Ultimo aggiornamento", "app": "App", "dev": "Sviluppatore / Editore", "contact": "Contatto", "lang": "Lingua"}, "ja": {"back": "← CAREO LIMITEDに戻る", "privacy": "プライバシーポリシー", "last": "最終更新", "app": "アプリ", "dev": "開発者 / 発行者", "contact": "連絡先", "lang": "言語"}, "ko": {"back": "← CAREO LIMITED로 돌아가기", "privacy": "개인정보 처리방침", "last": "마지막 업데이트", "app": "앱", "dev": "개발자 / 게시자", "contact": "문의", "lang": "언어"}, "pt": {"back": "← Voltar para CAREO LIMITED", "privacy": "Política de Privacidade", "last": "Última atualização", "app": "App", "dev": "Programador / Editor", "contact": "Contacto", "lang": "Idioma"}, "ru": {"back": "← Назад к CAREO LIMITED", "privacy": "Политика конфиденциальности", "last": "Последнее обновление", "app": "Приложение", "dev": "Разработчик / Издатель", "contact": "Контакт", "lang": "Язык"}, "es": {"back": "← Volver a CAREO LIMITED", "privacy": "Política de privacidad", "last": "Última actualización", "app": "App", "dev": "Desarrollador / Editor", "contact": "Contacto", "lang": "Idioma"}, "tr": {"back": "← CAREO LIMITED’a dön", "privacy": "Gizlilik Politikası", "last": "Son güncelleme", "app": "Uygulama", "dev": "Geliştirici / Yayıncı", "contact": "İletişim", "lang": "Dil"}};
  const languageSelect = document.getElementById("languageSelect");
  const policyContent = document.getElementById("policyContent");
  const backLink = document.getElementById("backLink");
  const params = new URLSearchParams(window.location.search);
  const initialLanguage = params.get("lang") || localStorage.getItem("careo-language") || "en";
  function renderPolicy(language) {
    const selected = policyData[language] || policyData.en;
    const ui = uiText[language] || uiText.en;
    document.documentElement.lang = language;
    languageSelect.value = language;
    backLink.textContent = ui.back;
    backLink.href = `../index.html?lang=${encodeURIComponent(language)}`;
    policyContent.innerHTML = "";
    selected.forEach((block) => {
      if (block.type === "h1" || block.type === "h2") {
        const el = document.createElement(block.type); el.textContent = block.text; policyContent.appendChild(el);
      } else if (block.type === "p" || block.type === "meta") {
        const el = document.createElement("p"); if (block.type === "meta") el.className = "meta"; if (block.html) el.innerHTML = block.html; else el.textContent = block.text; policyContent.appendChild(el);
      } else if (block.type === "ul") {
        const ul = document.createElement("ul"); block.items.forEach((item) => { const li = document.createElement("li"); li.textContent = item; ul.appendChild(li); }); policyContent.appendChild(ul);
      }
    });
    document.title = `${selected[0].text} | CAREO LIMITED`;
    localStorage.setItem("careo-language", language);
    const url = new URL(window.location.href); url.searchParams.set("lang", language); window.history.replaceState(null, "", url.toString());
  }
  languageSelect.addEventListener("change", (event) => renderPolicy(event.target.value));
  renderPolicy(policyData[initialLanguage] ? initialLanguage : "en");
</script>
