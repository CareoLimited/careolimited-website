<script>
  const policyData = {"en":[{"type":"h1","text":"Privacy Policy – Spin&Go"},{"type":"meta","html":"<strong>Last updated:</strong> July 13, 2026<br><strong>App:</strong> Spin&amp;Go<br><strong>Developer / Publisher:</strong> CAREO LIMITED<br><strong>Contact:</strong> careolimited@gmail.com"},{"type":"p","text":"This Privacy Policy explains how information is handled when you use Spin&Go on iOS or Android. Spin&Go is a solo decision-tool app and does not require an account."},{"type":"h2","text":"1. Overview"},{"type":"p","text":"Core content is designed to remain on your device. CAREO LIMITED does not operate a Spin&Go account database, multiplayer service, Firebase backend or independent analytics service, and does not sell personal information."},{"type":"h2","text":"2. Information stored locally"},{"type":"p","text":"The app may store custom wheels, presets and scenarios, participant lists, recent results, number ranges, coin labels, tool options, language, theme, haptic and onboarding preferences, ad-consent status, ad timing/eligibility counters, review-prompt eligibility counters and cached purchase entitlement on your device. This information supports app features and offline use and is not uploaded to CAREO LIMITED servers."},{"type":"h2","text":"3. Internet connectivity"},{"type":"p","text":"Spin&Go uses the device connectivity API to determine whether the internet is available so it can avoid requesting ads while offline and retry after reconnection. CAREO LIMITED does not use this feature to collect Wi‑Fi names, passwords, precise location or browsing history, and the connectivity state is kept in app memory."},{"type":"h2","text":"4. Advertising and data processed by Google AdMob"},{"type":"p","text":"The free version may show banner and interstitial ads supplied by Google AdMob. Depending on your region, choices and device settings, Google and its advertising partners may process advertising identifiers (including the Android Advertising ID or iOS IDFA when permitted), IP address, approximate location derived from IP, device and app information, language, ad interactions, diagnostics, fraud-prevention signals and ad performance data to deliver, limit, secure, measure and, only where permitted, personalize ads. Spin&Go does not request precise-location permission, and CAREO LIMITED does not send your wheel content, participant names or locally stored results to AdMob."},{"type":"h2","text":"5. Consent, personalized ads and tracking choices"},{"type":"p","text":"Google's User Messaging Platform (UMP) checks consent requirements at app launch and presents a privacy message when required. Ads are requested only when the UMP status permits them. Where required, Settings displays “Privacy Preferences” so you can reopen Google's form and change available choices. On iOS, App Tracking Transparency (ATT) is a separate system permission requested only after the consent flow when ads are allowed. If ATT or personalized-ad consent is denied, Spin&Go requests non-personalized ads where advertising is otherwise permitted; refusal does not block the core app or purchased features. Device-level advertising controls may also apply."},{"type":"h2","text":"6. Purchases and Pro access"},{"type":"p","text":"Optional purchases or subscriptions are processed by Apple App Store or Google Play. CAREO LIMITED does not receive or store your full payment-card details. The store processes transaction and account information under its own policy; Spin&Go may receive transaction status, product identifier and entitlement information needed to complete, restore and cache Pro access."},{"type":"h2","text":"7. Ratings and reviews"},{"type":"p","text":"Spin&Go may keep local counters such as install age, completed actions, active days, last prompt date and app version to decide when to request an App Store or Google Play rating without interrupting early use. These counters are not sent to CAREO LIMITED. The operating system or store presents the rating prompt; CAREO LIMITED cannot use the app to read what you submit."},{"type":"h2","text":"8. Third-party services"},{"type":"p","text":"Spin&Go uses Google AdMob and Google UMP for advertising and privacy choices, Apple App Store / StoreKit and Google Play Billing for purchases, and Apple App Store or Google Play for rating prompts. These providers process information under their own terms and privacy policies."},{"type":"p","html":"Provider policies: <a href=\"https://policies.google.com/privacy\" target=\"_blank\" rel=\"noopener noreferrer\">Google Privacy Policy</a>, <a href=\"https://www.apple.com/legal/privacy/\" target=\"_blank\" rel=\"noopener noreferrer\">Apple Privacy Policy</a>, and <a href=\"https://policies.google.com/terms\" target=\"_blank\" rel=\"noopener noreferrer\">Google Terms</a>."},{"type":"h2","text":"9. Sharing and sale"},{"type":"p","text":"CAREO LIMITED does not sell or rent personal information and does not share locally created Spin&Go content with advertisers. Information is processed by the third-party providers above only as necessary for advertising, consent, purchases, ratings, security, fraud prevention and legal compliance. Regional “sale” or “sharing” choices offered by Google can be managed through Privacy Preferences when that entry point is required."},{"type":"h2","text":"10. Retention and deletion"},{"type":"p","text":"Local app information remains until you delete or reset it in the app, clear app storage or uninstall Spin&Go. Reinstalling or clearing storage may also reset local consent indicators and usage counters. Advertising, consent and transaction records controlled by Google, Apple or Google Play are retained under those providers' policies and legal obligations. You can contact the relevant provider for provider-held data."},{"type":"h2","text":"11. Legal bases and your rights"},{"type":"p","text":"Where data-protection law applies, processing may rely on consent for personalized advertising or tracking, performance of a purchase contract, legitimate interests in delivering and securing the app and preventing fraud, or legal obligations. Depending on your location, you may have rights to access, correct, delete, restrict, object, withdraw consent or lodge a complaint. Withdrawal does not affect earlier lawful processing. Because CAREO LIMITED does not hold your local app content on a server, it generally cannot retrieve it for you; you can control it on your device."},{"type":"h2","text":"12. Children's privacy"},{"type":"p","text":"Spin&Go is not directed to children under 13 or below the applicable digital-consent age. We do not knowingly collect personal information from such children. The app configures the advertising SDK as not child-directed and not intended for users under the age of consent. If you believe a child has provided personal information, contact us."},{"type":"h2","text":"13. Security and international transfers"},{"type":"p","text":"We minimize collection and use platform security and HTTPS where external communications occur. No system can guarantee absolute security. Google, Apple and their service providers may process information in other countries; their safeguards and transfer mechanisms apply as required by law."},{"type":"h2","text":"14. Changes to this Policy"},{"type":"p","text":"We may update this Policy when Spin&Go features, providers or legal requirements change. The date above identifies the current version. Material changes will be communicated where required."},{"type":"h2","text":"15. Contact"},{"type":"p","text":"CAREO LIMITED is the developer and publisher of Spin&Go. For privacy questions or requests, contact careolimited@gmail.com and include “Spin&Go Privacy” in the subject."}],"fr":[{"type":"h1","text":"Politique de confidentialité – Spin&Go"},{"type":"meta","html":"<strong>Dernière mise à jour:</strong> 13 juillet 2026<br><strong>Application:</strong> Spin&amp;Go<br><strong>Développeur / Éditeur:</strong> CAREO LIMITED<br><strong>Contact:</strong> careolimited@gmail.com"},{"type":"p","text":"La présente Politique explique le traitement des informations lors de l’utilisation de Spin&Go sur iOS ou Android. Spin&Go est une application individuelle d’aide à la décision qui ne nécessite aucun compte."},{"type":"h2","text":"1. Vue d’ensemble"},{"type":"p","text":"Le contenu principal est conçu pour rester sur votre appareil. CAREO LIMITED n’exploite ni base de comptes Spin&Go, ni service multijoueur, ni backend Firebase, ni service d’analyse indépendant, et ne vend pas de données personnelles."},{"type":"h2","text":"2. Informations stockées localement"},{"type":"p","text":"L’application peut stocker sur votre appareil les roues personnalisées, préréglages et scénarios, listes de participants, résultats récents, plages de nombres, libellés de pièce, options des outils, langue, thème, préférences haptiques et d’intégration, état du consentement publicitaire, compteurs de diffusion publicitaire, d’éligibilité à l’avis et droit d’accès Pro en cache. Ces informations servent aux fonctions de l’application et au mode hors ligne et ne sont pas envoyées aux serveurs de CAREO LIMITED."},{"type":"h2","text":"3. Connexion Internet"},{"type":"p","text":"Spin&Go utilise l’API de connectivité de l’appareil pour savoir si Internet est disponible, éviter les demandes publicitaires hors ligne et réessayer après reconnexion. CAREO LIMITED ne collecte ainsi ni noms ou mots de passe Wi‑Fi, ni position précise, ni historique de navigation; l’état de connexion reste en mémoire dans l’application."},{"type":"h2","text":"4. Publicité et données traitées par Google AdMob"},{"type":"p","text":"La version gratuite peut afficher des bannières et annonces interstitielles Google AdMob. Selon votre région, vos choix et les réglages de l’appareil, Google et ses partenaires peuvent traiter des identifiants publicitaires (identifiant publicitaire Android ou IDFA iOS si autorisé), l’adresse IP, une position approximative déduite de l’IP, des informations sur l’appareil et l’application, la langue, les interactions avec les annonces, des diagnostics, des signaux antifraude et des données de performance afin de diffuser, limiter, sécuriser, mesurer et, uniquement si autorisé, personnaliser les annonces. Spin&Go ne demande pas l’accès à la position précise et n’envoie pas à AdMob le contenu de vos roues, les noms des participants ou les résultats locaux."},{"type":"h2","text":"5. Consentement et choix de suivi"},{"type":"p","text":"La plateforme UMP de Google vérifie les exigences de consentement au lancement et affiche un message lorsque nécessaire. Les annonces ne sont demandées que si l’état UMP le permet. Lorsque requis, « Préférences de confidentialité » dans les Réglages permet de rouvrir le formulaire Google. Sur iOS, l’autorisation ATT est distincte et n’est demandée qu’après le parcours de consentement lorsque les annonces sont permises. En cas de refus d’ATT ou de personnalisation, Spin&Go demande des annonces non personnalisées lorsque la publicité reste autorisée; le refus ne bloque ni les fonctions essentielles ni les achats."},{"type":"h2","text":"6. Achats et accès Pro"},{"type":"p","text":"Les achats ou abonnements facultatifs sont traités par l’App Store d’Apple ou Google Play. CAREO LIMITED ne reçoit ni ne conserve les données complètes de votre carte. La boutique traite les données de transaction et de compte; Spin&Go peut recevoir l’état de transaction, l’identifiant du produit et le droit d’accès nécessaires pour finaliser, restaurer et mémoriser l’accès Pro."},{"type":"h2","text":"7. Notes et avis"},{"type":"p","text":"Spin&Go peut conserver localement l’ancienneté d’installation, le nombre d’actions, les jours actifs, la date de la dernière demande et la version afin de choisir un moment approprié pour demander une note. Ces compteurs ne sont pas envoyés à CAREO LIMITED. Le système ou la boutique affiche la demande et l’application ne peut pas lire votre réponse."},{"type":"h2","text":"8. Services tiers"},{"type":"p","text":"Spin&Go utilise Google AdMob et Google UMP pour la publicité et les choix de confidentialité, l’App Store / StoreKit et Google Play Billing pour les achats, ainsi que l’App Store ou Google Play pour les demandes de note. Ces fournisseurs appliquent leurs propres conditions et politiques."},{"type":"p","html":"Politiques des fournisseurs : <a href=\"https://policies.google.com/privacy\" target=\"_blank\" rel=\"noopener noreferrer\">Politique de confidentialité Google</a>, <a href=\"https://www.apple.com/legal/privacy/\" target=\"_blank\" rel=\"noopener noreferrer\">Politique de confidentialité Apple</a> et <a href=\"https://policies.google.com/terms\" target=\"_blank\" rel=\"noopener noreferrer\">Conditions Google</a>."},{"type":"h2","text":"9. Partage et vente"},{"type":"p","text":"CAREO LIMITED ne vend ni ne loue les données personnelles et ne partage pas le contenu local de Spin&Go avec les annonceurs. Les fournisseurs ci-dessus ne traitent des informations que pour la publicité, le consentement, les achats, les notes, la sécurité, la prévention de la fraude et le respect de la loi. Les choix régionaux de « vente » ou de « partage » proposés par Google sont accessibles via Préférences de confidentialité lorsque ce point d’entrée est requis."},{"type":"h2","text":"10. Conservation et suppression"},{"type":"p","text":"Les informations locales restent jusqu’à leur suppression ou réinitialisation dans l’application, l’effacement des données de l’application ou sa désinstallation. Ces opérations peuvent aussi réinitialiser les indicateurs de consentement et compteurs locaux. Les données publicitaires, de consentement et de transaction contrôlées par Google ou Apple sont conservées selon leurs politiques et obligations légales."},{"type":"h2","text":"11. Bases juridiques et droits"},{"type":"p","text":"Lorsque la loi l’exige, le traitement peut reposer sur le consentement pour la publicité personnalisée ou le suivi, l’exécution d’un contrat d’achat, l’intérêt légitime à fournir et sécuriser l’application et prévenir la fraude, ou une obligation légale. Selon votre lieu de résidence, vous pouvez demander l’accès, la rectification, l’effacement, la limitation, vous opposer, retirer votre consentement ou saisir une autorité. CAREO LIMITED ne pouvant récupérer le contenu conservé uniquement sur votre appareil, vous le gérez directement sur celui-ci."},{"type":"h2","text":"12. Enfants"},{"type":"p","text":"Spin&Go ne s’adresse pas aux enfants de moins de 13 ans ni aux personnes n’ayant pas l’âge numérique de consentement applicable. Nous ne collectons pas sciemment leurs données. Le SDK publicitaire est configuré comme non destiné aux enfants et aux utilisateurs sous l’âge de consentement. Contactez-nous en cas de doute."},{"type":"h2","text":"13. Sécurité et transferts internationaux"},{"type":"p","text":"Nous limitons la collecte et utilisons la sécurité de la plateforme et HTTPS pour les communications externes. Aucun système n’est absolument sûr. Google, Apple et leurs prestataires peuvent traiter des informations dans d’autres pays en appliquant les garanties requises."},{"type":"h2","text":"14. Modifications"},{"type":"p","text":"Cette Politique peut évoluer avec les fonctions, fournisseurs ou obligations légales. La date ci-dessus identifie la version actuelle; les changements importants seront communiqués lorsque requis."},{"type":"h2","text":"15. Contact"},{"type":"p","text":"CAREO LIMITED développe et publie Spin&Go. Pour toute question ou demande: careolimited@gmail.com, avec « Spin&Go Privacy » dans l’objet."}],"de":[{"type":"h1","text":"Datenschutzerklärung – Spin&Go"},{"type":"meta","html":"<strong>Letzte Aktualisierung:</strong> 13. Juli 2026<br><strong>App:</strong> Spin&amp;Go<br><strong>Entwickler / Herausgeber:</strong> CAREO LIMITED<br><strong>Kontakt:</strong> careolimited@gmail.com"},{"type":"p","text":"Diese Erklärung beschreibt den Umgang mit Informationen bei der Nutzung von Spin&Go auf iOS oder Android. Spin&Go ist eine Solo-Entscheidungshilfe und erfordert kein Konto."},{"type":"h2","text":"1. Überblick"},{"type":"p","text":"Kerninhalte bleiben grundsätzlich auf Ihrem Gerät. CAREO LIMITED betreibt keine Spin&Go-Kontodatenbank, keinen Mehrspielerdienst, kein Firebase-Backend und keinen eigenen Analysedienst, verkauft keine personenbezogenen Daten."},{"type":"h2","text":"2. Lokal gespeicherte Informationen"},{"type":"p","text":"Die App kann eigene Räder, Vorlagen und Szenarien, Teilnehmerlisten, letzte Ergebnisse, Zahlenbereiche, Münzbeschriftungen, Werkzeugoptionen, Sprache, Design, Haptik- und Einführungspräferenzen, Werbeeinwilligungsstatus, Werbe- und Bewertungszähler sowie zwischengespeicherte Pro-Berechtigungen auf dem Gerät speichern. Dies dient den App-Funktionen und der Offline-Nutzung und wird nicht an CAREO-LIMITED-Server übertragen."},{"type":"h2","text":"3. Internetverbindung"},{"type":"p","text":"Spin&Go nutzt die Verbindungs-API des Geräts, um Werbeanfragen offline zu vermeiden und nach Wiederherstellung der Verbindung erneut zu versuchen. CAREO LIMITED erhebt dadurch keine WLAN-Namen oder -Passwörter, keinen genauen Standort und keinen Browserverlauf; der Status bleibt im App-Speicher."},{"type":"h2","text":"4. Werbung und Verarbeitung durch Google AdMob"},{"type":"p","text":"Die kostenlose Version kann Banner- und Interstitial-Anzeigen von Google AdMob zeigen. Je nach Region, Auswahl und Geräteeinstellungen können Google und Werbepartner Werbe-IDs (Android Advertising ID oder iOS-IDFA, sofern erlaubt), IP-Adresse, daraus abgeleiteten ungefähren Standort, Geräte- und App-Daten, Sprache, Anzeigeninteraktionen, Diagnosen, Betrugsbekämpfungssignale und Leistungsdaten verarbeiten, um Anzeigen bereitzustellen, zu begrenzen, abzusichern, zu messen und nur bei Erlaubnis zu personalisieren. Spin&Go fordert keinen genauen Standort an und sendet Radinhalte, Teilnehmernamen oder lokale Ergebnisse nicht an AdMob."},{"type":"h2","text":"5. Einwilligung und Tracking-Auswahl"},{"type":"p","text":"Google UMP prüft beim Start, ob eine Einwilligung erforderlich ist, und zeigt nötigenfalls eine Nachricht. Anzeigen werden nur angefordert, wenn der UMP-Status dies erlaubt. Falls vorgeschrieben, können Sie über „Datenschutzeinstellungen“ in den Einstellungen das Google-Formular erneut öffnen. Unter iOS ist ATT eine separate Systemberechtigung, die nach dem Einwilligungsablauf angefragt wird. Bei Ablehnung von ATT oder Personalisierung fordert Spin&Go nicht personalisierte Anzeigen an, soweit Werbung sonst zulässig ist; die Kernfunktionen und Käufe bleiben verfügbar."},{"type":"h2","text":"6. Käufe und Pro-Zugang"},{"type":"p","text":"Optionale Käufe oder Abonnements werden vom Apple App Store oder Google Play verarbeitet. CAREO LIMITED erhält oder speichert keine vollständigen Kartendaten. Der Store verarbeitet Konto- und Transaktionsdaten; Spin&Go kann Transaktionsstatus, Produktkennung und Berechtigung erhalten, um Pro-Zugang abzuschließen, wiederherzustellen und lokal zwischenzuspeichern."},{"type":"h2","text":"7. Bewertungen"},{"type":"p","text":"Spin&Go kann Installationsalter, Aktionsanzahl, aktive Tage, letztes Anfragedatum und App-Version lokal speichern, um einen passenden Zeitpunkt für eine Bewertungsanfrage zu bestimmen. Diese Zähler werden nicht an CAREO LIMITED gesendet. System oder Store zeigen die Abfrage; die App kann Ihre Eingabe nicht lesen."},{"type":"h2","text":"8. Drittanbieter"},{"type":"p","text":"Verwendet werden Google AdMob und UMP für Werbung und Datenschutzentscheidungen, Apple App Store / StoreKit und Google Play Billing für Käufe sowie App Store oder Google Play für Bewertungsabfragen. Es gelten die eigenen Bedingungen und Datenschutzrichtlinien dieser Anbieter."},{"type":"p","html":"Anbieter-Richtlinien: <a href=\"https://policies.google.com/privacy\" target=\"_blank\" rel=\"noopener noreferrer\">Google-Datenschutzerklärung</a>, <a href=\"https://www.apple.com/legal/privacy/\" target=\"_blank\" rel=\"noopener noreferrer\">Apple-Datenschutz</a> und <a href=\"https://policies.google.com/terms\" target=\"_blank\" rel=\"noopener noreferrer\">Google-Nutzungsbedingungen</a>."},{"type":"h2","text":"9. Weitergabe und Verkauf"},{"type":"p","text":"CAREO LIMITED verkauft oder vermietet keine personenbezogenen Daten und gibt lokale Spin&Go-Inhalte nicht an Werbetreibende weiter. Die genannten Anbieter verarbeiten Informationen nur für Werbung, Einwilligung, Käufe, Bewertungen, Sicherheit, Betrugsprävention und Rechtsbefolgung. Regionale Google-Optionen zu „Verkauf“ oder „Weitergabe“ können über Datenschutzeinstellungen verwaltet werden, wenn dieser Einstieg erforderlich ist."},{"type":"h2","text":"10. Aufbewahrung und Löschung"},{"type":"p","text":"Lokale Informationen bleiben, bis Sie sie in der App löschen oder zurücksetzen, App-Daten löschen oder Spin&Go deinstallieren. Dadurch können auch lokale Einwilligungsmerker und Zähler zurückgesetzt werden. Von Google oder Apple kontrollierte Werbe-, Einwilligungs- und Transaktionsdaten unterliegen deren Richtlinien und gesetzlichen Pflichten."},{"type":"h2","text":"11. Rechtsgrundlagen und Rechte"},{"type":"p","text":"Soweit Datenschutzrecht gilt, kann die Verarbeitung auf Einwilligung für personalisierte Werbung oder Tracking, Vertragserfüllung bei Käufen, berechtigten Interessen an Bereitstellung, Sicherheit und Betrugsabwehr oder gesetzlichen Pflichten beruhen. Je nach Ort bestehen Rechte auf Auskunft, Berichtigung, Löschung, Einschränkung, Widerspruch, Widerruf oder Beschwerde. Rein lokale Inhalte kann CAREO LIMITED nicht vom Server abrufen; Sie verwalten sie auf Ihrem Gerät."},{"type":"h2","text":"12. Kinder"},{"type":"p","text":"Spin&Go richtet sich nicht an Kinder unter 13 Jahren oder unter dem geltenden digitalen Einwilligungsalter. Solche Daten werden nicht wissentlich erhoben. Das Werbe-SDK ist als nicht an Kinder bzw. Personen unter dem Einwilligungsalter gerichtet konfiguriert. Bitte kontaktieren Sie uns bei Bedenken."},{"type":"h2","text":"13. Sicherheit und internationale Übermittlungen"},{"type":"p","text":"Wir minimieren die Erhebung und nutzen Plattformsicherheit sowie HTTPS für externe Kommunikation. Vollständige Sicherheit ist nicht garantiert. Google, Apple und deren Dienstleister können Daten in anderen Ländern mit den gesetzlich erforderlichen Schutzmaßnahmen verarbeiten."},{"type":"h2","text":"14. Änderungen"},{"type":"p","text":"Wir können diese Erklärung bei Änderungen an Funktionen, Anbietern oder Rechtsvorgaben aktualisieren. Das Datum oben kennzeichnet die aktuelle Fassung; wesentliche Änderungen werden erforderlichenfalls mitgeteilt."},{"type":"h2","text":"15. Kontakt"},{"type":"p","text":"CAREO LIMITED entwickelt und veröffentlicht Spin&Go. Datenschutzanfragen an careolimited@gmail.com mit „Spin&Go Privacy“ im Betreff."}],"it":[{"type":"h1","text":"Informativa sulla privacy – Spin&Go"},{"type":"meta","html":"<strong>Ultimo aggiornamento:</strong> 13 luglio 2026<br><strong>App:</strong> Spin&amp;Go<br><strong>Sviluppatore / Editore:</strong> CAREO LIMITED<br><strong>Contatto:</strong> careolimited@gmail.com"},{"type":"p","text":"Questa Informativa descrive come vengono gestite le informazioni durante l’uso di Spin&Go su iOS o Android. Spin&Go è uno strumento decisionale individuale e non richiede un account."},{"type":"h2","text":"1. Panoramica"},{"type":"p","text":"I contenuti principali sono progettati per restare sul dispositivo. CAREO LIMITED non gestisce database di account Spin&Go, servizi multiplayer, backend Firebase o un servizio di analisi indipendente e non vende dati personali."},{"type":"h2","text":"2. Informazioni memorizzate localmente"},{"type":"p","text":"L’app può conservare sul dispositivo ruote, preset e scenari personalizzati, elenchi di partecipanti, risultati recenti, intervalli numerici, etichette della moneta, opzioni degli strumenti, lingua, tema, preferenze aptiche e di onboarding, stato del consenso pubblicitario, contatori per annunci e richieste di recensione e diritto Pro in cache. Servono alle funzioni e all’uso offline e non sono caricati sui server CAREO LIMITED."},{"type":"h2","text":"3. Connessione Internet"},{"type":"p","text":"Spin&Go usa l’API di connettività per evitare richieste pubblicitarie offline e riprovare dopo la riconnessione. CAREO LIMITED non raccoglie nomi o password Wi‑Fi, posizione precisa o cronologia di navigazione; lo stato resta nella memoria dell’app."},{"type":"h2","text":"4. Pubblicità e dati trattati da Google AdMob"},{"type":"p","text":"La versione gratuita può mostrare banner e annunci interstitial di Google AdMob. In base a regione, scelte e impostazioni, Google e i partner possono trattare identificatori pubblicitari (Android Advertising ID o IDFA iOS se consentito), indirizzo IP, posizione approssimativa derivata dall’IP, informazioni su dispositivo e app, lingua, interazioni con annunci, diagnostica, segnali antifrode e prestazioni per fornire, limitare, proteggere, misurare e, solo se consentito, personalizzare gli annunci. Spin&Go non richiede la posizione precisa e non invia ad AdMob contenuti delle ruote, nomi o risultati locali."},{"type":"h2","text":"5. Consenso e scelte di tracciamento"},{"type":"p","text":"Google UMP verifica all’avvio se è necessario il consenso e mostra il messaggio richiesto. Gli annunci vengono richiesti solo se lo stato UMP lo consente. Quando necessario, «Preferenze sulla privacy» nelle Impostazioni riapre il modulo Google. Su iOS, ATT è un’autorizzazione distinta richiesta dopo il consenso quando gli annunci sono consentiti. Se ATT o la personalizzazione vengono negati, Spin&Go richiede annunci non personalizzati ove la pubblicità sia comunque permessa; il rifiuto non blocca funzioni principali o acquisti."},{"type":"h2","text":"6. Acquisti e accesso Pro"},{"type":"p","text":"Acquisti o abbonamenti facoltativi sono gestiti da Apple App Store o Google Play. CAREO LIMITED non riceve né conserva i dati completi della carta. Lo store tratta dati di account e transazione; Spin&Go può ricevere stato, identificatore prodotto e diritto necessari per completare, ripristinare e memorizzare l’accesso Pro."},{"type":"h2","text":"7. Valutazioni e recensioni"},{"type":"p","text":"Spin&Go può conservare localmente anzianità d’installazione, azioni, giorni attivi, data dell’ultima richiesta e versione per scegliere quando chiedere una valutazione. I contatori non vengono inviati a CAREO LIMITED. Il sistema o lo store mostra la richiesta e l’app non può leggere la risposta."},{"type":"h2","text":"8. Servizi terzi"},{"type":"p","text":"Spin&Go usa Google AdMob e UMP per pubblicità e scelte privacy, Apple App Store / StoreKit e Google Play Billing per gli acquisti e App Store o Google Play per le richieste di valutazione. Si applicano termini e informative dei rispettivi fornitori."},{"type":"p","html":"Politiche dei fornitori: <a href=\"https://policies.google.com/privacy\" target=\"_blank\" rel=\"noopener noreferrer\">Privacy Google</a>, <a href=\"https://www.apple.com/legal/privacy/\" target=\"_blank\" rel=\"noopener noreferrer\">Privacy Apple</a> e <a href=\"https://policies.google.com/terms\" target=\"_blank\" rel=\"noopener noreferrer\">Termini Google</a>."},{"type":"h2","text":"9. Condivisione e vendita"},{"type":"p","text":"CAREO LIMITED non vende o affitta dati personali e non condivide contenuti locali con inserzionisti. I fornitori indicati trattano informazioni solo per pubblicità, consenso, acquisti, valutazioni, sicurezza, antifrode e obblighi legali. Le opzioni regionali Google di «vendita» o «condivisione» sono gestibili tramite Preferenze sulla privacy quando richiesto."},{"type":"h2","text":"10. Conservazione ed eliminazione"},{"type":"p","text":"I dati locali restano finché non vengono eliminati o reimpostati nell’app, cancellati con i dati dell’app o rimossi disinstallando Spin&Go. Ciò può azzerare indicatori di consenso e contatori locali. Dati pubblicitari, consenso e transazioni controllati da Google o Apple seguono le loro politiche e obblighi."},{"type":"h2","text":"11. Basi giuridiche e diritti"},{"type":"p","text":"Ove applicabile, il trattamento può basarsi sul consenso per pubblicità personalizzata o tracciamento, sull’esecuzione del contratto d’acquisto, sul legittimo interesse a fornire e proteggere l’app e prevenire frodi o su obblighi legali. In base al luogo puoi avere diritti di accesso, rettifica, cancellazione, limitazione, opposizione, revoca o reclamo. CAREO LIMITED non può recuperare dal server contenuti presenti solo sul dispositivo."},{"type":"h2","text":"12. Minori"},{"type":"p","text":"Spin&Go non è destinata a minori di 13 anni o sotto l’età digitale di consenso applicabile. Non raccogliamo consapevolmente tali dati. L’SDK pubblicitario è configurato come non diretto ai minori. Contattaci in caso di dubbi."},{"type":"h2","text":"13. Sicurezza e trasferimenti internazionali"},{"type":"p","text":"Riduciamo la raccolta e utilizziamo sicurezza della piattaforma e HTTPS nelle comunicazioni esterne. Nessun sistema è totalmente sicuro. Google, Apple e fornitori possono trattare informazioni in altri Paesi applicando le garanzie richieste."},{"type":"h2","text":"14. Modifiche"},{"type":"p","text":"Possiamo aggiornare l’Informativa per cambiamenti a funzioni, fornitori o norme. La data sopra identifica la versione corrente; le modifiche sostanziali saranno comunicate quando richiesto."},{"type":"h2","text":"15. Contatti"},{"type":"p","text":"CAREO LIMITED sviluppa e pubblica Spin&Go. Scrivi a careolimited@gmail.com con «Spin&Go Privacy» nell’oggetto."}],"ja":[{"type":"h1","text":"プライバシーポリシー – Spin&Go"},{"type":"meta","html":"<strong>最終更新日:</strong> 2026年7月13日<br><strong>アプリ:</strong> Spin&amp;Go<br><strong>開発者／配信者:</strong> CAREO LIMITED<br><strong>連絡先:</strong> careolimited@gmail.com"},{"type":"p","text":"本ポリシーは、iOSまたはAndroidでSpin&Goを利用する際の情報の取扱いを説明します。Spin&Goはアカウント不要の個人向け意思決定ツールです。"},{"type":"h2","text":"1. 概要"},{"type":"p","text":"主要コンテンツは端末内に保持される設計です。CAREO LIMITEDはSpin&Goのアカウントデータベース、マルチプレイヤー、Firebaseバックエンド、独自の分析サービスを運営しておらず、個人情報を販売しません。"},{"type":"h2","text":"2. 端末内に保存される情報"},{"type":"p","text":"カスタムホイール、プリセット、シナリオ、参加者リスト、最近の結果、数値範囲、コインのラベル、各ツール設定、言語、テーマ、触覚・オンボーディング設定、広告同意状態、広告表示・レビュー依頼用カウンター、Pro権限のキャッシュが端末に保存される場合があります。機能とオフライン利用のためのもので、CAREO LIMITEDのサーバーには送信されません。"},{"type":"h2","text":"3. インターネット接続"},{"type":"p","text":"オフライン時の広告要求を避け、再接続後に再試行するため、端末の接続APIでインターネットの利用可否を確認します。Wi‑Fi名・パスワード、正確な位置情報、閲覧履歴をCAREO LIMITEDが収集することはなく、接続状態はアプリのメモリ内に保持されます。"},{"type":"h2","text":"4. Google AdMob広告"},{"type":"p","text":"無料版ではGoogle AdMobのバナー広告とインタースティシャル広告が表示される場合があります。地域、選択、端末設定に応じて、Googleと広告パートナーは広告ID（許可時のAndroid Advertising IDまたはiOS IDFA）、IPアドレス、IPから推定されるおおよその位置、端末・アプリ情報、言語、広告操作、診断、詐欺防止シグナル、広告成果を、配信、頻度制限、安全確保、測定、および許可された場合のみパーソナライズのために処理することがあります。Spin&Goは正確な位置情報権限を要求せず、ホイール内容、参加者名、ローカル結果をAdMobへ送信しません。"},{"type":"h2","text":"5. 同意とトラッキングの選択"},{"type":"p","text":"Google UMPは起動時に同意要件を確認し、必要な場合はメッセージを表示します。UMPが許可する場合のみ広告を要求します。必要な地域では、設定の「プライバシー設定」からGoogleのフォームを再表示できます。iOSのATTは別のシステム権限で、同意手続後に広告が許可される場合のみ要求されます。ATTまたはパーソナライズを拒否した場合、広告自体が許可される範囲で非パーソナライズ広告を要求します。拒否しても基本機能や購入済み機能は利用できます。"},{"type":"h2","text":"6. 購入とProアクセス"},{"type":"p","text":"任意の購入・サブスクリプションはApple App StoreまたはGoogle Playが処理します。CAREO LIMITEDはカード情報全体を受領・保存しません。ストアがアカウントと取引情報を処理し、Spin&GoはProアクセスの完了、復元、キャッシュに必要な取引状態、製品ID、権限情報を受け取る場合があります。"},{"type":"h2","text":"7. 評価とレビュー"},{"type":"p","text":"適切な時期に評価を依頼するため、インストール経過日数、操作回数、利用日数、最終依頼日、アプリバージョンを端末内に保存する場合があります。CAREO LIMITEDには送信されません。依頼画面はOSまたはストアが表示し、アプリは回答内容を読み取れません。"},{"type":"h2","text":"8. 第三者サービス"},{"type":"p","text":"広告とプライバシー選択にGoogle AdMob／UMP、購入にApple App Store／StoreKitとGoogle Play Billing、評価依頼にApp StoreまたはGoogle Playを使用します。各社の規約とプライバシーポリシーが適用されます。"},{"type":"p","html":"各社の方針：<a href=\"https://policies.google.com/privacy\" target=\"_blank\" rel=\"noopener noreferrer\">Googleプライバシーポリシー</a>、<a href=\"https://www.apple.com/legal/privacy/\" target=\"_blank\" rel=\"noopener noreferrer\">Appleプライバシーポリシー</a>、<a href=\"https://policies.google.com/terms\" target=\"_blank\" rel=\"noopener noreferrer\">Google利用規約</a>。"},{"type":"h2","text":"9. 共有・販売"},{"type":"p","text":"CAREO LIMITEDは個人情報を販売・貸与せず、端末内のSpin&Goコンテンツを広告主と共有しません。上記提供者は広告、同意、購入、評価、安全、詐欺防止、法令遵守に必要な範囲で処理します。Googleが提供する地域別の「販売・共有」に関する選択肢は、必要な場合にプライバシー設定から管理できます。"},{"type":"h2","text":"10. 保存と削除"},{"type":"p","text":"ローカル情報は、アプリ内で削除・リセットする、アプリデータを消去する、またはアンインストールするまで残ります。これらの操作で同意表示やカウンターも初期化される場合があります。GoogleまたはAppleが管理する広告、同意、取引記録は各社の方針と法的義務に従います。"},{"type":"h2","text":"11. 法的根拠と権利"},{"type":"p","text":"適用法に応じ、パーソナライズ広告・トラッキングは同意、購入は契約履行、提供・安全・詐欺防止は正当な利益、その他は法的義務を根拠とする場合があります。地域により、アクセス、訂正、削除、制限、異議、同意撤回、監督機関への申立ての権利があります。端末内だけの情報をCAREO LIMITEDがサーバーから取得することはできません。"},{"type":"h2","text":"12. 子どものプライバシー"},{"type":"p","text":"Spin&Goは13歳未満または適用されるデジタル同意年齢未満の子どもを対象としておらず、その情報を故意に収集しません。広告SDKも子ども向けではない設定です。懸念がある場合はご連絡ください。"},{"type":"h2","text":"13. 安全性と国外移転"},{"type":"p","text":"収集を最小化し、外部通信にはプラットフォームの安全機能とHTTPSを使用します。完全な安全性は保証できません。Google、Apple等が他国で処理する場合、法令上必要な保護措置が適用されます。"},{"type":"h2","text":"14. 変更"},{"type":"p","text":"機能、提供者、法令の変更に応じて更新する場合があります。上記の日付が現行版を示し、重要な変更は必要に応じて通知します。"},{"type":"h2","text":"15. 連絡先"},{"type":"p","text":"Spin&Goの開発・配信者はCAREO LIMITEDです。件名を「Spin&Go Privacy」としてcareolimited@gmail.comまでご連絡ください。"}],"ko":[{"type":"h1","text":"개인정보 처리방침 – Spin&Go"},{"type":"meta","html":"<strong>최종 업데이트:</strong> 2026년 7월 13일<br><strong>앱:</strong> Spin&amp;Go<br><strong>개발자 / 게시자:</strong> CAREO LIMITED<br><strong>문의:</strong> careolimited@gmail.com"},{"type":"p","text":"본 방침은 iOS 또는 Android에서 Spin&Go를 사용할 때 정보가 처리되는 방식을 설명합니다. Spin&Go는 계정이 필요 없는 개인용 의사결정 도구입니다."},{"type":"h2","text":"1. 개요"},{"type":"p","text":"핵심 콘텐츠는 기기에 남도록 설계되었습니다. CAREO LIMITED는 Spin&Go 계정 데이터베이스, 멀티플레이어, Firebase 백엔드 또는 독립 분석 서비스를 운영하지 않으며 개인정보를 판매하지 않습니다."},{"type":"h2","text":"2. 기기에 저장되는 정보"},{"type":"p","text":"사용자 휠, 프리셋과 시나리오, 참가자 목록, 최근 결과, 숫자 범위, 동전 라벨, 도구 옵션, 언어, 테마, 햅틱과 온보딩 설정, 광고 동의 상태, 광고 표시 및 리뷰 요청 카운터, 캐시된 Pro 권한이 기기에 저장될 수 있습니다. 기능과 오프라인 사용을 위한 것이며 CAREO LIMITED 서버로 업로드되지 않습니다."},{"type":"h2","text":"3. 인터넷 연결"},{"type":"p","text":"오프라인에서 광고 요청을 피하고 재연결 후 다시 시도하기 위해 기기의 연결 API로 인터넷 이용 가능 여부를 확인합니다. CAREO LIMITED는 Wi‑Fi 이름이나 비밀번호, 정확한 위치, 검색 기록을 수집하지 않으며 연결 상태는 앱 메모리에만 유지됩니다."},{"type":"h2","text":"4. Google AdMob 광고"},{"type":"p","text":"무료 버전은 Google AdMob 배너 및 전면 광고를 표시할 수 있습니다. 지역, 선택 및 기기 설정에 따라 Google과 광고 파트너는 광고 식별자(허용된 Android Advertising ID 또는 iOS IDFA), IP 주소, IP에서 추정한 대략적 위치, 기기·앱 정보, 언어, 광고 상호작용, 진단, 사기 방지 신호 및 성과 데이터를 광고 제공, 빈도 제한, 보안, 측정 및 허용된 경우에만 맞춤화를 위해 처리할 수 있습니다. Spin&Go는 정확한 위치 권한을 요청하지 않으며 휠 내용, 참가자 이름 또는 로컬 결과를 AdMob에 보내지 않습니다."},{"type":"h2","text":"5. 동의 및 추적 선택"},{"type":"p","text":"Google UMP는 시작 시 동의 요건을 확인하고 필요한 경우 메시지를 표시합니다. UMP 상태가 허용할 때만 광고를 요청합니다. 필요한 지역에서는 설정의 ‘개인정보 환경설정’으로 Google 양식을 다시 열 수 있습니다. iOS ATT는 별도의 시스템 권한으로, 동의 절차 후 광고가 허용될 때만 요청됩니다. ATT 또는 맞춤 광고를 거부하면 광고가 허용되는 범위에서 비맞춤 광고를 요청합니다. 거부해도 핵심 기능이나 구매 기능은 차단되지 않습니다."},{"type":"h2","text":"6. 구매 및 Pro"},{"type":"p","text":"선택적 구매나 구독은 Apple App Store 또는 Google Play가 처리합니다. CAREO LIMITED는 전체 카드 정보를 받거나 저장하지 않습니다. 스토어가 계정과 거래 정보를 처리하며 Spin&Go는 Pro 완료, 복원 및 캐시에 필요한 거래 상태, 상품 ID와 권한을 받을 수 있습니다."},{"type":"h2","text":"7. 평점과 리뷰"},{"type":"p","text":"적절한 시점에 평점을 요청하기 위해 설치 기간, 작업 횟수, 활성 일수, 마지막 요청일 및 앱 버전을 로컬에 저장할 수 있습니다. 해당 카운터는 CAREO LIMITED로 전송되지 않습니다. 운영체제나 스토어가 요청을 표시하며 앱은 사용자의 응답을 읽을 수 없습니다."},{"type":"h2","text":"8. 제3자 서비스"},{"type":"p","text":"광고와 개인정보 선택에 Google AdMob/UMP, 구매에 Apple App Store/StoreKit 및 Google Play Billing, 평점 요청에 App Store 또는 Google Play를 사용합니다. 각 제공자의 약관과 개인정보처리방침이 적용됩니다."},{"type":"p","html":"제공자 정책: <a href=\"https://policies.google.com/privacy\" target=\"_blank\" rel=\"noopener noreferrer\">Google 개인정보처리방침</a>, <a href=\"https://www.apple.com/legal/privacy/\" target=\"_blank\" rel=\"noopener noreferrer\">Apple 개인정보 보호</a>, <a href=\"https://policies.google.com/terms\" target=\"_blank\" rel=\"noopener noreferrer\">Google 약관</a>."},{"type":"h2","text":"9. 공유 및 판매"},{"type":"p","text":"CAREO LIMITED는 개인정보를 판매하거나 대여하지 않으며 기기의 Spin&Go 콘텐츠를 광고주와 공유하지 않습니다. 위 제공자는 광고, 동의, 구매, 평점, 보안, 사기 방지 및 법률 준수에 필요한 범위에서 처리합니다. Google이 제공하는 지역별 ‘판매/공유’ 선택은 필요한 경우 개인정보 환경설정에서 관리할 수 있습니다."},{"type":"h2","text":"10. 보관 및 삭제"},{"type":"p","text":"로컬 정보는 앱에서 삭제·초기화하거나 앱 데이터를 지우거나 Spin&Go를 제거할 때까지 남습니다. 이 작업은 로컬 동의 표시와 카운터도 초기화할 수 있습니다. Google 또는 Apple이 관리하는 광고, 동의, 거래 기록에는 해당 정책과 법적 의무가 적용됩니다."},{"type":"h2","text":"11. 법적 근거와 권리"},{"type":"p","text":"관련 법률에 따라 맞춤 광고·추적은 동의, 구매는 계약 이행, 앱 제공·보안·사기 방지는 정당한 이익, 기타 처리는 법적 의무를 근거로 할 수 있습니다. 지역에 따라 열람, 정정, 삭제, 제한, 반대, 동의 철회 및 감독기관 진정 권리가 있습니다. 기기에만 있는 콘텐츠는 CAREO LIMITED가 서버에서 가져올 수 없습니다."},{"type":"h2","text":"12. 아동"},{"type":"p","text":"Spin&Go는 만 13세 미만 또는 해당 디지털 동의 연령 미만 아동을 대상으로 하지 않으며 그러한 정보를 고의로 수집하지 않습니다. 광고 SDK도 아동 대상이 아닌 것으로 설정됩니다. 우려가 있으면 연락해 주세요."},{"type":"h2","text":"13. 보안 및 국외 이전"},{"type":"p","text":"수집을 최소화하고 외부 통신에 플랫폼 보안과 HTTPS를 사용합니다. 절대적 보안은 보장할 수 없습니다. Google, Apple 등이 다른 국가에서 처리하는 경우 법률상 필요한 보호조치가 적용됩니다."},{"type":"h2","text":"14. 변경"},{"type":"p","text":"기능, 제공자 또는 법률이 변경되면 본 방침을 업데이트할 수 있습니다. 위 날짜가 현재 버전을 나타내며 중요한 변경은 필요한 경우 알립니다."},{"type":"h2","text":"15. 문의"},{"type":"p","text":"Spin&Go의 개발자 및 게시자는 CAREO LIMITED입니다. 제목에 ‘Spin&Go Privacy’를 적어 careolimited@gmail.com으로 문의해 주세요."}],"pt":[{"type":"h1","text":"Política de Privacidade – Spin&Go"},{"type":"meta","html":"<strong>Última atualização:</strong> 13 de julho de 2026<br><strong>Aplicação:</strong> Spin&amp;Go<br><strong>Programador / Editor:</strong> CAREO LIMITED<br><strong>Contacto:</strong> careolimited@gmail.com"},{"type":"p","text":"Esta Política explica como as informações são tratadas ao utilizar o Spin&Go no iOS ou Android. O Spin&Go é uma ferramenta individual de decisão e não exige uma conta."},{"type":"h2","text":"1. Visão geral"},{"type":"p","text":"O conteúdo principal foi concebido para permanecer no dispositivo. A CAREO LIMITED não mantém uma base de contas Spin&Go, serviço multijogador, backend Firebase ou serviço independente de análise e não vende dados pessoais."},{"type":"h2","text":"2. Informações guardadas localmente"},{"type":"p","text":"A aplicação pode guardar rodas, predefinições e cenários personalizados, listas de participantes, resultados recentes, intervalos numéricos, etiquetas da moeda, opções das ferramentas, idioma, tema, preferências táteis e de introdução, estado do consentimento publicitário, contadores de anúncios e pedidos de avaliação e direito Pro em cache. Servem às funcionalidades e ao uso offline e não são enviados aos servidores da CAREO LIMITED."},{"type":"h2","text":"3. Ligação à Internet"},{"type":"p","text":"O Spin&Go usa a API de conectividade para evitar pedidos de anúncios offline e tentar novamente após a reconexão. A CAREO LIMITED não recolhe nomes ou palavras-passe Wi‑Fi, localização exata ou histórico de navegação; o estado fica na memória da aplicação."},{"type":"h2","text":"4. Publicidade e Google AdMob"},{"type":"p","text":"A versão gratuita pode mostrar banners e anúncios intersticiais do Google AdMob. Conforme a região, escolhas e definições, Google e parceiros podem tratar identificadores publicitários (Android Advertising ID ou IDFA iOS, quando permitido), IP, localização aproximada derivada do IP, informações do dispositivo e aplicação, idioma, interações, diagnósticos, sinais antifraude e desempenho para fornecer, limitar, proteger, medir e, apenas quando permitido, personalizar anúncios. O Spin&Go não pede localização exata e não envia conteúdo das rodas, nomes ou resultados locais ao AdMob."},{"type":"h2","text":"5. Consentimento e rastreio"},{"type":"p","text":"O Google UMP verifica os requisitos de consentimento no arranque e apresenta uma mensagem quando necessário. Só são pedidos anúncios se o estado UMP permitir. Quando exigido, «Preferências de privacidade» nas Definições reabre o formulário Google. No iOS, ATT é uma autorização separada pedida após o consentimento quando anúncios são permitidos. Se ATT ou personalização forem recusados, o Spin&Go pede anúncios não personalizados quando a publicidade continuar permitida; a recusa não bloqueia funcionalidades ou compras."},{"type":"h2","text":"6. Compras e acesso Pro"},{"type":"p","text":"Compras ou subscrições opcionais são processadas pela Apple App Store ou Google Play. A CAREO LIMITED não recebe nem guarda os dados completos do cartão. A loja trata conta e transação; o Spin&Go pode receber estado, identificador do produto e direito necessários para concluir, restaurar e guardar o acesso Pro."},{"type":"h2","text":"7. Classificações"},{"type":"p","text":"O Spin&Go pode guardar localmente idade da instalação, ações, dias ativos, data do último pedido e versão para escolher quando pedir uma classificação. Estes contadores não são enviados à CAREO LIMITED. O sistema ou loja apresenta o pedido e a aplicação não lê a resposta."},{"type":"h2","text":"8. Serviços terceiros"},{"type":"p","text":"São usados Google AdMob e UMP para publicidade e escolhas de privacidade, Apple App Store/StoreKit e Google Play Billing para compras e App Store ou Google Play para pedidos de classificação. Aplicam-se os termos e políticas de cada fornecedor."},{"type":"p","html":"Políticas dos fornecedores: <a href=\"https://policies.google.com/privacy\" target=\"_blank\" rel=\"noopener noreferrer\">Privacidade Google</a>, <a href=\"https://www.apple.com/legal/privacy/\" target=\"_blank\" rel=\"noopener noreferrer\">Privacidade Apple</a> e <a href=\"https://policies.google.com/terms\" target=\"_blank\" rel=\"noopener noreferrer\">Termos Google</a>."},{"type":"h2","text":"9. Partilha e venda"},{"type":"p","text":"A CAREO LIMITED não vende nem aluga dados pessoais e não partilha conteúdo local com anunciantes. Os fornecedores indicados tratam dados apenas para publicidade, consentimento, compras, classificações, segurança, antifraude e cumprimento legal. As opções regionais Google de «venda/partilha» podem ser geridas nas Preferências de privacidade quando exigidas."},{"type":"h2","text":"10. Conservação e eliminação"},{"type":"p","text":"Os dados locais permanecem até serem eliminados ou repostos na aplicação, apagados com os dados da aplicação ou removidos ao desinstalar. Isto pode repor indicadores de consentimento e contadores. Registos de publicidade, consentimento e transações controlados por Google ou Apple seguem as suas políticas e obrigações."},{"type":"h2","text":"11. Bases legais e direitos"},{"type":"p","text":"Quando aplicável, o tratamento pode basear-se no consentimento para anúncios personalizados ou rastreio, execução do contrato de compra, interesses legítimos em fornecer e proteger a aplicação e prevenir fraude ou obrigações legais. Conforme a localização, pode ter direitos de acesso, correção, eliminação, limitação, oposição, retirada ou reclamação. A CAREO LIMITED não consegue recuperar do servidor conteúdo apenas local."},{"type":"h2","text":"12. Crianças"},{"type":"p","text":"O Spin&Go não se destina a menores de 13 anos ou abaixo da idade digital de consentimento aplicável e não recolhemos conscientemente esses dados. O SDK publicitário está configurado como não dirigido a crianças. Contacte-nos se tiver preocupações."},{"type":"h2","text":"13. Segurança e transferências internacionais"},{"type":"p","text":"Minimizamos a recolha e usamos segurança da plataforma e HTTPS nas comunicações externas. Nenhum sistema é totalmente seguro. Google, Apple e fornecedores podem tratar informações noutros países com as salvaguardas legais necessárias."},{"type":"h2","text":"14. Alterações"},{"type":"p","text":"Podemos atualizar esta Política por mudanças nas funcionalidades, fornecedores ou leis. A data acima identifica a versão atual; alterações materiais serão comunicadas quando exigido."},{"type":"h2","text":"15. Contacto"},{"type":"p","text":"A CAREO LIMITED desenvolve e publica o Spin&Go. Contacte careolimited@gmail.com com «Spin&Go Privacy» no assunto."}],"ru":[{"type":"h1","text":"Политика конфиденциальности – Spin&Go"},{"type":"meta","html":"<strong>Последнее обновление:</strong> 13 июля 2026 г.<br><strong>Приложение:</strong> Spin&amp;Go<br><strong>Разработчик / Издатель:</strong> CAREO LIMITED<br><strong>Контакт:</strong> careolimited@gmail.com"},{"type":"p","text":"Настоящая Политика описывает обработку информации при использовании Spin&Go на iOS или Android. Spin&Go — индивидуальный инструмент принятия решений, не требующий учётной записи."},{"type":"h2","text":"1. Обзор"},{"type":"p","text":"Основное содержимое хранится на устройстве. CAREO LIMITED не ведёт базу аккаунтов Spin&Go, многопользовательский сервис, Firebase-бэкенд или отдельную аналитику и не продаёт персональные данные."},{"type":"h2","text":"2. Локальные данные"},{"type":"p","text":"На устройстве могут храниться пользовательские колёса, пресеты и сценарии, списки участников, недавние результаты, числовые диапазоны, подписи монеты, параметры инструментов, язык, тема, тактильные и вводные настройки, состояние рекламного согласия, счётчики рекламы и запроса оценки и кэш права Pro. Они нужны для функций и офлайн-работы и не загружаются на серверы CAREO LIMITED."},{"type":"h2","text":"3. Интернет-соединение"},{"type":"p","text":"Spin&Go использует API подключения, чтобы не запрашивать рекламу офлайн и повторить запрос после восстановления сети. CAREO LIMITED не собирает имена или пароли Wi‑Fi, точное местоположение или историю просмотра; состояние соединения остаётся в памяти приложения."},{"type":"h2","text":"4. Реклама Google AdMob"},{"type":"p","text":"Бесплатная версия может показывать баннеры и межстраничную рекламу Google AdMob. В зависимости от региона, выбора и настроек Google и партнёры могут обрабатывать рекламные идентификаторы (Android Advertising ID или iOS IDFA при разрешении), IP, примерное местоположение по IP, сведения об устройстве и приложении, язык, взаимодействия, диагностику, сигналы защиты от мошенничества и эффективность для показа, ограничения, безопасности, измерения и персонализации только при разрешении. Spin&Go не запрашивает точную геолокацию и не передаёт AdMob содержимое колёс, имена или локальные результаты."},{"type":"h2","text":"5. Согласие и отслеживание"},{"type":"p","text":"Google UMP проверяет требования при запуске и при необходимости показывает сообщение. Реклама запрашивается только если статус UMP разрешает. Когда требуется, «Настройки конфиденциальности» открывают форму Google повторно. В iOS ATT — отдельное системное разрешение после процедуры согласия. При отказе от ATT или персонализации Spin&Go запрашивает неперсонализированную рекламу, если реклама в целом допустима; отказ не блокирует основные или купленные функции."},{"type":"h2","text":"6. Покупки и Pro"},{"type":"p","text":"Необязательные покупки или подписки обрабатывают Apple App Store или Google Play. CAREO LIMITED не получает и не хранит полные данные карты. Магазин обрабатывает аккаунт и транзакцию; Spin&Go может получить статус, идентификатор продукта и право доступа для завершения, восстановления и кэширования Pro."},{"type":"h2","text":"7. Оценки"},{"type":"p","text":"Для выбора подходящего времени Spin&Go может локально хранить срок установки, число действий, активные дни, дату последнего запроса и версию. Эти счётчики не отправляются CAREO LIMITED. Запрос показывает система или магазин, а приложение не читает ответ."},{"type":"h2","text":"8. Сторонние сервисы"},{"type":"p","text":"Используются Google AdMob/UMP для рекламы и настроек, Apple App Store/StoreKit и Google Play Billing для покупок, App Store или Google Play для оценок. Применяются правила и политики соответствующих поставщиков."},{"type":"p","html":"Политики поставщиков: <a href=\"https://policies.google.com/privacy\" target=\"_blank\" rel=\"noopener noreferrer\">Конфиденциальность Google</a>, <a href=\"https://www.apple.com/legal/privacy/\" target=\"_blank\" rel=\"noopener noreferrer\">Конфиденциальность Apple</a> и <a href=\"https://policies.google.com/terms\" target=\"_blank\" rel=\"noopener noreferrer\">Условия Google</a>."},{"type":"h2","text":"9. Передача и продажа"},{"type":"p","text":"CAREO LIMITED не продаёт и не сдаёт персональные данные и не передаёт локальное содержимое рекламодателям. Поставщики обрабатывают данные лишь для рекламы, согласия, покупок, оценок, безопасности, борьбы с мошенничеством и закона. Региональные параметры Google о «продаже/передаче» доступны в настройках конфиденциальности, когда это требуется."},{"type":"h2","text":"10. Хранение и удаление"},{"type":"p","text":"Локальные данные остаются до удаления или сброса в приложении, очистки данных приложения либо удаления Spin&Go. Это может сбросить локальные отметки согласия и счётчики. Рекламные, согласительные и транзакционные записи Google или Apple подчиняются их политикам и обязанностям."},{"type":"h2","text":"11. Основания и права"},{"type":"p","text":"Когда применимо, основанием могут быть согласие для персонализированной рекламы/отслеживания, исполнение договора покупки, законный интерес в работе, безопасности и борьбе с мошенничеством либо юридическая обязанность. В зависимости от региона возможны права на доступ, исправление, удаление, ограничение, возражение, отзыв и жалобу. CAREO LIMITED не может получить с сервера данные, находящиеся только на устройстве."},{"type":"h2","text":"12. Дети"},{"type":"p","text":"Spin&Go не предназначено для детей младше 13 лет или применимого возраста цифрового согласия; мы сознательно не собираем такие данные. Рекламный SDK настроен как не предназначенный для детей. При возникновении сомнений свяжитесь с нами."},{"type":"h2","text":"13. Безопасность и международная передача"},{"type":"p","text":"Мы минимизируем сбор и используем защиту платформы и HTTPS. Абсолютная безопасность невозможна. Google, Apple и поставщики могут обрабатывать информацию в других странах с требуемыми гарантиями."},{"type":"h2","text":"14. Изменения"},{"type":"p","text":"Политика может обновляться при изменении функций, поставщиков или закона. Дата выше обозначает текущую версию; существенные изменения сообщаются, когда это необходимо."},{"type":"h2","text":"15. Контакт"},{"type":"p","text":"CAREO LIMITED разрабатывает и издаёт Spin&Go. Пишите на careolimited@gmail.com с темой «Spin&Go Privacy»."}],"es":[{"type":"h1","text":"Política de privacidad – Spin&Go"},{"type":"meta","html":"<strong>Última actualización:</strong> 13 de julio de 2026<br><strong>Aplicación:</strong> Spin&amp;Go<br><strong>Desarrollador / Editor:</strong> CAREO LIMITED<br><strong>Contacto:</strong> careolimited@gmail.com"},{"type":"p","text":"Esta Política explica cómo se gestiona la información al usar Spin&Go en iOS o Android. Spin&Go es una herramienta individual de decisión y no requiere una cuenta."},{"type":"h2","text":"1. Resumen"},{"type":"p","text":"El contenido principal está diseñado para permanecer en el dispositivo. CAREO LIMITED no mantiene una base de cuentas Spin&Go, multijugador, backend de Firebase ni servicio de analítica independiente y no vende datos personales."},{"type":"h2","text":"2. Información almacenada localmente"},{"type":"p","text":"La app puede guardar ruedas, ajustes y escenarios personalizados, listas de participantes, resultados recientes, rangos numéricos, etiquetas de moneda, opciones de herramientas, idioma, tema, preferencias hápticas y de introducción, estado del consentimiento publicitario, contadores de anuncios y solicitud de valoración y derecho Pro en caché. Se usan para las funciones y el modo sin conexión y no se cargan en servidores de CAREO LIMITED."},{"type":"h2","text":"3. Conectividad"},{"type":"p","text":"Spin&Go usa la API de conectividad para evitar solicitudes de anuncios sin conexión y reintentarlas al reconectar. CAREO LIMITED no recopila nombres o contraseñas Wi‑Fi, ubicación precisa ni historial de navegación; el estado permanece en la memoria de la app."},{"type":"h2","text":"4. Publicidad y Google AdMob"},{"type":"p","text":"La versión gratuita puede mostrar banners y anuncios intersticiales de Google AdMob. Según la región, elecciones y ajustes, Google y sus socios pueden tratar identificadores publicitarios (Android Advertising ID o IDFA de iOS si se permite), IP, ubicación aproximada derivada de la IP, datos del dispositivo y la app, idioma, interacciones, diagnósticos, señales antifraude y rendimiento para servir, limitar, proteger, medir y, solo si está permitido, personalizar anuncios. Spin&Go no solicita ubicación precisa ni envía a AdMob el contenido de ruedas, nombres o resultados locales."},{"type":"h2","text":"5. Consentimiento y seguimiento"},{"type":"p","text":"Google UMP comprueba los requisitos al iniciar y presenta un mensaje cuando es necesario. Solo se solicitan anuncios si el estado UMP lo permite. Cuando se exige, «Preferencias de privacidad» en Ajustes vuelve a abrir el formulario de Google. En iOS, ATT es un permiso del sistema independiente solicitado después del consentimiento. Si se rechaza ATT o la personalización, Spin&Go solicita anuncios no personalizados cuando la publicidad siga permitida; el rechazo no bloquea funciones principales ni compras."},{"type":"h2","text":"6. Compras y acceso Pro"},{"type":"p","text":"Las compras o suscripciones opcionales son procesadas por Apple App Store o Google Play. CAREO LIMITED no recibe ni almacena los datos completos de la tarjeta. La tienda trata cuenta y transacción; Spin&Go puede recibir estado, identificador de producto y derecho necesarios para completar, restaurar y guardar el acceso Pro."},{"type":"h2","text":"7. Valoraciones"},{"type":"p","text":"Spin&Go puede guardar localmente antigüedad de instalación, acciones, días activos, fecha de última solicitud y versión para elegir cuándo pedir una valoración. Los contadores no se envían a CAREO LIMITED. El sistema o la tienda muestra la solicitud y la app no lee la respuesta."},{"type":"h2","text":"8. Terceros"},{"type":"p","text":"Se usan Google AdMob y UMP para publicidad y opciones de privacidad, Apple App Store/StoreKit y Google Play Billing para compras y App Store o Google Play para valoraciones. Rigen los términos y políticas de cada proveedor."},{"type":"p","html":"Políticas de proveedores: <a href=\"https://policies.google.com/privacy\" target=\"_blank\" rel=\"noopener noreferrer\">Privacidad de Google</a>, <a href=\"https://www.apple.com/legal/privacy/\" target=\"_blank\" rel=\"noopener noreferrer\">Privacidad de Apple</a> y <a href=\"https://policies.google.com/terms\" target=\"_blank\" rel=\"noopener noreferrer\">Términos de Google</a>."},{"type":"h2","text":"9. Compartición y venta"},{"type":"p","text":"CAREO LIMITED no vende ni alquila datos personales y no comparte contenido local con anunciantes. Los proveedores señalados tratan información solo para publicidad, consentimiento, compras, valoraciones, seguridad, antifraude y cumplimiento legal. Las opciones regionales de Google sobre «venta/compartición» pueden gestionarse en Preferencias de privacidad cuando se requieran."},{"type":"h2","text":"10. Conservación y eliminación"},{"type":"p","text":"Los datos locales permanecen hasta eliminarlos o restablecerlos en la app, borrar los datos de la aplicación o desinstalar Spin&Go. Esto puede reiniciar indicadores de consentimiento y contadores. Los registros de publicidad, consentimiento y transacciones controlados por Google o Apple siguen sus políticas y obligaciones."},{"type":"h2","text":"11. Bases jurídicas y derechos"},{"type":"p","text":"Cuando corresponda, el tratamiento puede basarse en consentimiento para publicidad personalizada o seguimiento, ejecución del contrato de compra, intereses legítimos en ofrecer y proteger la app y prevenir fraude u obligaciones legales. Según tu ubicación puedes tener derechos de acceso, rectificación, eliminación, limitación, oposición, retirada y reclamación. CAREO LIMITED no puede recuperar del servidor contenido que solo está en tu dispositivo."},{"type":"h2","text":"12. Menores"},{"type":"p","text":"Spin&Go no se dirige a menores de 13 años o de la edad digital de consentimiento aplicable y no recopilamos conscientemente sus datos. El SDK publicitario está configurado como no dirigido a menores. Contacta con nosotros si te preocupa."},{"type":"h2","text":"13. Seguridad y transferencias internacionales"},{"type":"p","text":"Minimizamos la recopilación y usamos seguridad de plataforma y HTTPS en comunicaciones externas. Ningún sistema es totalmente seguro. Google, Apple y proveedores pueden tratar información en otros países aplicando las garantías requeridas."},{"type":"h2","text":"14. Cambios"},{"type":"p","text":"Podemos actualizar esta Política por cambios en funciones, proveedores o leyes. La fecha anterior identifica la versión actual; los cambios importantes se comunicarán cuando sea obligatorio."},{"type":"h2","text":"15. Contacto"},{"type":"p","text":"CAREO LIMITED desarrolla y publica Spin&Go. Escribe a careolimited@gmail.com con «Spin&Go Privacy» en el asunto."}],"tr":[{"type":"h1","text":"Gizlilik Politikası – Spin&Go"},{"type":"meta","html":"<strong>Son güncelleme:</strong> 13 Temmuz 2026<br><strong>Uygulama:</strong> Spin&amp;Go<br><strong>Geliştirici / Yayıncı:</strong> CAREO LIMITED<br><strong>İletişim:</strong> careolimited@gmail.com"},{"type":"p","text":"Bu Politika, Spin&Go’yu iOS veya Android’de kullanırken bilgilerin nasıl işlendiğini açıklar. Spin&Go hesap gerektirmeyen, tek kullanıcıya yönelik bir karar aracıdır."},{"type":"h2","text":"1. Genel Bakış"},{"type":"p","text":"Temel içerik cihazınızda kalacak şekilde tasarlanmıştır. CAREO LIMITED; Spin&Go için kullanıcı hesabı veritabanı, multiplayer hizmeti, Firebase altyapısı veya bağımsız analiz hizmeti işletmez ve kişisel bilgileri satmaz."},{"type":"h2","text":"2. Cihazda Saklanan Bilgiler"},{"type":"p","text":"Uygulama; özel çarkları, hazır listeleri ve senaryoları, katılımcı listelerini, son sonuçları, sayı aralıklarını, yazı-tura etiketlerini, araç seçeneklerini, dil, tema, dokunsal geri bildirim ve tanıtım tercihlerini, reklam onay durumunu, reklam gösterimi ve puanlama isteği sayaçlarını ve önbelleğe alınmış Pro hakkını cihazınızda saklayabilir. Bunlar uygulama özellikleri ve çevrimdışı kullanım için kullanılır; CAREO LIMITED sunucularına yüklenmez."},{"type":"h2","text":"3. İnternet Bağlantısı"},{"type":"p","text":"Spin&Go, çevrimdışıyken reklam istememek ve bağlantı geri geldiğinde yeniden denemek için cihazın bağlantı API’si üzerinden internetin kullanılabilir olup olmadığını kontrol eder. CAREO LIMITED bu özellik aracılığıyla Wi‑Fi adı veya parolası, kesin konum ya da tarama geçmişi toplamaz; bağlantı durumu yalnızca uygulama belleğinde tutulur."},{"type":"h2","text":"4. Reklamlar ve Google AdMob Tarafından İşlenen Veriler"},{"type":"p","text":"Ücretsiz sürüm Google AdMob tarafından sağlanan banner ve geçiş reklamlarını gösterebilir. Bölgenize, tercihlerinize ve cihaz ayarlarınıza bağlı olarak Google ve reklam ortakları; reklam tanımlayıcılarını (izin verildiğinde Android Advertising ID veya iOS IDFA), IP adresini, IP’den çıkarılan yaklaşık konumu, cihaz ve uygulama bilgilerini, dili, reklam etkileşimlerini, tanılama verilerini, dolandırıcılığı önleme sinyallerini ve reklam performansını reklam sunmak, sıklığı sınırlamak, güvenliği sağlamak, ölçüm yapmak ve yalnızca izin verildiğinde reklamları kişiselleştirmek amacıyla işleyebilir. Spin&Go kesin konum izni istemez; çark içeriklerinizi, katılımcı adlarını veya yerel sonuçlarınızı AdMob’a göndermez."},{"type":"h2","text":"5. Onay, Kişiselleştirilmiş Reklam ve Takip Tercihleri"},{"type":"p","text":"Google User Messaging Platform (UMP), uygulama her açıldığında onay gerekliliklerini kontrol eder ve gerektiğinde gizlilik mesajı gösterir. Yalnızca UMP durumu izin veriyorsa reklam istenir. Gerekli bölgelerde Ayarlar’daki “Gizlilik Tercihleri” seçeneği Google formunu yeniden açarak mevcut tercihleri değiştirmenizi sağlar. iOS’ta App Tracking Transparency (ATT), reklam onay akışından sonra reklamlar kullanılabiliyorsa istenen ayrı bir sistem iznidir. ATT veya kişiselleştirilmiş reklam izni reddedilirse, reklam gösterimine başka bakımdan izin verilen durumlarda Spin&Go kişiselleştirilmemiş reklam ister. Reddetmek temel uygulamayı veya satın alınmış özellikleri engellemez."},{"type":"h2","text":"6. Satın Almalar ve Pro Erişimi"},{"type":"p","text":"İsteğe bağlı satın alma veya abonelikler Apple App Store ya da Google Play tarafından işlenir. CAREO LIMITED kart bilgilerinizin tamamını almaz veya saklamaz. Mağaza hesap ve işlem bilgilerini kendi politikasına göre işler; Spin&Go, Pro erişimini tamamlamak, geri yüklemek ve cihazda önbelleğe almak için gerekli işlem durumu, ürün kimliği ve hak bilgisini alabilir."},{"type":"h2","text":"7. Puanlama ve Yorumlar"},{"type":"p","text":"Spin&Go; kullanıcıyı erken aşamada rahatsız etmeden uygun zamanda App Store veya Google Play puanlama isteği göstermek için kurulum yaşı, tamamlanan işlem sayısı, aktif günler, son istek tarihi ve uygulama sürümü gibi sayaçları yerel olarak tutabilir. Bu sayaçlar CAREO LIMITED’a gönderilmez. İstek ekranını işletim sistemi veya mağaza gösterir; uygulama verdiğiniz puanı ya da yorumu okuyamaz."},{"type":"h2","text":"8. Üçüncü Taraf Hizmetleri"},{"type":"p","text":"Spin&Go; reklamlar ve gizlilik tercihleri için Google AdMob ile Google UMP’yi, satın almalar için Apple App Store / StoreKit ile Google Play Billing’i, puanlama istekleri için Apple App Store veya Google Play’i kullanır. Bu sağlayıcılar kendi şartları ve gizlilik politikaları uyarınca bilgi işler."},{"type":"p","html":"Sağlayıcı politikaları: <a href=\"https://policies.google.com/privacy\" target=\"_blank\" rel=\"noopener noreferrer\">Google Gizlilik Politikası</a>, <a href=\"https://www.apple.com/legal/privacy/\" target=\"_blank\" rel=\"noopener noreferrer\">Apple Gizlilik Politikası</a> ve <a href=\"https://policies.google.com/terms\" target=\"_blank\" rel=\"noopener noreferrer\">Google Şartları</a>."},{"type":"h2","text":"9. Paylaşım ve Satış"},{"type":"p","text":"CAREO LIMITED kişisel bilgileri satmaz veya kiralamaz ve cihazda oluşturulan Spin&Go içeriğini reklamverenlerle paylaşmaz. Yukarıdaki sağlayıcılar bilgileri yalnızca reklam, onay, satın alma, puanlama, güvenlik, dolandırıcılığı önleme ve yasal uyum için gerekli olduğu ölçüde işler. Google’ın sunduğu bölgesel “satış” veya “paylaşım” tercihleri, bu giriş noktası gerekli olduğunda Gizlilik Tercihleri üzerinden yönetilebilir."},{"type":"h2","text":"10. Saklama ve Silme"},{"type":"p","text":"Yerel uygulama bilgileri; uygulama içinde silinene veya sıfırlanana, uygulama verileri temizlenene ya da Spin&Go kaldırılana kadar cihazda kalır. Uygulamayı kaldırmak veya verileri temizlemek yerel onay göstergelerini ve kullanım sayaçlarını da sıfırlayabilir. Google veya Apple’ın kontrolündeki reklam, onay ve işlem kayıtları ilgili sağlayıcıların politikaları ve yasal yükümlülükleri uyarınca saklanır."},{"type":"h2","text":"11. Hukuki Dayanaklar ve Haklarınız"},{"type":"p","text":"Veri koruma hukukunun uygulandığı durumlarda işleme; kişiselleştirilmiş reklam veya takip için onaya, satın alma sözleşmesinin ifasına, uygulamayı sunma ve güvenli tutma ile dolandırıcılığı önlemeye ilişkin meşru menfaatlere veya yasal yükümlülüklere dayanabilir. Bulunduğunuz yere göre erişim, düzeltme, silme, sınırlandırma, itiraz, onayı geri çekme veya yetkili kuruma şikâyet haklarınız olabilir. CAREO LIMITED yalnızca cihazınızda bulunan içeriği bir sunucudan getirip size veremez; bu içeriği cihazınızdan yönetebilirsiniz."},{"type":"h2","text":"12. Çocukların Gizliliği"},{"type":"p","text":"Spin&Go 13 yaşın veya geçerli dijital onay yaşının altındaki çocuklara yönelik değildir ve bu kişilerden bilerek kişisel bilgi toplamayız. Reklam SDK’sı da çocuklara ve onay yaşının altındaki kullanıcılara yönelik olmayacak şekilde yapılandırılmıştır. Bir çocuğun kişisel bilgi sağladığını düşünüyorsanız bizimle iletişime geçin."},{"type":"h2","text":"13. Güvenlik ve Uluslararası Aktarımlar"},{"type":"p","text":"Veri toplamayı en aza indirir, harici iletişimlerde platform güvenliği ve HTTPS kullanırız. Hiçbir sistem mutlak güvenlik garanti edemez. Google, Apple ve hizmet sağlayıcıları bilgileri başka ülkelerde işleyebilir; kanunen gerekli aktarım mekanizmaları ve korumalar ilgili sağlayıcılar tarafından uygulanır."},{"type":"h2","text":"14. Politika Değişiklikleri"},{"type":"p","text":"Spin&Go özellikleri, sağlayıcılar veya yasal gereklilikler değiştiğinde bu Politikayı güncelleyebiliriz. Yukarıdaki tarih geçerli sürümü gösterir. Önemli değişiklikler gerektiğinde kullanıcılara bildirilir."},{"type":"h2","text":"15. İletişim"},{"type":"p","text":"Spin&Go’nun geliştiricisi ve yayıncısı CAREO LIMITED’dır. Gizlilik soruları veya talepleri için konu satırına “Spin&Go Privacy” yazarak careolimited@gmail.com adresine ulaşabilirsiniz."}]};

  const languageSelect = document.getElementById("languageSelect");
  const policyContent = document.getElementById("policyContent");
  const backLink = document.getElementById("backLink");
  const params = new URLSearchParams(window.location.search);
  const initialLanguage = params.get("lang") || localStorage.getItem("careo-language") || "en";
  function renderPolicy(language) {
    const selected = policyData[language] || policyData.en;
    const ui = uiText[language] || uiText.en;
    document.documentElement.lang = language;
    languageSelect.value = language;
    backLink.textContent = ui.back;
    backLink.href = `../index.html?lang=${encodeURIComponent(language)}`;
    policyContent.innerHTML = "";
    selected.forEach((block) => {
      if (block.type === "h1" || block.type === "h2") {
        const el = document.createElement(block.type); el.textContent = block.text; policyContent.appendChild(el);
      } else if (block.type === "p" || block.type === "meta") {
        const el = document.createElement("p"); if (block.type === "meta") el.className = "meta"; if (block.html) el.innerHTML = block.html; else el.textContent = block.text; policyContent.appendChild(el);
      } else if (block.type === "ul") {
        const ul = document.createElement("ul"); block.items.forEach((item) => { const li = document.createElement("li"); li.textContent = item; ul.appendChild(li); }); policyContent.appendChild(ul);
      }
    });
    document.title = `${selected[0].text} | CAREO LIMITED`;
    localStorage.setItem("careo-language", language);
    const url = new URL(window.location.href); url.searchParams.set("lang", language); window.history.replaceState(null, "", url.toString());
  }
  languageSelect.addEventListener("change", (event) => renderPolicy(event.target.value));
  renderPolicy(policyData[initialLanguage] ? initialLanguage : "en");
</script>
